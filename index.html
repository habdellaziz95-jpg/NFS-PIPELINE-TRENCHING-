    body { background: white !important; }
    .no-print { display: none !important; }
    .print-only { display: block !important; }

// Main data store class
class NFSDataStore {
  constructor() {
    this.corridor = 'south';   // 'south' | 'east' | 'overall'
    this.load();
  }

  _normInputs(savedInputs) {
    const inp = { ...DEFAULT_INPUTS, ...(savedInputs || {}) };
    inp.kpiLabels = { ...DEFAULT_INPUTS.kpiLabels, ...(inp.kpiLabels || {}) };
    inp.kpiSubs   = { ...DEFAULT_INPUTS.kpiSubs,   ...(inp.kpiSubs   || {}) };
    inp.tabNames  = { ...DEFAULT_INPUTS.tabNames,  ...(inp.tabNames  || {}) };
    inp.orgChart  = { ...DEFAULT_INPUTS.orgChart,  ...(inp.orgChart  || {}) };
    if (inp.tabNames.inputs === "Project Inputs") inp.tabNames.inputs = "Project Settings";
    return inp;
  }

  _eastInputs() {
    return {
      ...JSON.parse(JSON.stringify(DEFAULT_INPUTS)),
      siteTitle:   "NFS East Corridor — Master Tracker",
      description: "East Corridor — Trenching, Conduit Installation & Backfilling",
      surveyedNear: 0, surveyedOff: 0, surveyDate: "", surveySource: "",
    };
  }

  // East has no survey of its own yet. If it inherited the South/DEFAULT survey
  // numbers, clear them so the East dashboard shows no false variance.
  // East corridor has no survey reconciliation — ALWAYS zero out surveyed values on load.
  _healEast() {
    const e = this.corridors && this.corridors.east && this.corridors.east.inputs;
    if (!e) return false;
    const hadValue = Number(e.surveyedNear) || Number(e.surveyedOff);
    e.surveyedNear = 0; e.surveyedOff = 0; e.surveyDate = ""; e.surveySource = "";
    return !!hadValue;
  }

  // South offshore was never survey-verified; an old build stored the contractor
  // reported figure (~13,934.4) as a "survey", causing a false offshore variance.
  // Clear that legacy value on load so existing browsers self-correct. A genuine
  // future offshore survey entered via Project Settings will be a different value
  // and is left untouched.
  _healSouthOffshore() {
    const s = this.corridors && this.corridors.south && this.corridors.south.inputs;
    if (!s) return false;
    const off = Number(s.surveyedOff);
    if (off === 13934.4 || off === 13934) { s.surveyedOff = 0; return true; }
    return false;
  }

  load() {
    try {
      const raw = localStorage.getItem(NFS_DATA_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        if (saved.corridors) {
          // New dual-corridor schema
          this.corridors = {
            south: {
              inputs: this._normInputs(saved.corridors.south ? saved.corridors.south.inputs : null),
              scope:  (saved.corridors.south && saved.corridors.south.scope)  || [...DEFAULT_SCOPE],
              dprLog: (saved.corridors.south && saved.corridors.south.dprLog) || [],
              equipLog: this._normEquip(saved.corridors.south && saved.corridors.south.equipLog),
              // Look-Ahead is now per-corridor; migrate any legacy shared (top-level) list into South.
              lookahead: (saved.corridors.south && saved.corridors.south.lookahead) || saved.lookahead || [],
            },
            east: {
              inputs: this._normInputs(saved.corridors.east ? saved.corridors.east.inputs : null),
              scope:  (saved.corridors.east && saved.corridors.east.scope)  || [...DEFAULT_SCOPE_EAST],
              dprLog: (saved.corridors.east && saved.corridors.east.dprLog) || [],
              equipLog: this._normEquip(saved.corridors.east && saved.corridors.east.equipLog),
              lookahead: (saved.corridors.east && saved.corridors.east.lookahead) || [],
            },
          };
          if (saved.corridors.east && !saved.corridors.east.inputs) this.corridors.east.inputs = this._eastInputs();
          this.permits   = saved.permits   || [];
          this.corridor  = saved.corridor || 'south';
          let _healed = this._healEast();
          if (this._healSouthOffshore()) _healed = true;
          if (_healed) this.save();
        } else {
          // Legacy single-dataset schema → migrate existing data into SOUTH corridor
          this.corridors = {
            south: {
              inputs: this._normInputs(saved.inputs),
              scope:  saved.scope  || [...DEFAULT_SCOPE],
              dprLog: saved.dprLog || [],
              equipLog: this._normEquip(null),
              lookahead: saved.lookahead || [],
            },
            east: {
              inputs: this._eastInputs(),
              scope:  [...DEFAULT_SCOPE_EAST],
              dprLog: [],
              equipLog: this._normEquip(null),
              lookahead: [],
            },
          };
          this.permits   = saved.permits   || [];
          this.corridor  = 'south';
          this.save();   // persist migrated schema
        }
      } else {
        this.reset();
      }
    } catch(e) {
      console.warn('load failed', e);
      this.reset();
    }
  }

  // Current corridor dataset (overall falls back to south for inputs/scope)
  get _ds() {
    const c = (this.corridor === 'overall') ? 'south' : this.corridor;
    return this.corridors[c] || this.corridors.south;
  }
  get inputs()  { return this._ds.inputs; }
  set inputs(v) { this._ds.inputs = v; }
  get scope()   { return this._ds.scope; }
  set scope(v)  { this._ds.scope = v; }
  get dprLog()  { return (this.corridor === 'overall') ? this._overallLog() : this._ds.dprLog; }
  set dprLog(v) { (this.corridor === 'overall' ? this.corridors.south : this._ds).dprLog = v; }

  // Equipment Log — per corridor, shape { equipment:[names], rows:[{date,counts,total}] }.
  // Imported from the Master file "Equipment Log" sheet; South & East kept separate (like dprLog).
  get equipLog()  { const ds = this._ds; if (!ds.equipLog) ds.equipLog = this._normEquip(null); return ds.equipLog; }
  set equipLog(v) { (this.corridor === 'overall' ? this.corridors.south : this._ds).equipLog = this._normEquip(v); }

  // Normalize a stored/imported Equipment Log into a safe shape.
  _normEquip(v) {
    if (v && Array.isArray(v.equipment) && Array.isArray(v.rows)) return v;
    return { equipment: [], rows: [] };
  }

  // Look-Ahead — per corridor (South & East kept separate, like dprLog). Overall → South.
  get lookahead()  { const ds = this._ds; if (!Array.isArray(ds.lookahead)) ds.lookahead = []; return ds.lookahead; }
  set lookahead(v) { (this.corridor === 'overall' ? this.corridors.south : this._ds).lookahead = v || []; }

  resetInputsOnly() {
    this.inputs = JSON.parse(JSON.stringify(DEFAULT_INPUTS));
    this.save();
  }

  reset() {
    this.corridors = {
      south: { inputs: this._normInputs(null), scope: [...DEFAULT_SCOPE], dprLog: [], equipLog: this._normEquip(null), lookahead: [] },
      east:  { inputs: this._eastInputs(),     scope: [...DEFAULT_SCOPE_EAST], dprLog: [], equipLog: this._normEquip(null), lookahead: [] },
    };
    this.permits   = [];
    this.corridor  = 'south';
    this.save();
  }

  save() {
    try {
      localStorage.setItem(NFS_DATA_KEY, JSON.stringify(this.serialize()));
    } catch(e) {
      console.warn('Save failed:', e);
    }
    // Mirror to the cloud when signed in (debounced inside the cloud layer).
    try { if (window.__nfsCloudPush) window.__nfsCloudPush(this.serialize()); } catch(e) {}
  }

  // ── Cloud helpers (same shape as localStorage) ──────────────
  serialize() {
    // Look-Ahead now lives inside each corridor (corridors.*.lookahead); only permits stay shared.
    return {
      corridor:  this.corridor,
      corridors: this.corridors,
      permits:   this.permits,
    };
  }
  // Load the store from a plain object (e.g. fetched from Supabase).
  hydrate(saved) {
    try {
      if (saved && saved.corridors) {
        this.corridors = {
          south: {
            inputs: this._normInputs(saved.corridors.south ? saved.corridors.south.inputs : null),
            scope:  (saved.corridors.south && saved.corridors.south.scope)  || [...DEFAULT_SCOPE],
            dprLog: (saved.corridors.south && saved.corridors.south.dprLog) || [],
            equipLog: this._normEquip(saved.corridors.south && saved.corridors.south.equipLog),
            lookahead: (saved.corridors.south && saved.corridors.south.lookahead) || saved.lookahead || [],
          },
          east: {
            inputs: this._normInputs(saved.corridors.east ? saved.corridors.east.inputs : null),
            scope:  (saved.corridors.east && saved.corridors.east.scope)  || [...DEFAULT_SCOPE_EAST],
            dprLog: (saved.corridors.east && saved.corridors.east.dprLog) || [],
            equipLog: this._normEquip(saved.corridors.east && saved.corridors.east.equipLog),
            lookahead: (saved.corridors.east && saved.corridors.east.lookahead) || [],
          },
        };
        if (saved.corridors.east && !saved.corridors.east.inputs) this.corridors.east.inputs = this._eastInputs();
        this.permits   = saved.permits   || [];
        this.corridor  = saved.corridor || 'south';
        this._healEast(); this._healSouthOffshore();
        return true;
      }
    } catch(e) { console.warn('hydrate failed', e); }
    return false;
  }
  // Does the store currently hold any DPR data?
  hasData() {
    const s = this.corridors && this.corridors.south && this.corridors.south.dprLog;
    const e = this.corridors && this.corridors.east  && this.corridors.east.dprLog;
    return !!((s && s.length) || (e && e.length));
  }

  exportJSON() {
    const data = JSON.stringify({
      corridor: this.corridor, corridors: this.corridors,
      permits: this.permits   // look-ahead is inside corridors.*.lookahead
    }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `NFS_Tracker_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  importJSON(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const d = JSON.parse(e.target.result);
          if (d.corridors) {
            this.corridors = {
              south: {
                inputs: this._normInputs(d.corridors.south ? d.corridors.south.inputs : null),
                scope:  (d.corridors.south && d.corridors.south.scope)  || [...DEFAULT_SCOPE],
                dprLog: (d.corridors.south && d.corridors.south.dprLog) || [],
                equipLog: this._normEquip(d.corridors.south && d.corridors.south.equipLog),
                lookahead: (d.corridors.south && d.corridors.south.lookahead) || d.lookahead || [],
              },
              east: {
                inputs: this._normInputs(d.corridors.east ? d.corridors.east.inputs : null),
                scope:  (d.corridors.east && d.corridors.east.scope)  || [...DEFAULT_SCOPE_EAST],
                dprLog: (d.corridors.east && d.corridors.east.dprLog) || [],
                equipLog: this._normEquip(d.corridors.east && d.corridors.east.equipLog),
                lookahead: (d.corridors.east && d.corridors.east.lookahead) || [],
              },
            };
          } else if (d.inputs || d.dprLog) {
            // Legacy single-dataset JSON → load into current corridor
            this._ds.inputs = this._normInputs(d.inputs);
            if (d.scope)  this._ds.scope  = d.scope;
            if (d.dprLog) this._ds.dprLog = d.dprLog;
            // Legacy shared look-ahead → current corridor (per-corridor schema handled above).
            if (d.lookahead) this._ds.lookahead = d.lookahead;
          }
          if (d.permits)   this.permits   = d.permits;
          this.save();
          resolve();
        } catch(err) { reject(err); }
      };
      reader.readAsText(file);
    });
  }

  // Computed KPIs
  get kpis() {
    if (this.corridor === 'overall') return this._overallKpis();
    return this._kpisFor(this.corridors[this.corridor] || this.corridors.south, this.corridor);
  }

  _kpisFor(ds, corridorKey) {
    const log = ds.dprLog;
    const maxOf = (arr, key) => arr.reduce((m, r) => Math.max(m, r[key]||0), 0);
    const sumOf = (arr, key) => arr.reduce((s, r) => s + (r[key]||0), 0);
    // Active days = rows with ANY manpower OR production data
    const nonZero = log.filter(r => (r.indMP||0) + (r.dayMP||0) + (r.ngtMP||0) > 0);
    // For avgManpower, only use rows that have BOTH manpower AND a date logged
    const activeDays = log.filter(r =>
      r.date && ((r.indMP||0) + (r.dayMP||0) + (r.ngtMP||0) > 0)
    );
    const totalMPSum = activeDays.reduce((s,r) => s + (r.indMP||0) + (r.dayMP||0) + (r.ngtMP||0), 0);
    // Also compute from safeHrs as backup (safeHrs > 0 means people were on site)
    const safeHrsDays = log.filter(r => r.date && (r.safeHrs||0) > 0);

    // Excel-aligned KPI calculations
    const nearshoreCum  = maxOf(log,'nearshoreCum');                   // MAX(J)
    const offshoreCumM3 = maxOf(log,'offshoreCum');                    // MAX(N)
    const offTrench     = maxOf(log,'offTrenchCum');                   // MAX(AM)
    const nearTrench    = maxOf(log,'nearTrenchCum');                  // MAX(AO)
    const totalTrenchLinear = offTrench + nearTrench;                  // MAX(AM)+MAX(AO)
    const offRock       = maxOf(log,'rockOffCum');                     // MAX(AI)
    const nearRock      = maxOf(log,'rockOnCum');                      // MAX(AK) (stored under rockOnCum)
    const totalRock     = offRock + nearRock;
    // Avg Daily Manpower = AVG of W (totalMP) where W > 0
    const mpRows = log.filter(r => (r.totalMP||0) > 0);
    const avgManpower = mpRows.length
      ? Math.round(mpRows.reduce((s,r)=>s+(r.totalMP||0),0) / mpRows.length) : 0;
    // Days Logged = count rows where W > 0
    const daysLoggedW = mpRows.length;
    const nearshoreTotal = log.find(r => r.nearshoreTotal)?.nearshoreTotal || 11607;
    const offshoreTotal  = log.find(r => r.offshoreTotal)?.offshoreTotal  || 45101;
    // Use stored % from cols L/P if present, else compute
    const lastNearPct = [...log].reverse().find(r => r.nearshorePct)?.nearshorePct ?? 0;
    const lastOffPct  = [...log].reverse().find(r => r.offshorePct)?.offshorePct  ?? 0;
    const nearshorePctVal = lastNearPct ? lastNearPct*100 : (nearshoreTotal ? (nearshoreCum/nearshoreTotal)*100 : 0);
    const offshorePctVal  = lastOffPct  ? lastOffPct*100  : (offshoreTotal  ? (offshoreCumM3/offshoreTotal)*100 : 0);
    // Combined downtime (Weather + GPS) — hrs
    const gpsDT = sumOf(log, 'gpsDT');
    const weatherDT = sumOf(log, 'weatherDT');
    const totalDT = weatherDT + gpsDT;
    // Site downtime (Stoppage Days) = days manually marked with a ⛔ at the start of the
    // Downtime Reason cell (Excel col Z). Matches =COUNTIF(Z:Z,"⛔*"). This is NOT derived
    // from production, and is separate from partial Weather/GPS downtime HOURS (cols Y/AA).
    const siteDowntimeDays = log.filter(r => /^\s*⛔/.test(String(r.downtimeReason || ''))).length;
    // Reported vs Surveyed variance (Reported = peak cumulative; Surveyed = saved value)
    // East corridor has no survey reconciliation yet → never show survey/variance for East.
    const isEast = (corridorKey === 'east');
    const surveyedNear = isEast ? 0 : (Number(ds.inputs?.surveyedNear) || 0);
    const surveyedOff  = isEast ? 0 : (Number(ds.inputs?.surveyedOff)  || 0);
    const reportedNearPeak = nearshoreCum;     // peak cum, already maxOf(J)
    const reportedOffPeak  = offshoreCumM3;    // peak cum, already maxOf(N)
    const varianceNear = surveyedNear ? (reportedNearPeak - surveyedNear) : 0;
    const varianceOff  = surveyedOff  ? (reportedOffPeak  - surveyedOff)  : 0;
    return {
      // m³ excavation (cols J, N)
      nearshoreCum, offshoreCumM3,
      nearshorePct: nearshorePctVal,
      offshorePct:  offshorePctVal,
      totalExcM3:   nearshoreCum + offshoreCumM3,
      // Linear (cols AM, AO)
      totalTrenchLinear, offTrench, nearTrench,
      // Rock (AI, AK)
      totalRock, offRock, nearRock,
      // Manpower / safety / weather
      avgManpower,
      daysLogged:   daysLoggedW,
      cumSafeHrs:   maxOf(log,'cumSafeHrs'),                           // MAX(AA)
      weatherDT,                                                       // SUM(Y)
      gpsDT,                                                           // SUM(AA)
      totalDT,                                                         // weatherDT + gpsDT
      siteDowntimeDays,                                                // days with zero production
      totalIncidents: sumOf(log,'incidents'),                          // SUM(AF)
      // Surveyed quantities + variance
      surveyedNear, surveyedOff,
      reportedNearPeak, reportedOffPeak,
      varianceNear, varianceOff,
      // Permits
      totalPermits:   this.permits.length,
      approvedPermits: this.permits.filter(p => p.status === 'Approved').length,
      // Scope totals (used for combined % in overall)
      nearshoreTotal, offshoreTotal,
      // Legacy aliases
      totalTrenching: totalTrenchLinear,
      offshoreMax: offshoreCumM3, onshoreMax: nearshoreCum,
      onshoreCumM3: 0, onshorePct: 0,
    };
  }

  // Overall = East + South combined
  _overallKpis() {
    const e = this._kpisFor(this.corridors.east, 'east');
    const s = this._kpisFor(this.corridors.south, 'south');
    const add = (a,b) => (a||0) + (b||0);
    const nearshoreCum  = add(e.nearshoreCum,  s.nearshoreCum);
    const offshoreCumM3 = add(e.offshoreCumM3, s.offshoreCumM3);
    const nearTotal = add(e.nearshoreTotal, s.nearshoreTotal);
    const offTotal  = add(e.offshoreTotal,  s.offshoreTotal);
    const surveyedNear = add(e.surveyedNear, s.surveyedNear);
    const surveyedOff  = add(e.surveyedOff,  s.surveyedOff);
    const totalTrenchLinear = add(e.totalTrenchLinear, s.totalTrenchLinear);
    const totalRock = add(e.totalRock, s.totalRock);
    const mps = [e.avgManpower, s.avgManpower].filter(x => x > 0);
    return {
      nearshoreCum, offshoreCumM3,
      nearshorePct: nearTotal ? (nearshoreCum / nearTotal) * 100 : 0,
      offshorePct:  offTotal  ? (offshoreCumM3 / offTotal) * 100 : 0,
      totalExcM3:   nearshoreCum + offshoreCumM3,
      totalTrenchLinear, offTrench: add(e.offTrench, s.offTrench), nearTrench: add(e.nearTrench, s.nearTrench),
      totalRock, offRock: add(e.offRock, s.offRock), nearRock: add(e.nearRock, s.nearRock),
      avgManpower: mps.length ? Math.round(mps.reduce((a,b)=>a+b,0)/mps.length) : 0,
      daysLogged:  add(e.daysLogged, s.daysLogged),
      cumSafeHrs:  add(e.cumSafeHrs, s.cumSafeHrs),
      weatherDT:   add(e.weatherDT, s.weatherDT),
      gpsDT:       add(e.gpsDT, s.gpsDT),
      totalDT:     add(e.totalDT, s.totalDT),
      siteDowntimeDays: add(e.siteDowntimeDays, s.siteDowntimeDays),
      totalIncidents:   add(e.totalIncidents, s.totalIncidents),
      surveyedNear, surveyedOff,
      reportedNearPeak: nearshoreCum, reportedOffPeak: offshoreCumM3,
      varianceNear: surveyedNear ? nearshoreCum - surveyedNear : 0,
      varianceOff:  surveyedOff  ? offshoreCumM3 - surveyedOff  : 0,
      totalPermits:    this.permits.length,
      approvedPermits: this.permits.filter(p => p.status === 'Approved').length,
      nearshoreTotal: nearTotal, offshoreTotal: offTotal,
      totalTrenching: totalTrenchLinear,
      offshoreMax: offshoreCumM3, onshoreMax: nearshoreCum, onshoreCumM3: 0, onshorePct: 0,
    };
  }

  // Merged daily timeline for the Overall dashboard charts (date-union, summed)
  _overallLog() {
    const dated = (arr) => (arr || []).filter(r => r && r.date);
    const e = dated(this.corridors.east.dprLog);
    const s = dated(this.corridors.south.dprLog);
    const dates = Array.from(new Set([...e, ...s].map(r => r.date))).sort();
    const byDate = (arr) => { const m = {}; arr.forEach(r => { m[r.date] = r; }); return m; };
    const em = byDate(e), sm = byDate(s);
    const dailyKeys = ['nearshoreToday','offshoreToday','offTrenchToday','nearTrenchToday','rockOffToday','rockOnToday','indMP','dayMP','ngtMP','totalMP','equip','weatherDT','gpsDT','safeHrs','permits','hit','comm','tbt','incidents','audits'];
    const cumKeys   = ['nearshoreCum','offshoreCum','offTrenchCum','nearTrenchCum','rockOffCum','rockOnCum','cumSafeHrs'];
    const lastE = {}, lastS = {};
    const out = [];
    dates.forEach((d, i) => {
      const re = em[d], rs = sm[d];
      if (re) cumKeys.forEach(k => { if (re[k] != null) lastE[k] = re[k]; });
      if (rs) cumKeys.forEach(k => { if (rs[k] != null) lastS[k] = rs[k]; });
      const row = { dprNo: i+1, date: d, day: (re && re.day) || (rs && rs.day) || '', type: (re && re.type) || (rs && rs.type) || '' };
      dailyKeys.forEach(k => { row[k] = ((re && re[k]) || 0) + ((rs && rs[k]) || 0); });
      cumKeys.forEach(k => { row[k] = (lastE[k] || 0) + (lastS[k] || 0); });
      out.push(row);
    });
    return out;
  }
}

window.nfsStore = new NFSDataStore();
window.SAMPLE_DPR = SAMPLE_DPR;

// PM/CM/SE are PROJECT-WIDE (shared between corridors), exactly like orgChart: the
// canonical copy lives in SOUTH inputs. Read leads through this helper so the same
// name shows on both South and East regardless of which corridor is active.
window.nfsLead = function(store, key) {
  const s = (store && store.corridors && store.corridors.south && store.corridors.south.inputs)
         || (store && store.inputs) || {};
  return s[key] || '';
};

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel">

// NFS Tracker — Shared Components

// ─── Color tokens (McDermott + QatarEnergy) ────────────────
const C = {
  navy:     '#190AAF',
  lime:     '#92DA48',
  qeBlue:   '#0066B3',
  qeTeal:   '#00A878',
  white:    '#FFFFFF',
  pearl:    '#F5F8FF',
  charcoal: '#1A1A2E',
  softGrey: '#8E9AAF',
  lightGrey:'#ECEFF4',
  gold:     '#E8D9A3',
  amber:    '#E67E22',
  crimson:  '#C0392B',
  teal:     '#16A085',
  green:    '#27AE60',
  inputBlue:'#1F4E79',
};

window.C = C;

// ─── KPI Card (LAUTEC × InEight anatomy) ───────────────────
// Left-border accent in category color, small-caps label, large mono value, soft sub.
function KPICard({ label, value, sub, color = C.qeBlue, labelId, accent, trend }) {
  const accentColor = accent || color;
  const LabelComp = window.InlineLabel;
  return (
    <div style={{
      background: C.white,
      borderLeft: `2px solid ${accentColor}`,
      border: `1px solid ${C.lightGrey}`,
      borderLeftWidth: 2,
      borderLeftColor: accentColor,
      borderRadius: 4,
      boxShadow: '0 1px 3px rgba(25,10,175,0.08), 0 1px 2px rgba(25,10,175,0.04)',
      display: 'flex', flexDirection: 'column',
      padding: '12px 14px', minHeight: 92,
      gap: 4,
    }}>
      <div style={{
        fontSize: 9, fontWeight: 600, color: accentColor,
        textTransform: 'uppercase', letterSpacing: '0.12em',
        fontFamily: "'IBM Plex Sans', sans-serif",
        lineHeight: 1.2,
      }}>
        {LabelComp && labelId
          ? <LabelComp id={labelId} fallback={label} style={{ fontSize:9, fontWeight:600, color:accentColor, textTransform:'uppercase', letterSpacing:'0.12em' }} />
          : label}
      </div>
      <div style={{
        fontFamily: "'IBM Plex Mono', ui-monospace, Menlo, monospace",
        fontVariantNumeric: 'tabular-nums',
        fontSize: 28, fontWeight: 700, color: C.charcoal,
        lineHeight: 1.1, letterSpacing: '-0.01em',
        marginTop: 'auto',
      }}>
        {value}
      </div>
      {sub && <div style={{
        fontSize: 10, color: C.softGrey, lineHeight: 1.3,
        fontFamily: "'IBM Plex Sans', sans-serif",
      }}>{sub}</div>}
      {trend != null && (
        <div style={{
          marginTop: 4,
          display: 'flex', alignItems: 'center', gap: 4,
          fontSize: 10, fontWeight: 700,
          color: trend > 0 ? C.green : trend < 0 ? C.crimson : C.softGrey,
          fontFamily: "'IBM Plex Mono', monospace",
        }}>
          <span style={{ fontSize: 12 }}>{trend > 0 ? '↑' : trend < 0 ? '↓' : '→'}</span>
          <span>{trend > 0 ? '+' : ''}{trend.toFixed(1)}% vs prev 7d</span>
        </div>
      )}
    </div>
  );
}

// ─── Section Header ────────────────────────────────────────
function SectionHeader({ title, icon, actions, accent, subtitle }) {
  const acc = accent || C.lime;
  return (
    <div style={{
      background: C.navy, color: C.white,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '10px 14px',
      borderBottom: `2px solid ${acc}`,
      borderLeft: `3px solid ${acc}`,
      fontFamily: "'IBM Plex Sans', sans-serif",
    }}>
      <div>
        <div style={{ fontWeight: 700, fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase', color: C.lime }}>
          {icon && <span style={{ marginRight: 6, opacity: 0.9 }}>{icon}</span>}{title}
        </div>
        {subtitle && <div style={{ fontSize: 9, color: 'rgba(255,255,255,0.5)', marginTop: 2, fontWeight: 400, letterSpacing: '0.06em' }}>{subtitle}</div>}
      </div>
      {actions && <div style={{ display: 'flex', gap: 8, alignItems:'center' }}>{actions}</div>}
    </div>
  );
}

// ─── Table (editable or read-only) ─────────────────────────
function NFSTable({ cols, rows, onEdit, rowStyle, stickyHeader = true, compact = false,
  selectable = false, selectedKeys, onToggleRow, onToggleAll, rowKey = (_, idx) => idx }) {
  const thStyle = (col) => ({
    background: C.navy, color: C.lime,
    fontSize: compact ? 8 : 9, fontWeight: 700,
    textAlign: col.align || 'center',
    padding: compact ? '4px 4px' : '6px 6px',
    whiteSpace: 'nowrap',
    borderRight: `1px solid rgba(146,218,72,0.3)`,
    borderBottom: `2px solid ${C.lime}`,
    position: stickyHeader ? 'sticky' : 'static', top: 0, zIndex: 2,
    minWidth: col.width || 'auto',
  });

  const tdStyle = (col, rowIdx) => ({
    fontSize: compact ? 9 : 10,
    color: col.bold ? C.navy : C.charcoal,
    fontWeight: col.bold ? 700 : 400,
    textAlign: col.align || 'center',
    padding: compact ? '3px 4px' : '5px 6px',
    borderRight: `1px solid ${C.lightGrey}`,
    borderBottom: `1px solid ${C.lightGrey}`,
    background: rowIdx % 2 === 0 ? C.white : C.pearl,
    verticalAlign: 'middle',
    whiteSpace: col.wrap ? 'normal' : 'nowrap',
    overflow: 'hidden',
    textOverflow: 'ellipsis',
  });

  // ── Optional selection column (built once, gated by `selectable`) ──
  const visibleKeys = rows.map((r, i) => rowKey(r, i));
  const allSelected = selectable && rows.length > 0 && visibleKeys.every(k => selectedKeys.has(k));
  const someSelected = selectable && visibleKeys.some(k => selectedKeys.has(k));
  const selCol = {
    label: '', key: '__sel', editable: false, width: 30, align: 'center',
    renderHeader: () => (
      <input type="checkbox"
        ref={el => { if (el) el.indeterminate = !allSelected && someSelected; }}
        checked={allSelected}
        onChange={onToggleAll}
        title="Select all"
        style={{ cursor: 'pointer', accentColor: C.lime, width: 14, height: 14, verticalAlign: 'middle' }} />
    ),
    render: (row, ri) => (
      <input type="checkbox"
        checked={selectedKeys.has(rowKey(row, ri))}
        onChange={() => onToggleRow(rowKey(row, ri))}
        style={{ cursor: 'pointer', accentColor: C.navy, width: 14, height: 14, verticalAlign: 'middle' }} />
    ),
  };
  const allCols = selectable ? [selCol, ...cols] : cols;

  const totalW = allCols.reduce((s, c) => s + (c.width || 60), 0);

  return (
    <div style={{ overflowX: 'auto', overflowY: 'auto', maxHeight: 480 }}>
      <table style={{ width: '100%', minWidth: totalW, borderCollapse: 'collapse', tableLayout: 'fixed' }}>
        <colgroup>
          {allCols.map((col, ci) => (
            <col key={ci} style={{ width: col.width || 60 }} />
          ))}
        </colgroup>
        <thead>
          <tr>
            {allCols.map((col, ci) => (
              <th key={ci} style={thStyle(col)} colSpan={col.span || 1}>
                {col.renderHeader ? col.renderHeader() : col.label}
                {col.sub && <div style={{ fontSize: 7, color: C.lime, fontWeight: 400, opacity: 0.8 }}>{col.sub}</div>}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map((row, ri) => (
            <tr key={ri} style={rowStyle ? rowStyle(row, ri) : {}}>
              {allCols.map((col, ci) => {
                const raw = col.render ? col.render(row, ri) : row[col.key];
                const isEditable = onEdit && col.editable !== false && col.key;
                return (
                  <td key={ci} style={{
                    ...tdStyle(col, ri),
                    ...(rowStyle ? {} : {}),
                  }}
                    colSpan={col.span || 1}
                  >
                    {isEditable ? (
                      <EditableCell
                        value={row[col.key]}
                        type={col.type || 'text'}
                        options={col.options}
                        onChange={(v) => onEdit(ri, col.key, v)}
                        align={col.align}
                        fmt={col.fmt}
                      />
                    ) : (
                      <span style={{ color: col.color ? col.color(row) : undefined }}>
                        {col.fmt ? formatVal(raw, col.fmt) : (raw ?? '')}
                      </span>
                    )}
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ─── Reusable row-selection hook (each table owns its own Set) ───
function useSelection(getAllKeys) {
  const [selected, setSelected] = useState(() => new Set());
  const toggleRow = (k) => setSelected(prev => {
    const next = new Set(prev);
    next.has(k) ? next.delete(k) : next.add(k);
    return next;
  });
  const toggleAll = () => setSelected(prev => {
    const keys = getAllKeys();
    const next = new Set(prev);
    if (keys.length > 0 && keys.every(k => next.has(k))) keys.forEach(k => next.delete(k));
    else keys.forEach(k => next.add(k));
    return next;
  });
  const clear = () => setSelected(new Set());
  return { selected, setSelected, toggleRow, toggleAll, clear };
}

// ─── Reusable selection action bar (readable on light bg — never ghost) ───
function SelectionBar({ count, onDelete, onPdf }) {
  if (!count || (!onDelete && !onPdf)) return null;   // onDelete omitted for non-admins (Layer A)
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 14px',
      background: C.pearl, borderBottom: `1px solid ${C.lightGrey}` }}>
      <span style={{ fontSize: 11, fontWeight: 700, color: C.navy }}>{count} selected</span>
      {onDelete && <Btn size="xs" variant="danger" onClick={onDelete}>Delete Selected</Btn>}
      {onPdf && <Btn size="xs" variant="navy" onClick={onPdf} style={{ color: C.navy, borderColor: C.navy }}>Export PDF</Btn>}
    </div>
  );
}

function formatVal(v, fmt) {
  if (v === null || v === undefined || v === '') return '';
  if (fmt === '#,##0') return Number(v).toLocaleString('en-US', { maximumFractionDigits: 0 });
  if (fmt === '#,##0.0') return Number(v).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
  if (fmt === '0.0%') return (Number(v) * 100).toFixed(1) + '%';
  return v;
}
window.formatVal = formatVal;

// ─── Editable Cell ─────────────────────────────────────────
function EditableCell({ value, type, options, onChange, align, fmt }) {
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft]     = React.useState(value);
  const inputRef = React.useRef();

  React.useEffect(() => { setDraft(value); }, [value]);
  React.useEffect(() => { if (editing && inputRef.current) inputRef.current.focus(); }, [editing]);

  const commit = () => { setEditing(false); onChange(draft); };

  const displayVal = fmt ? formatVal(value, fmt) : (value ?? '');

  if (type === 'select' && options) {
    // Tolerate imported values not present in the options list (e.g. "Sunny")
    const opts = (value && !options.includes(value)) ? [value, ...options] : options;
    return (
      <select
        value={value ?? ''}
        onChange={e => onChange(e.target.value)}
        style={{
          width: '100%', border: '1px solid rgba(25,10,175,0.15)', borderRadius: 3,
          background: '#FFFFFF', fontSize: 9, color: C.inputBlue, cursor: 'pointer',
          textAlign: 'left', padding: '1px 15px 1px 4px', appearance: 'auto',
        }}
      >
        <option value=""></option>
        {opts.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    );
  }

  if (editing) {
    return (
      <input
        ref={inputRef}
        type={type === 'number' ? 'number' : type === 'date' ? 'date' : 'text'}
        value={draft ?? ''}
        onChange={e => setDraft(type === 'number' ? (e.target.value === '' ? '' : Number(e.target.value)) : e.target.value)}
        onBlur={commit}
        onKeyDown={e => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') setEditing(false); }}
        style={{
          width: '100%', border: `1px solid ${C.lime}`, background: '#FFFFF0',
          fontSize: 9, color: C.inputBlue, padding: '1px 2px',
          textAlign: align || 'center',
        }}
      />
    );
  }

  return (
    <span
      onClick={() => setEditing(true)}
      style={{
        display: 'block', width: '100%', cursor: 'text',
        minHeight: 14, color: value !== null && value !== '' ? C.inputBlue : C.softGrey,
        textAlign: align || 'center', fontSize: 9,
        whiteSpace: 'inherit', overflow: 'hidden', textOverflow: 'ellipsis',
      }}
      title={displayVal !== '' && displayVal !== null ? String(displayVal) : 'Click to edit'}
    >
      {displayVal !== '' && displayVal !== null ? String(displayVal) : '—'}
    </span>
  );
}

// ─── Badge ─────────────────────────────────────────────────
function Badge({ text, color, bg }) {
  const map = {
    'Approved':                  { bg: '#D5F5E3', color: '#1A7A4A' },
    'Under RLIC Review':         { bg: '#FCF3CF', color: '#9A7D0A' },
    'Under QG-LNG Review':       { bg: '#FCF3CF', color: '#9A7D0A' },
    'Permit with QE-LNG Review': { bg: '#FDEBD0', color: '#A04000' },
    'Pending CRS':               { bg: '#FDEBD0', color: '#A04000' },
    'Concurrence Received':      { bg: '#D6EAF8', color: '#1A5276' },
    'Closed':                    { bg: '#EAECEE', color: '#5D6D7E' },
    'High':   { bg: '#FADBD8', color: C.crimson },
    'Medium': { bg: '#FCF3CF', color: '#9A7D0A' },
    'Low':    { bg: '#D5F5E3', color: '#1A7A4A' },
    'OVERDUE':   { bg: '#FADBD8', color: C.crimson },
    'TODAY':     { bg: '#FDEBD0', color: '#A04000' },
    'TOMORROW':  { bg: '#FCF3CF', color: '#9A7D0A' },
  };
  const style = map[text] || { bg: bg || C.lightGrey, color: color || C.charcoal };
  return (
    <span style={{
      display: 'inline-block', padding: '2px 7px', borderRadius: 3,
      fontSize: 9, fontWeight: 700, background: style.bg, color: style.color,
      whiteSpace: 'nowrap',
    }}>{text}</span>
  );
}

// ─── Mini Chart (SVG sparkline) ─────────────────────────────
function Sparkline({ data, color = C.lime, height = 40, fill = false }) {
  if (!data || data.length < 2) return null;
  const vals = data.filter(v => v != null && !isNaN(v));
  if (vals.length < 2) return null;
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const w = 200, h = height;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return `${x},${y}`;
  });
  const path = `M${pts.join('L')}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', height }} preserveAspectRatio="none">
      {fill && (
        <path d={`${path}L${w},${h}L0,${h}Z`}
          fill={color} fillOpacity={0.15} />
      )}
      <path d={path} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" />
    </svg>
  );
}

// ─── Progress Bar ───────────────────────────────────────────
function ProgressBar({ value, max, color = C.lime, label, showPct = true }) {
  const pct = max ? Math.min(100, (value / max) * 100) : 0;
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 9, color: C.softGrey, marginBottom: 3 }}>
        {label && <span>{label}</span>}
        {showPct && <span style={{ fontWeight: 700, color }}>{pct.toFixed(1)}%</span>}
      </div>
      <div style={{ background: C.lightGrey, borderRadius: 3, height: 8, overflow: 'hidden' }}>
        <div style={{ background: color, width: `${pct}%`, height: '100%', borderRadius: 3,
          transition: 'width 0.5s ease' }} />
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 8, color: C.softGrey, marginTop: 2 }}>
        <span>{Number(value).toLocaleString()}</span>
        <span>/ {Number(max).toLocaleString()}</span>
      </div>
    </div>
  );
}

// ─── Btn ───────────────────────────────────────────────────
function Btn({ children, onClick, variant = 'primary', size = 'sm', icon, style: extraStyle }) {
  const styles = {
    primary: { bg: C.lime,   color: C.navy,  border: C.lime },
    navy:    { bg: 'transparent',   color: C.white, border: 'rgba(255,255,255,0.4)' },
    danger:  { bg: C.crimson,color: C.white, border: C.crimson },
    ghost:   { bg: 'transparent', color: 'rgba(255,255,255,0.85)', border: 'rgba(255,255,255,0.25)' },
    teal:    { bg: C.qeTeal, color: C.white, border: C.qeTeal },
    green:   { bg: '#27AE60', color: C.white, border: '#27AE60' },
    lime:    { bg: C.lime, color: C.navy, border: C.lime },
  };
  const s = styles[variant] || styles.primary;
  const pad = size === 'xs' ? '4px 9px' : size === 'sm' ? '6px 12px' : '8px 16px';
  const fs  = size === 'xs' ? 10 : size === 'sm' ? 11 : 12;
  return (
    <button
      onClick={onClick}
      style={{
        background: s.bg, color: s.color, border: `1px solid ${s.border}`,
        borderRadius: 3, padding: pad, fontSize: fs, fontWeight: 600,
        cursor: 'pointer',
        fontFamily: "'IBM Plex Sans', sans-serif",
        letterSpacing: '0.02em',
        display: 'inline-flex', alignItems: 'center', gap: 6,
        whiteSpace: 'nowrap',
        ...extraStyle,
      }}
    >
      {icon && <span style={{ display:'inline-flex' }}>{icon}</span>}{children}
    </button>
  );
}

// ─── Toast ─────────────────────────────────────────────────
function Toast({ msg, onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
      background: C.navy, color: C.lime, padding: '10px 18px',
      borderRadius: 4, fontSize: 12, fontWeight: 600,
      border: `1px solid ${C.lime}`, boxShadow: '0 4px 20px rgba(0,0,0,0.3)',
    }}>
      ✓ {msg}
    </div>
  );
}

// ─── Modal ─────────────────────────────────────────────────
function Modal({ title, children, onClose, width = 600 }) {
  return (
    <div style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 8000,
    }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{
        background: C.white, borderRadius: 6, width, maxWidth: '95vw',
        maxHeight: '90vh', overflow: 'auto',
        border: `2px solid ${C.navy}`, boxShadow: '0 8px 40px rgba(0,0,0,0.4)',
      }}>
        <div style={{
          background: C.navy, color: C.lime, padding: '12px 16px',
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          fontWeight: 700, fontSize: 13,
        }}>
          <span>{title}</span>
          <button onClick={onClose} style={{
            background: 'none', border: 'none', color: C.lime,
            fontSize: 18, cursor: 'pointer', lineHeight: 1,
          }}>✕</button>
        </div>
        <div style={{ padding: 20 }}>{children}</div>
      </div>
    </div>
  );
}

// ─── FormRow ───────────────────────────────────────────────
function FormRow({ label, children }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '160px 1fr', gap: 8, alignItems: 'center', marginBottom: 8 }}>
      <label style={{ fontSize: 11, fontWeight: 600, color: C.charcoal }}>{label}</label>
      {children}
    </div>
  );
}

function FormInput({ value, onChange, type = 'text', placeholder }) {
  return (
    <input
      type={type}
      value={value || ''}
      onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      style={{
        border: `1px solid ${C.softGrey}`, borderRadius: 3, padding: '5px 8px',
        fontSize: 11, color: C.inputBlue, background: '#FFFFF8', width: '100%',
        fontFamily: 'inherit',
      }}
    />
  );
}

// Export all to window
Object.assign(window, {
  C, KPICard, SectionHeader, NFSTable, EditableCell, formatVal,
  Badge, Sparkline, ProgressBar, Btn, Toast, Modal, FormRow, FormInput,
});

</script>

<script type="text/babel">
// NFS Tracker — Shared helpers for view components

const fmtDDMMMYYYY = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return String(iso);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
};

const fmtNum = (n, dp = 0) => {
  if (n === null || n === undefined || n === '') return '0';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: dp, maximumFractionDigits: dp });
};

const fmtPct = (n, dp = 1) => {
  if (n === null || n === undefined || isNaN(n)) return '0%';
  return Number(n).toFixed(dp) + '%';
};

Object.assign(window, { fmtDDMMMYYYY, fmtNum, fmtPct });

// ─── Collapsible card ────────────────────────────────
function Collapsible({ title, icon, badge, defaultOpen = true, children }) {

  const s = new Date(inp.projectStart), e = new Date(inp.projectEnd), n = new Date();
  const MS_DAY = 86400000;
  const daysElapsed = Math.max(0, Math.round((n - s) / MS_DAY));
  const daysTotal   = Math.max(1, Math.round((e - s) / MS_DAY));
  const daysLeft    = Math.max(0, daysTotal - daysElapsed);
  const pctTime = Math.min(100, Math.max(0, ((n - s) / (e - s)) * 100));

  const scopeNear = store.scope.find(x => /excavation nearshore/i.test(x.activity || ''));
  const scopeOff  = store.scope.find(x => /excavation offshore/i.test(x.activity || ''));

  const excPct = totalExcTarget ? (totalExcDone / totalExcTarget * 100) : 0;

  // ── Reported vs Surveyed Variance ─────────────────────────────
  const surveyedNear = Number(inp.surveyedNear) || 0;
  const surveyedOff  = Number(inp.surveyedOff)  || 0;
  const reportedNear = kpis.reportedNearPeak || 0;
  const reportedOff  = kpis.reportedOffPeak  || 0;
  const varNear   = surveyedNear ? (surveyedNear - reportedNear) : 0;
  const varOff    = surveyedOff  ? (surveyedOff  - reportedOff)  : 0;
  const varNearPct = reportedNear ? (varNear / reportedNear * 100) : 0;
  const varOffPct  = reportedOff  ? (varOff  / reportedOff  * 100) : 0;
  const fmtVar = (v) => (v > 0 ? '+' : v < 0 ? '−' : '±') + fmtNum(Math.abs(v));
  const fmtVarPct = (p) => (p > 0 ? '+' : p < 0 ? '−' : '') + Math.abs(p).toFixed(1) + '%';
  const varColor = (v) => v < 0 ? '#C0392B' : (v > 0 ? '#27AE60' : '#27AE60');

  // ── Trenching breakdown — latest non-empty cumulative values ──
  const latestOffTrench  = [...log].reverse().find(r => (r.offTrenchCum  || 0) > 0)?.offTrenchCum  || 0;

  const scopeRows = store.scope
    .filter(item => realActivities.some(k => (item.activity || '').toLowerCase().includes(k)))

  const thisWedStart = new Date(_latestDate); thisWedStart.setDate(_latestDate.getDate() - _sinceWed);
  const lastWedStart = new Date(thisWedStart); lastWedStart.setDate(thisWedStart.getDate() - 7);
  const inRange = (r, start, endExcl) => { const d = _toDate(r.date); return d >= start && d < endExcl; };
  // this week: [thisWedStart, latest+1day) · last week: [lastWedStart, thisWedStart)
  const _endThis = new Date(_latestDate); _endThis.setDate(_latestDate.getDate() + 1);
  const lastN = log.filter(r => inRange(r, thisWedStart, _endThis));
  const prevN = log.filter(r => inRange(r, lastWedStart, thisWedStart));
  const sumT = (arr, key) => arr.reduce((s, r) => s + (Number(r[key]) || 0), 0);
  // Use today values; treat negatives as survey adjustments (excluded from "week production")
  const todaySafe = (r, key) => Math.max(0, Number(r[key]) || 0);
  const sumProd = (arr, key) => arr.reduce((s, r) => s + todaySafe(r, key), 0);

  const thisWeek = {
    near: sumProd(lastN, 'nearshoreToday'),
    off:  sumProd(lastN, 'offshoreToday'),
    offTr: sumProd(lastN, 'offTrenchToday'),
    nearTr: sumProd(lastN, 'nearTrenchToday'),
    offRk: sumProd(lastN, 'rockOffToday'),
    nearRk: sumProd(lastN, 'rockOnToday'),
    safe: sumT(lastN, 'safeHrs'),
    incidents: sumT(lastN, 'incidents'),
  };
  const lastWeek = {
    near: sumProd(prevN, 'nearshoreToday'),
    off:  sumProd(prevN, 'offshoreToday'),
    offTr: sumProd(prevN, 'offTrenchToday'),
    nearTr: sumProd(prevN, 'nearTrenchToday'),
    offRk: sumProd(prevN, 'rockOffToday'),
    nearRk: sumProd(prevN, 'rockOnToday'),
    safe: sumT(prevN, 'safeHrs'),
    incidents: sumT(prevN, 'incidents'),
  };
  thisWeek.exc = thisWeek.near + thisWeek.off;
  lastWeek.exc = lastWeek.near + lastWeek.off;
  thisWeek.tr  = thisWeek.offTr + thisWeek.nearTr;
  lastWeek.tr  = lastWeek.offTr + lastWeek.nearTr;
  thisWeek.rk  = thisWeek.offRk + thisWeek.nearRk;
  lastWeek.rk  = lastWeek.offRk + lastWeek.nearRk;
  const delta = (a, b) => a - b;
  const deltaStr = (a, b, suffix = '') => {
    const d = delta(a, b);
    const sign = d > 0 ? '▲' : (d < 0 ? '▼' : '◆');
    const color = d > 0 ? '#27AE60' : (d < 0 ? '#C0392B' : '#8E9AAF');
    return { sign, color, val: `${d > 0 ? '+' : (d < 0 ? '−' : '±')}${fmtNum(Math.abs(d))}${suffix}` };
  };

  // ── HSE & downtime totals ─────────────────────────────────────
  const totalHIT    = sumT(log, 'hit');
  const totalTBT    = sumT(log, 'tbt');
  const totalComm   = sumT(log, 'comm');
  const totalAudits = sumT(log, 'audits');
  const totalWeatherDT = sumT(log, 'weatherDT');
  const totalGPSDT     = sumT(log, 'gpsDT');
  const totalDT        = totalWeatherDT + totalGPSDT;
  // Site downtime (Stoppage Days) = days manually marked with a ⛔ at the start of the
  // Downtime Reason cell (Excel col Z) — matches =COUNTIF(Z:Z,"⛔*"). Not derived from production.
  const siteDowntimeDays = log.filter(r => /^\s*⛔/.test(String(r.downtimeReason || ''))).length;
  // Equipment latest non-empty (with the date that count was logged)
  const _equipRow = [...log].reverse().find(r => (r.equip || 0) > 0);
  const latestEquip = _equipRow?.equip || 0;
  const latestEquipDate = _equipRow?.date || '';

  // ── Top 3 downtime reasons ────────────────────────────────────
  // Attribute hours to the cause that matches the reason text, so Weather rows
  // count weather hours and GPS rows count GPS hours (they were being summed
  // together before, which inflated every reason's total).
  const reasonAgg = {};
  log.forEach(r => {
    const reason = (r.downtimeReason || '').trim();
    if (!reason) return;
    const w = Number(r.weatherDT) || 0;
    const g = Number(r.gpsDT) || 0;
    const rl = reason.toLowerCase();
    const isWeather = rl.includes('weather') || rl.includes('wind') || rl.includes('sea');
    const isGps = rl.includes('gps') || rl.includes('dgps') || rl.includes('rtk') || rl.includes('signal');
    let dt;
    if (isWeather && isGps) dt = w + g;       // combined cause → both
    else if (isWeather)     dt = w;            // weather-only → weather hours
    else if (isGps)         dt = g;            // gps-only → gps hours
    else                    dt = w + g;        // unclassified → total downtime that day
    if (dt === 0) return;
    if (!reasonAgg[reason]) reasonAgg[reason] = { count: 0, hours: 0 };
    reasonAgg[reason].count++;
    reasonAgg[reason].hours += dt;
  });
  const topReasons = Object.entries(reasonAgg)
    .sort(([, a], [, b]) => b.hours - a.hours)
    .slice(0, 3)
    .map(([reason, x]) => ({ reason, count: x.count, hours: x.hours }));

  // ── Notable events (notes from last 7 DPRs) ───────────────────
  const notableEvents = lastN
    .filter(r => (r.notes || '').trim())
    .map(r => ({ date: r.date, dpr: r.dprNo, note: r.notes.trim() }));

  // ── Permits breakdown ─────────────────────────────────────────
  const PERMIT_STS    = ['Approved','Under RLIC Review','Under QG-LNG Review','Pending CRS','Permit with QE-LNG Review','Concurrence Received','Closed'];
  const PERMIT_COLORS = ['#27AE60','#F39C12','#E67E22','#E74C3C','#8E44AD','#16A085','#95A5A6'];
  const permitBreak = PERMIT_STS.map((stName, i) => ({
    status: stName,
    count:  store.permits.filter(p => p.status === stName).length,
    color:  PERMIT_COLORS[i],
  })).filter(x => x.count > 0);
  const permitTotal = store.permits.length || 1;

  // ── Team (filter out empty names) ─────────────────────────────
  const team = (inp.teamMembers || []).filter(m => (m.name || '').trim());
  // Remove the "Prepared By" row from team grid — name appears in signature box only
  const teamGrid = team.filter(m => !/prepared\s*by/i.test(m.role || ''));

  // ── Status paragraph ──────────────────────────────────────────
  const statusText = `Schedule: day ${fmtNum(daysElapsed)} of ${fmtNum(daysTotal)} (${daysLeft > 0 ? fmtNum(daysLeft) + ' days remaining toward the ' + fmtDDMMMYYYY(inp.projectEnd) + ' target' : 'planned end reached'}). ` +
    `Work done to date: excavation ${fmtNum(totalExcDone)} m³ of ${fmtNum(totalExcTarget)} m³ (${excPct.toFixed(1)}% of total scope), and ${fmtNum(kpis.totalTrenchLinear)} m of trench cut (${fmtNum(latestNearTrench)} m nearshore + ${fmtNum(latestOffTrench)} m offshore).`;

  // ── Logo block ────────────────────────────────────────────────
  const logoBlock = inp.logoData
    ? `<img src="${inp.logoData}" style="max-height:50px;max-width:140px;background:#fff;padding:4px;border-radius:3px;" alt="logo"/>`
    : `<img src="${window.MCD_LOGO}" style="height:50px;width:50px;object-fit:contain;background:#fff;padding:5px;border-radius:6px;" alt="McDermott"/>`;

  // ── Footer text ───────────────────────────────────────────────
  const footerLine = (pageNum) => `
    <div class="pg-footer">
      <span>Generated <strong>${dateStr}</strong> &nbsp;·&nbsp; Prepared by: <strong>${inp.preparedBy || '—'}</strong></span>
      <span>${inp.docRef || ''}</span>
      <span>Page <strong>${pageNum}</strong> of 4</span>
    </div>`;

  // ── Render HTML ───────────────────────────────────────────────
  w.document.write(`<!DOCTYPE html><html><head><title>NFS Weekly Report — ${dateStr}</title>

    }
    .pg-footer strong { color: #190AAF; }

    @media print {
      .controls { display: none }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact }
    }
  </style></head><body>
  <button class="controls" onclick="window.print()">🖨 Print / Save PDF</button>

  <!-- ════════════ PAGE 1 — EXECUTIVE SUMMARY ════════════ -->
  <div class="page">

          { lbl: 'Safe Manhours',   t: thisWeek.safe,      l: lastWeek.safe },
          { lbl: 'Incidents',       t: thisWeek.incidents, l: lastWeek.incidents, invert: true },
        ];
        return items.map(it => {
          const d = it.t - it.l;
          const sign = d > 0 ? '▲' : (d < 0 ? '▼' : '◆');
          // For incidents, ▲ is bad (red) and ▼ is good (green)

            <div class="delta" style="color:${color};">${sign} ${d > 0 ? '+' : (d < 0 ? '−' : '±')}${fmtNum(Math.abs(d))} <span class="vs">vs last week (${fmtNum(it.l)})</span></div>

    <div class="section-title">Cumulative Excavation (m³)</div>

  <!-- ════════════ PAGE 3 — HSE & SITE CONDITIONS ════════════ -->
  <div class="page">
    <div class="lime-bar"></div>
    <div class="navy-band">
      <div><h1>HSE &amp; SITE CONDITIONS</h1><div class="sub">Safe manhours, downtime &amp; weather impact</div></div>

  <!-- ════════════ PAGE 4 — PERMITS & TEAM ════════════ -->
  <div class="page">

          <div class="legend">
            ${permitBreak.map(p => `<div class="legend-row"><span class="legend-sw" style="background:${p.color}"></span><span>${p.status}</span><span style="margin-left:auto;font-weight:700;color:#190AAF;">${p.count}</span></div>`).join('')}
          </div>
        </div>
      </div>
      <div>
        <div class="section-title">Permit Breakdown</div>
        <table>
          <tr><th>Status</th><th>Count</th><th>%</th></tr>
          ${permitBreak.map(p => `<tr><td style="text-align:left;"><span style="display:inline-block;width:8px;height:8px;background:${p.color};border-radius:2px;margin-right:6px;"></span>${p.status}</td><td style="text-align:center;font-weight:700;">${p.count}</td><td style="text-align:center;">${(p.count / permitTotal * 100).toFixed(1)}%</td></tr>`).join('')}
          <tr><td style="text-align:left;font-weight:700;background:#F5F8FF;">Total</td><td style="text-align:center;font-weight:700;background:#F5F8FF;">${store.permits.length}</td><td style="text-align:center;font-weight:700;background:#F5F8FF;">100%</td></tr>
        </table>

        <div class="section-title">Notable Events This Week</div>
        <div class="events-box">
          ${notableEvents.length === 0
            ? '<div style="font-size:8pt;color:#8E9AAF;font-style:italic;">No notable events recorded in the last 7 DPRs.</div>'
            : notableEvents.map(e => `<div class="event-item">
                <div class="ev-meta">DPR-${e.dpr} · ${fmtDDMMMYYYY(e.date)}</div>
                <div>${e.note.length > 240 ? e.note.slice(0, 240) + '…' : e.note}</div>
              </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="section-title">Project Team</div>
    <div class="team-grid">
      ${teamGrid.map(m => `<div class="team-card"><div class="role">${m.role}</div><div class="name">${m.name}</div></div>`).join('')}
    </div>

    <div style="margin-top:10px;display:flex;justify-content:flex-end;">
      <div style="text-align:right;">
        <div style="border-top:1px solid #190AAF;width:180px;padding-top:3px;">
          <div style="font-size:7pt;color:#8E9AAF;text-transform:uppercase;letter-spacing:0.5px;">Prepared by</div>
