          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── PERMITS REGISTER ──────────────────────────────────────
const PERMIT_STATUSES = ['Approved','Under RLIC Review','Under QG-LNG Review','Pending CRS','Permit with QE-LNG Review','Concurrence Received','Closed'];

function PermitsRegister({ store, onUpdate }) {
  const isAdmin = !!window.__nfsIsAdmin;   // Layer A: gate delete UI
  const [rows, setRows] = useState(store.permits);

  const save = (updated) => { setRows(updated); store.permits = updated; onUpdate(); };

  // ─── Multi-row selection (keyed by index into unfiltered rows) ───
  const { selected, toggleRow: toggleOne, toggleAll, clear: clearSelection } =
    useSelection(() => rows.map((_, i) => i));
  const deleteSelected = () => {
    if (!confirm(`Delete ${selected.size} selected permit${selected.size === 1 ? '' : 's'}?`)) return;
    save(rows.filter((_, i) => !selected.has(i)));
    clearSelection();
  };

  const handleEdit = (ri, key, val) => save(rows.map((r,i) => i===ri?{...r,[key]:val}:r));
  const addRow = () => save([...rows, { jdb:'', applied:'', task:'', desc:'', type:'', issued:'', expiry:'', permitNo:'', status:'Under RLIC Review', holder:'Najas', remarks:'' }]);
  const deleteRow = (ri) => { if(!confirm('Delete this permit?')) return; save(rows.filter((_,i)=>i!==ri)); };

  const daysLeft = (expiry) => {
    if(!expiry) return null;
    const d = Math.ceil((new Date(expiry)-new Date())/(1000*60*60*24));
    if(isNaN(d)) return null;
    return d;
  };

  const kpiData = [
    { label:'Total',        value:rows.length,                                                    color:C.qeBlue },
    { label:'Approved',     value:rows.filter(p=>p.status==='Approved').length,                  color:C.qeTeal },
    { label:'Under Review', value:rows.filter(p=>['Under RLIC Review','Under QG-LNG Review','Permit with QE-LNG Review'].includes(p.status)).length, color:C.amber },
    { label:'Pending CRS',  value:rows.filter(p=>p.status==='Pending CRS').length,               color:C.amber },
    { label:'Closed',       value:rows.filter(p=>p.status==='Closed').length,                    color:C.softGrey },
    { label:'Approval Rate',value:`${rows.length?Math.round(rows.filter(p=>p.status==='Approved').length/rows.length*100):0}%`, color:C.lime },
  ];

  const cols = [
    { label:'#', key:'_no', editable:false, width:28, render:(_,ri)=>ri+1, color:()=>C.softGrey },
    { label:'JDB', key:'jdb', width:52 },
    { label:'eCPW Applied', key:'applied', type:'date', width:88 },
    { label:'Task No.', key:'task', width:62 },
    { label:'Description', key:'desc', width:240, wrap:true, align:'left' },
    { label:'Permit Type', key:'type', width:100 },
    { label:'Issue Date', key:'issued', type:'date', width:88 },
    { label:'Expiry Date', key:'expiry', type:'date', width:88 },
    { label:'Days Left', key:'_days', editable:false, width:68,
      render:(r)=>{
        const d = daysLeft(r.expiry);
        if(d===null) return <span style={{color:C.softGrey}}>—</span>;
        if(d<0) return <Badge text="EXPIRED" />;
        if(d===0) return <Badge text="TODAY" />;
        if(d<=7) return <span style={{color:C.crimson,fontWeight:700}}>{d}d</span>;
        if(d<=30) return <span style={{color:C.amber,fontWeight:700}}>{d}d</span>;
        return <span style={{color:C.qeTeal}}>{d}d</span>;
      }
    },
    { label:'Permit No.', key:'permitNo', width:70 },
    { label:'Status', key:'status', type:'select', options:PERMIT_STATUSES, width:120,
      render:(r,ri)=>(
        <select value={r.status||''} onChange={e=>handleEdit(ri,'status',e.target.value)}
          style={{width:'100%',border:'none',background:'transparent',fontSize:9,cursor:'pointer'}}>
          {PERMIT_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      )
    },
    { label:'Holder', key:'holder', width:60 },
    { label:'Remarks', key:'remarks', width:140, wrap:true, align:'left' },
    { label:'Del', key:'_del', editable:false, width:36,
      render:(_,ri)=>(
        <button onClick={()=>deleteRow(ri)} style={{background:'none',border:'none',color:C.crimson,cursor:'pointer',fontSize:13}}>✕</button>
      )
    },
  ];

  const rowStyle = (r) => {
    if(r.status==='Approved') return { background:'#F0FBF4' };
    if(['Under RLIC Review','Under QG-LNG Review','Permit with QE-LNG Review'].includes(r.status)) return { background:'#FEFCE8' };
    if(r.status==='Pending CRS') return { background:'#FFF8F0' };
    return {};
  };

  return (
    <div style={{ padding:16, display:'flex', flexDirection:'column', gap:14 }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', gap:10 }}>
        {kpiData.map(k=><KPICard key={k.label} label={k.label} value={k.value} color={k.color} size="sm" />)}
      </div>

      <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden' }}>
        <SectionHeader
          title={`Permits Register — eCPW Tracking (${rows.length} permits)`}
          actions={<Btn size="xs" variant="lime" onClick={addRow}>Add Permit</Btn>}
        />
        <SelectionBar count={selected.size} onDelete={isAdmin ? deleteSelected : undefined} />
        <NFSTable cols={isAdmin ? cols : cols.filter(c => c.key !== '_del')} rows={rows} onEdit={handleEdit} rowStyle={rowStyle} compact={true}
          selectable selectedKeys={selected} onToggleRow={toggleOne} onToggleAll={toggleAll}
          rowKey={(_, i) => i} />
      </div>
    </div>
  );
}

// ─── LOOK-AHEAD ────────────────────────────────────────────
function LookAhead({ store, onUpdate, corridor='south', setCorridor }) {
  const isAdmin = !!window.__nfsIsAdmin;   // Layer A: gate delete UI
  store.corridor = corridor;               // Look-Ahead is now per-corridor (South / East kept separate)
  const [rows, setRows] = useState(store.lookahead);

  const save = (updated) => { setRows(updated); store.lookahead = updated; onUpdate(); };
  const handleEdit = (ri, key, val) => save(rows.map((r,i)=>i===ri?{...r,[key]:val}:r));
  const addRow = () => save([...rows, { area:'', eventType:'', date:'', description:'', priority:'Medium', assigned:'', notes:'' }]);
  const deleteRow = (ri) => { if(!confirm('Delete this item?')) return; save(rows.filter((_,i)=>i!==ri)); };

  // ─── Multi-row selection (keyed by index into ORIGINAL rows, survives sorting) ───
  const { selected, toggleRow: toggleOne, toggleAll, clear: clearSelection } =
    useSelection(() => rows.map((_, i) => i));
  const deleteSelected = () => {
    if (!confirm(`Delete ${selected.size} selected item${selected.size === 1 ? '' : 's'}?`)) return;
    save(rows.filter((_, i) => !selected.has(i)));
    clearSelection();
  };

  const daysOut = (date) => {
    if(!date) return null;
    return Math.ceil((new Date(date)-new Date())/(1000*60*60*24));
  };

  const sorted = [...rows].sort((a,b)=>{
    const da = daysOut(a.date), db = daysOut(b.date);
    if(da===null) return 1; if(db===null) return -1;
    return da-db;
  });

  const kpiData = [
    { label:'Tomorrow',    value:rows.filter(r=>daysOut(r.date)===1).length,              color:C.crimson },
    { label:'Next 3 Days', value:rows.filter(r=>{const d=daysOut(r.date);return d!==null&&d>=0&&d<=3}).length, color:C.amber },
    { label:'Next 7 Days', value:rows.filter(r=>{const d=daysOut(r.date);return d!==null&&d>=0&&d<=7}).length, color:C.qeTeal },
    { label:'Overdue',     value:rows.filter(r=>{const d=daysOut(r.date);return d!==null&&d<0}).length,  color:C.crimson },
    { label:'Total',       value:rows.filter(r=>r.date).length,                                          color:C.qeBlue },
  ];

  const EVENT_TYPES = ['Permit Renewal','Production Milestone','HSE Audit','Progress Meeting','Survey','Inspection','Mobilization','Demobilization','Other'];
  const PRIORITIES  = ['High','Medium','Low'];

  const cols = [
    { label:'#', key:'_no', editable:false, width:28, render:(_,ri)=>ri+1, color:()=>C.softGrey },
    { label:'Area', key:'area', width:80 },
    { label:'Event Type', key:'eventType', type:'select', options:EVENT_TYPES, width:110 },
    { label:'Date', key:'date', type:'date', width:90 },
    { label:'Days Out', key:'_days', editable:false, width:80,
      render:(r)=>{
        const d=daysOut(r.date);
        if(d===null) return '—';
        if(d<0)  return <Badge text="OVERDUE" />;
        if(d===0) return <Badge text="TODAY" />;
        if(d===1) return <Badge text="TOMORROW" />;
        if(d<=7)  return <span style={{color:C.amber,fontWeight:700}}>{d} days</span>;
        return <span style={{color:C.qeTeal}}>{d} days</span>;
      }
    },
    { label:'Description', key:'description', width:260, wrap:true, align:'left' },
    { label:'Priority', key:'priority', type:'select', options:PRIORITIES, width:70,
      render:(r,ri)=><Badge text={r.priority||'Medium'} />
    },
    { label:'Assigned', key:'assigned', width:80 },
    { label:'Notes', key:'notes', width:160, wrap:true, align:'left' },
    { label:'Del', key:'_del', editable:false, width:36,
      render:(_,ri)=>(
        <button onClick={()=>deleteRow(sorted.indexOf(sorted[ri]))} style={{background:'none',border:'none',color:C.crimson,cursor:'pointer',fontSize:13}}>✕</button>
      )
    },
  ];

  const rowStyle = (r) => {
    const d = daysOut(r.date);
    if(d===null) return {};
    if(d<0)  return { background:'#FDF0EE' };
    if(d===0) return { background:'#FFF8F0' };
    if(d<=3)  return { background:'#FEFCE8' };
    if(d<=7)  return { background:'#F0FDF4' };
    return {};
  };

  return (
    <div style={{ padding:16, display:'flex', flexDirection:'column', gap:14 }}>
      {/* Corridor selector — Look-Ahead is kept separately for South & East (same switch as the other tabs). */}
      <CorridorSwitch value={corridor} onChange={c => setCorridor && setCorridor(c)} options={[
        { id:'south', label:'South Corridor' }, { id:'east', label:'East Corridor' }
      ]} />
      <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:10 }}>
        {kpiData.map(k=><KPICard key={k.label} label={k.label} value={k.value} color={k.color} size="sm" />)}
      </div>

      <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden' }}>
        <SectionHeader
          title={`Look-Ahead — Upcoming Activities (${rows.length} items)`}
          actions={<Btn size="xs" variant="lime" onClick={addRow}>Add Item</Btn>}
        />
        <SelectionBar count={selected.size} onDelete={isAdmin ? deleteSelected : undefined} />
        <NFSTable cols={isAdmin ? cols : cols.filter(c => c.key !== '_del')} rows={sorted} onEdit={(ri,key,val)=>{
          const actualIdx = rows.indexOf(sorted[ri]);
          if(actualIdx>=0) handleEdit(actualIdx,key,val);
        }} rowStyle={rowStyle} compact={true}
          selectable selectedKeys={selected} onToggleRow={toggleOne} onToggleAll={toggleAll}
          rowKey={(row) => rows.indexOf(row)} />
      </div>
    </div>
  );
}

function Inputs({ store, onUpdate }) {
  const [inp, setInp] = useState({...store.inputs});
  const [scope, setScope] = useState([...store.scope]);

  const updateInp = (key, val) => {
    const updated = {...inp,[key]:val};
    setInp(updated); store.inputs = updated; onUpdate();
  };
  const updateScope = (ri, key, val) => {
    const updated = scope.map((r,i)=>i===ri?{...r,[key]:val}:r);
    setScope(updated); store.scope = updated; onUpdate();
  };

  const field = (label, key, type='text') => (
    <FormRow label={label}>
      <FormInput value={inp[key]} onChange={v=>updateInp(key,v)} type={type} />

// ─── EQUIPMENT LOG ─────────────────────────────────────────
// Corridor-aware view of the Master file "Equipment Log" sheet: one row per date,
// one column per equipment, the cell = that day's count, plus a computed TOTAL column.
// South and East are stored & shown separately (same as the DPR log).
function EquipmentLog({ store, corridor='south', setCorridor }) {
  store.corridor = corridor;
  const fmtDDMMMYYYY = window.fmtDDMMMYYYY;
  const fmtNum = window.fmtNum;
  const eq = store.equipLog || { equipment: [], rows: [] };
  const equipment = eq.equipment || [];
  const rows = (eq.rows || []).filter(r => r.date).sort((a, b) => new Date(a.date) - new Date(b.date));

  const corridorBar = (
    <div style={{ marginBottom: 14 }}>
      <CorridorSwitch value={corridor} onChange={c => setCorridor && setCorridor(c)} options={[
        { id:'south', label:'South Corridor' }, { id:'east', label:'East Corridor' }
      ]} />
    </div>
  );

  if (!rows.length || !equipment.length) {
    return (
      <div style={{ padding: 16 }}>
        {corridorBar}
        <div style={{ padding: 40, textAlign: 'center', color: C.softGrey }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🚜</div>
          <div style={{ fontSize: 13, fontWeight: 600 }}>No Equipment Log for the {corridor === 'east' ? 'East' : 'South'} corridor yet.</div>
          <div style={{ fontSize: 11, marginTop: 6 }}>
            Import a Master Excel file that contains an “Equipment Log” sheet to populate this view.
          </div>
        </div>
      </div>
    );
  }

  // Column totals across all logged days (handy footer row).
  const colTotals = equipment.map(name => rows.reduce((s, r) => s + ((r.counts && r.counts[name]) || 0), 0));
  const grandTotal = colTotals.reduce((s, n) => s + n, 0);

  const thBase = { background: C.navy, color: C.lime, padding: '7px 10px', fontSize: 10, fontWeight: 700,
    textAlign: 'center', borderBottom: `2px solid ${C.lime}`, whiteSpace: 'nowrap' };
  const td = { padding: '6px 10px', fontSize: 11, textAlign: 'center', borderBottom: `1px solid ${C.lightGrey}`, color: C.navy };

  return (
    <div style={{ padding: 16 }}>
      {corridorBar}
      <div style={{ background: C.white, borderRadius: 4, border: `1px solid ${C.lightGrey}`, overflow: 'hidden' }}>
        <div style={{ background: C.navy, color: C.lime, padding: '10px 16px', fontWeight: 700, fontSize: 12, letterSpacing: 1, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span>EQUIPMENT LOG — {corridor === 'east' ? 'EAST' : 'SOUTH'} CORRIDOR</span>
          <span style={{ fontSize: 10, color: C.pearl, fontWeight: 500 }}>{rows.length} days · {equipment.length} equipment types</span>
        </div>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11 }}>
            <thead>
              <tr>
                <th style={{ ...thBase, textAlign: 'left', position: 'sticky', left: 0, background: C.navy }}>Date</th>
                {equipment.map(name => <th key={name} style={thBase}>{name}</th>)}
                <th style={{ ...thBase, background: C.qeBlue, borderBottom: `2px solid ${C.lime}` }}>TOTAL</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={i} style={{ background: i % 2 === 0 ? C.white : C.pearl }}>
                  <td style={{ ...td, textAlign: 'left', fontWeight: 600, whiteSpace: 'nowrap', position: 'sticky', left: 0, background: i % 2 === 0 ? C.white : C.pearl }}>
                    {fmtDDMMMYYYY(r.date)}
                  </td>
                  {equipment.map(name => {
                    const v = (r.counts && r.counts[name]) || 0;
                    return <td key={name} style={{ ...td, color: v ? C.navy : C.softGrey }}>{v || '—'}</td>;
                  })}
                  <td style={{ ...td, fontWeight: 800, color: C.qeBlue }}>{fmtNum(r.total || 0)}</td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr style={{ background: C.navy, color: C.white }}>
                <td style={{ padding: '7px 10px', fontSize: 10, fontWeight: 700, textAlign: 'left', color: C.lime, position: 'sticky', left: 0, background: C.navy }}>TOTAL</td>
                {colTotals.map((t, i) => <td key={i} style={{ padding: '7px 10px', fontSize: 11, textAlign: 'center', fontWeight: 700, color: C.white }}>{fmtNum(t)}</td>)}
                <td style={{ padding: '7px 10px', fontSize: 11, textAlign: 'center', fontWeight: 800, color: C.lime }}>{fmtNum(grandTotal)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}
window.EquipmentLog = EquipmentLog;

// ─── PLANNING VIEW ─────────────────────────────────────────
// Corridor-aware planning table derived DIRECTLY from the DPR log (Master Database) so it
// always stays in lock-step with the imported data — no separate sheet to drift out of sync.
function PlanningView({ store, corridor='south', setCorridor }) {
  store.corridor = corridor;
  const fmtDDMMMYYYY = window.fmtDDMMMYYYY;
  const fmtNum = window.fmtNum;
  const log = store.dprLog.filter(r => r.date).sort((a, b) => (a.dprNo || 0) - (b.dprNo || 0));

  const corridorBar = (
    <div style={{ marginBottom: 14 }}>
      <CorridorSwitch value={corridor} onChange={c => setCorridor && setCorridor(c)} options={[
        { id:'south', label:'South Corridor' }, { id:'east', label:'East Corridor' }
      ]} />
    </div>
  );

  if (!log.length) {
    return (
      <div style={{ padding: 16 }}>
        {corridorBar}
        <div style={{ padding: 40, textAlign: 'center', color: C.softGrey }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📋</div>
          <div style={{ fontSize: 13, fontWeight: 600 }}>No planning data for the {corridor === 'east' ? 'East' : 'South'} corridor yet.</div>
          <div style={{ fontSize: 11, marginTop: 6 }}>
            Import an Excel file or add DPRs in Master Database — the planning view is built from them.
          </div>
        </div>
      </div>
    );
  }

  const pct = (cum, total, stored) => {
    if (stored) return stored * 100;          // stored as a fraction (e.g. 0.819)
    return total ? (cum / total) * 100 : 0;
  };

  const cols = [
    'DPR', 'Date', 'Day', 'Near %', 'Off %',
    'Near today m³', 'Off today m³', 'Trench today m', 'Trench cum m', 'GPS hrs', 'Equip',
  ];
  const thBase = { background: C.navy, color: C.lime, padding: '7px 10px', fontSize: 10, fontWeight: 700,
    textAlign: 'center', borderBottom: `2px solid ${C.lime}`, whiteSpace: 'nowrap' };
  const td = { padding: '6px 10px', fontSize: 11, textAlign: 'center', borderBottom: `1px solid ${C.lightGrey}`, color: C.navy };

  return (
    <div style={{ padding: 16 }}>
      {corridorBar}
      <div style={{ background: C.white, borderRadius: 4, border: `1px solid ${C.lightGrey}`, overflow: 'hidden' }}>
        <div style={{ background: C.navy, color: C.lime, padding: '10px 16px', fontWeight: 700, fontSize: 12, letterSpacing: 1, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span>PLANNING VIEW — {corridor === 'east' ? 'EAST' : 'SOUTH'} CORRIDOR</span>
          <span style={{ fontSize: 10, color: C.pearl, fontWeight: 500 }}>{log.length} DPRs · derived from Master Database</span>
        </div>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11 }}>
            <thead>
              <tr>{cols.map((h, i) => <th key={h} style={{ ...thBase, textAlign: i < 3 ? 'left' : 'center' }}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {log.map((r, i) => {
                const nearPct = pct(r.nearshoreCum, r.nearshoreTotal, r.nearshorePct);
                const offPct  = pct(r.offshoreCum,  r.offshoreTotal,  r.offshorePct);
                const trToday = (r.offTrenchToday || 0) + (r.nearTrenchToday || 0);
                const trCum   = (r.offTrenchCum   || 0) + (r.nearTrenchCum   || 0);
                return (
                  <tr key={i} style={{ background: i % 2 === 0 ? C.white : C.pearl }}>
                    <td style={{ ...td, textAlign: 'left', fontWeight: 700 }}>DPR-{r.dprNo}</td>
                    <td style={{ ...td, textAlign: 'left', whiteSpace: 'nowrap' }}>{fmtDDMMMYYYY(r.date)}</td>
                    <td style={{ ...td, textAlign: 'left' }}>{r.day || '—'}</td>
                    <td style={{ ...td, color: C.qeBlue, fontWeight: 600 }}>{nearPct ? nearPct.toFixed(1) + '%' : '—'}</td>
                    <td style={{ ...td, color: C.qeTeal, fontWeight: 600 }}>{offPct ? offPct.toFixed(1) + '%' : '—'}</td>
                    <td style={td}>{fmtNum(r.nearshoreToday || 0)}</td>
                    <td style={td}>{fmtNum(r.offshoreToday || 0)}</td>
                    <td style={td}>{fmtNum(trToday)}</td>
                    <td style={{ ...td, fontWeight: 600 }}>{fmtNum(trCum)}</td>
                    <td style={{ ...td, color: (r.gpsDT || 0) > 0 ? C.amber : C.softGrey }}>{fmtNum(r.gpsDT || 0)}</td>
                    <td style={{ ...td, fontWeight: 700 }}>{fmtNum(r.equip || 0)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}
window.PlanningView = PlanningView;

// ─── ROOT APP ──────────────────────────────────────────────
function App() {
  const [tab,     setTab]     = useState('overview');
  const [version, setVersion] = useState(0);
  const [dataKey, setDataKey] = useState(0); // bumped ONLY on wholesale data replacement (import) — cell edits must not remount the tab
  const [toast,   setToast]   = useState(null);
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [dashCorridor, setDashCorridor] = useState('south');   // Dashboard: east | south
  const [mdCorridor,   setMdCorridor]   = useState('south');    // Master DB: south | east
  const isAdmin = !!window.__nfsIsAdmin;                        // gate full-data export

  const store = window.nfsStore;

  // Site Title (inputs.siteTitle) now drives the browser tab title (was previously unused).
  useEffect(() => { try { document.title = store.inputs.siteTitle || 'NFS Tracker'; } catch (e) {} });

  // Cloud layer (Root) calls this after a realtime hydrate so tables re-read the
  // replaced data WITHOUT remounting on every normal cell edit (which bumps version only).
  useEffect(() => {
    window.__nfsBumpDataKey = () => setDataKey(k => k + 1);
    return () => { if (window.__nfsBumpDataKey) delete window.__nfsBumpDataKey; };
  }, []);

  const onUpdate = useCallback(() => {
    store.save();
    setVersion(v => v+1);
  }, []);

  const onSave = () => {
    store.save();
    setToast('Saved to browser storage!');
  };

  const onExportJSON = () => { store.exportJSON(); setToast('JSON exported!'); };
  const onImportJSON = (file) => {
    store.importJSON(file).then(() => {
      setVersion(v=>v+1);
      setDataKey(k => k + 1);
      setToast('Data imported successfully!');
    }).catch(() => setToast('Import failed — invalid file'));
  };

  const onImportExcel = (file, forced) => {
    // Resolve the target corridor EXPLICITLY — never inferred from the current view.
    let target = (forced === 'east' || forced === 'south') ? forced : null;
    if (!target) {
      target = window.confirm(
        'Which corridor is this Excel file for?\n\nPress OK  →  EAST corridor\nPress Cancel  →  SOUTH corridor'
      ) ? 'east' : 'south';
    }
    const label = target === 'east' ? 'EAST' : 'SOUTH';
    if (!window.confirm(
      'This will REPLACE the ' + label + ' corridor Master Database with this file.\nPermits and Look-Ahead will be MERGED into the shared registers (nothing deleted).\nThe other corridor will not be touched.\n\nContinue?'
    )) {
      return;
    }
    store.corridor = target;   // force exact target — no guessing, never 'overall'
    setToast('Importing ' + label + ' Excel data…');
    importFromExcel(
      file,
      store,
      (dprCount, permitCount, laCount, scopeCount) => {
        setVersion(v => v + 1);
        setDataKey(k => k + 1);
        const parts = [];
        if (dprCount)    parts.push(`${dprCount} DPR rows`);
        if (permitCount) parts.push(`${permitCount} permits`);
        if (laCount)     parts.push(`${laCount} look-ahead items`);
        if (scopeCount)  parts.push(`${scopeCount} scope rows`);
        setToast(`✅ Imported ${parts.join(' + ')} into ${label} corridor`);
      },
      (errMsg) => {
        setToast('❌ ' + errMsg);
      }
    );
  };

  const content = useMemo(() => {
    // Set the active corridor on the store before rendering corridor-aware views
    if (tab === 'dashboard')      store.corridor = dashCorridor;
    else if (tab === 'database')  store.corridor = mdCorridor;
    else if (tab === 'dprviewer' || tab === 'inputs' || tab === 'equipment' || tab === 'planning' || tab === 'lookahead') store.corridor = mdCorridor;
    else store.corridor = 'south';
    switch(tab) {
      case 'overview':  return <ProjectOverview setTab={setTab} key={`ov-${dataKey}`} />;
      case 'dashboard': return <Dashboard store={store} tweaks={tweaks} onEditSettings={()=>setTab('inputs')} corridor={dashCorridor} setCorridor={setDashCorridor} key={`dash-${dataKey}-${dashCorridor}`} />;
      case 'database':  return <MasterDatabase store={store} onUpdate={onUpdate} tweaks={tweaks} corridor={mdCorridor} setCorridor={setMdCorridor} onImportExcel={onImportExcel} key={`db-${dataKey}-${mdCorridor}`} />;
      case 'permits':   return <PermitsRegister store={store} onUpdate={onUpdate} key={`pm-${dataKey}`} />;
      case 'lookahead': return <LookAhead store={store} onUpdate={onUpdate} corridor={mdCorridor} setCorridor={setMdCorridor} key={`la-${dataKey}-${mdCorridor}`} />;
      case 'dprviewer': return <DPRViewer store={store} corridor={mdCorridor} setCorridor={setMdCorridor} key={`dv-${dataKey}-${mdCorridor}`} />;
      case 'equipment': return <EquipmentLog store={store} corridor={mdCorridor} setCorridor={setMdCorridor} key={`eq-${dataKey}-${mdCorridor}`} />;
      case 'planning':  return <PlanningView store={store} corridor={mdCorridor} setCorridor={setMdCorridor} key={`pl-${dataKey}-${mdCorridor}`} />;
      case 'inputs':    return <ExpandedInputs store={store} onUpdate={onUpdate} corridor={mdCorridor} setCorridor={setMdCorridor} key={`inp-${dataKey}-${mdCorridor}`} />;
      default: return null;
    }
  }, [tab, version, dataKey, tweaks, dashCorridor, mdCorridor]);

  return (
    <div style={{ minHeight:'100vh', background:'#F0F2F5' }}>
      <TopNav
        active={tab} setActive={setTab}
        store={store}
        onSave={onSave}
        onExportJSON={onExportJSON}
        onImportJSON={onImportJSON}
        onImportExcel={onImportExcel}
        tweaks={tweaks}
      />

      <div style={{ minHeight:'calc(100vh - 90px)', paddingBottom:40 }}>
        {content}
      </div>

      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
      <TweaksPanel>
        <TweakSection label="Visual" />
        <TweakColor  label="Accent Color" value={tweaks.accentColor} onChange={v=>setTweak('accentColor',v)} />
        <TweakToggle label="Dark Mode (coming soon)" value={tweaks.darkMode} onChange={v=>setTweak('darkMode',v)} />
        <TweakSection label="Tables" />
        <TweakToggle label="Compact Row Height"  value={tweaks.compactTables}   onChange={v=>setTweak('compactTables',v)} />
        <TweakToggle label="Show Chart Labels"   value={tweaks.showChartLabels} onChange={v=>setTweak('showChartLabels',v)} />
        <TweakSection label="Export" />
        {/* Full-dataset JSON export → admin only (prevents data exfiltration). */}
        {isAdmin && <TweakButton label="Export JSON Backup" onClick={onExportJSON} />}
        <TweakButton label="Full Snapshot PDF"  onClick={()=>exportFullReport(store)} />
      </TweaksPanel>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  CLOUD LAYER — Supabase auth + shared data + realtime sync
// ════════════════════════════════════════════════════════════
const SB_URL = 'https://wbnryqvtcknkubiljssc.supabase.co';
const SB_KEY = 'sb_publishable_Zt0zhUZmiWoxRg6-Ox7lzw_qASv5Xv_';
const STATE_ID = 'main';
const CC = { navy:'#0A0A2E', lime:'#92DA48', blue:'#190AAF', white:'#FFFFFF', grey:'#8E9AAF', bg:'#F0F2F5' };

const sb = window.supabase.createClient(SB_URL, SB_KEY);
window.__nfsSb = sb;

// Debounced push of the whole state to the cloud.
// Any signed-in account may persist ADD + EDIT changes (so additions survive a refresh).
// DELETES are NOT possible for non-admins: the delete UI is hidden (Layer A) and the
// Supabase trigger (Layer B) rejects any UPDATE that reduces the row count. So a non-admin
// can grow/edit the data but never shrink it.
let _pushTimer = null;
window.__nfsCloudPush = (obj) => {
  if (!window.__nfsSession) return;   // must be signed in
  clearTimeout(_pushTimer);
  _pushTimer = setTimeout(async () => {
    try {
      await sb.from('app_state').update({
        data: obj,
        updated_at: new Date().toISOString(),
        updated_by: (window.__nfsSession && window.__nfsSession.user && window.__nfsSession.user.email) || null,
      }).eq('id', STATE_ID);
    } catch (e) { console.warn('cloud push failed', e); }
  }, 800);
};

function SplashLoading({ msg }) {
  return (
    <div style={{ minHeight:'100vh', background:CC.navy, display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', color:CC.white, fontFamily:'sans-serif' }}>
      <div style={{ fontSize:22, fontWeight:800, letterSpacing:'0.04em' }}>NFS <span style={{color:CC.lime}}>Tracker</span></div>
      <div style={{ marginTop:14, fontSize:13, color:CC.grey }}>{msg || 'Connecting…'}</div>
    </div>
  );
}

function LoginScreen() {
  const [mode, setMode]     = React.useState('signin'); // signin | signup
  const [email, setEmail]   = React.useState('');
  const [pass, setPass]     = React.useState('');
  const [busy, setBusy]     = React.useState(false);
  const [err, setErr]       = React.useState('');
  const [note, setNote]     = React.useState('');

  const submit = async () => {
    const e = email.trim().toLowerCase();
    if (!e || e.indexOf('@') < 0) { setErr('Please enter a valid email address.'); return; }
    if (!pass || pass.length < 6) { setErr('Password must be at least 6 characters.'); return; }
    setBusy(true); setErr(''); setNote('');
    try {
      if (mode === 'signup') {
        const { error } = await sb.auth.signUp({ email: e, password: pass });
        if (error) { setErr(error.message); }
        else {
          const { error: e2 } = await sb.auth.signInWithPassword({ email: e, password: pass });
          if (e2) setNote('Account created. You can now sign in.');
        }
      } else {
        const { error } = await sb.auth.signInWithPassword({ email: e, password: pass });
        if (error) setErr(error.message);
      }
    } catch (ex) { setErr(String(ex && ex.message ? ex.message : ex)); }
    setBusy(false);
  };

  return (
    <div style={{ minHeight:'100vh', background:CC.bg, display:'flex', alignItems:'center', justifyContent:'center', padding:20, fontFamily:'sans-serif' }}>
      <div style={{ width:'100%', maxWidth:380, background:CC.white, borderRadius:12, boxShadow:'0 8px 30px rgba(10,10,46,0.12)', overflow:'hidden' }}>
        <div style={{ background:CC.navy, padding:'22px 24px' }}>
          <div style={{ fontSize:20, fontWeight:800, color:CC.white, letterSpacing:'0.03em' }}>NFS <span style={{color:CC.lime}}>Tracker</span></div>
          <div style={{ fontSize:11, color:CC.grey, marginTop:4 }}>North Field South — McDermott · QatarEnergy LNG</div>
        </div>
        <div style={{ padding:'24px' }}>
          <div style={{ display:'flex', gap:6, marginBottom:18 }}>
            <button onClick={() => { setMode('signin'); setErr(''); setNote(''); }}
              style={{ flex:1, padding:'8px', fontSize:13, fontWeight:700, borderRadius:8, cursor:'pointer',
                border: mode==='signin' ? 'none' : '1px solid #ddd',
                background: mode==='signin' ? CC.navy : CC.white, color: mode==='signin' ? CC.white : '#555' }}>
              Sign in
            </button>
            <button onClick={() => { setMode('signup'); setErr(''); setNote(''); }}
              style={{ flex:1, padding:'8px', fontSize:13, fontWeight:700, borderRadius:8, cursor:'pointer',
                border: mode==='signup' ? 'none' : '1px solid #ddd',
                background: mode==='signup' ? CC.navy : CC.white, color: mode==='signup' ? CC.white : '#555' }}>
              Create account
            </button>
          </div>

          <label style={{ fontSize:11, fontWeight:700, color:'#666' }}>Work email</label>
          <input type="email" value={email} placeholder="name@mcdermott.com"
            onChange={e => setEmail(e.target.value)}
            style={{ width:'100%', boxSizing:'border-box', padding:'11px 12px', fontSize:14, border:'1px solid #ccc', borderRadius:8, outline:'none', marginTop:4, marginBottom:12 }} />

          <label style={{ fontSize:11, fontWeight:700, color:'#666' }}>Password</label>
          <input type="password" value={pass} placeholder="At least 6 characters"
            onChange={e => setPass(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') submit(); }}
            style={{ width:'100%', boxSizing:'border-box', padding:'11px 12px', fontSize:14, border:'1px solid #ccc', borderRadius:8, outline:'none', marginTop:4 }} />

          {err  && <div style={{ color:'#C0392B', fontSize:12, marginTop:10 }}>{err}</div>}
          {note && <div style={{ color:'#1E7E34', fontSize:12, marginTop:10 }}>{note}</div>}

          <button onClick={submit} disabled={busy}
            style={{ width:'100%', marginTop:16, padding:'12px', fontSize:14, fontWeight:700, color:CC.white,
              background: busy ? CC.grey : CC.navy, border:'none', borderRadius:8, cursor:'pointer' }}>
            {busy ? 'Please wait…' : (mode==='signup' ? 'Create account & sign in' : 'Sign in')}
          </button>
        </div>
      </div>
    </div>
  );
}

function Root() {
  const [phase, setPhase] = React.useState('loading'); // loading | login | ready

  React.useEffect(() => {
    let authSub;
    (async () => {
      try {
        const { data } = await sb.auth.getSession();
        await handleSession(data ? data.session : null);
      } catch (e) { console.warn('getSession failed', e); setPhase('login'); }
      const res = sb.auth.onAuthStateChange((_evt, session) => { handleSession(session); });
      authSub = res && res.data ? res.data.subscription : null;
    })();
    return () => { try { authSub && authSub.unsubscribe(); } catch (e) {} };
  }, []);

  async function handleSession(session) {
    if (!session) { window.__nfsSession = null; setPhase('login'); return; }
    window.__nfsSession = session;
    // Layer A admin gate: ONLY this email may delete rows in the UI. Real enforcement = Supabase trigger (Layer B).
    window.__nfsIsAdmin = (((session.user && session.user.email) || '').toLowerCase() === 'abdelaziz.hussein@mcdermott.com');
    // role
    try {
      const { data: prof } = await sb.from('profiles').select('role').eq('id', session.user.id).single();
      window.__nfsRole = (prof && prof.role) || 'editor';
    } catch (e) { window.__nfsRole = 'editor'; }
    // load shared data
    try {
      const { data: row } = await sb.from('app_state').select('data').eq('id', STATE_ID).single();
      if (row && row.data && row.data.corridors) {
        window.nfsStore.hydrate(row.data);
        if (window.__nfsBumpDataKey) window.__nfsBumpDataKey();
      } else if (window.nfsStore.hasData() && window.__nfsRole !== 'viewer') {
        window.__nfsCloudPush(window.nfsStore.serialize()); // seed cloud from local
      }
    } catch (e) { console.warn('cloud load failed', e); }
    setupRealtime();
    setPhase('ready');
  }

  function setupRealtime() {
    if (window.__nfsRtSet) return; window.__nfsRtSet = true;
    sb.channel('app_state_rt')
      .on('postgres_changes',
        { event:'UPDATE', schema:'public', table:'app_state', filter:'id=eq.' + STATE_ID },
        (payload) => {
          // Ignore our own echo by author (jsonb reorders keys, so string compare is unreliable).
          const by = payload.new && payload.new.updated_by;
          if (by && window.__nfsSession && by === window.__nfsSession.user.email) return;
          if (payload.new && payload.new.data && payload.new.data.corridors) {
            window.nfsStore.hydrate(payload.new.data);
            if (window.__nfsBumpDataKey) window.__nfsBumpDataKey();
          }
        })
      .subscribe();
  }

  if (phase === 'loading') return <SplashLoading />;
  if (phase === 'login')   return <LoginScreen />;
  return <App />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);

</script>
