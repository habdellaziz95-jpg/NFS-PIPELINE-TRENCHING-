  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"><\/script>
  <script>
    // Ensure the annotation plugin is active (UMD usually auto-registers; guard anyway)
    try { if (window.Chart && window['chartjs-plugin-annotation']) { Chart.register(window['chartjs-plugin-annotation']); } } catch (e) {}
    const dataPayload = ${JSON.stringify({
      labels:    log.map(r => r.date.slice(5)),
      nearCum:   log.map(r => r.nearshoreCum || 0),
      offCum:    log.map(r => r.offshoreCum || 0),
      // Daily production: clip negatives to 0 (display real production only)
      nearTod:   log.map(r => Math.max(0, Number(r.nearshoreToday) || 0)),
      offTod:    log.map(r => Math.max(0, Number(r.offshoreToday)  || 0)),
      // Adjustments: negative values shown as scatter markers
      adjustments: log.map((r, i) => {
        const v = (Number(r.nearshoreToday) || 0) + (Number(r.offshoreToday) || 0);
        return v < 0 ? { x: i, y: 0, raw: v } : null;
      }).filter(Boolean),
      mp:        log.map(r => r.totalMP || ((r.indMP || 0) + (r.dayMP || 0) + (r.ngtMP || 0))),
      safe:      log.map(r => r.safeHrs || 0),
      wDT:       log.map(r => r.weatherDT || 0),
      permitLabels: permitBreak.map(p => p.status),
      permitData:   permitBreak.map(p => p.count),
      permitColors: permitBreak.map(p => p.color),
      surveyedNear, surveyedOff,
      // Survey reconciliation point: the largest single-day DROP in nearshore cumulative
      surveyDrop: (() => {
        let idx = -1, worst = 0;
        for (let i = 1; i < log.length; i++) {
          const d = (Number(log[i].nearshoreCum) || 0) - (Number(log[i-1].nearshoreCum) || 0);
          if (d < worst) { worst = d; idx = i; }
        }
        return idx >= 0 ? { idx, date: log[idx].date, y: Number(log[idx].nearshoreCum) || 0, drop: worst } : null;
      })(),
    })};
    function makeCharts() {
      const navy = '#190AAF', teal = '#1ABC9C', orange = '#E67E22', green = '#00A878', red = '#C0392B';

      // Chart 1 — Cumulative excavation with surveyed reference lines
      const dropPt = dataPayload.surveyDrop;
      const _ord = (n) => { const s = ['th','st','nd','rd'], v = n % 100; return n + (s[(v-20)%10] || s[v] || s[0]); };
      const _fmtDropDate = (iso) => { const d = new Date(iso); return isNaN(d) ? iso : _ord(d.getDate()) + ' ' + d.toLocaleDateString('en-GB', { month: 'short' }); };
      const c1Ann = {};
      if (dropPt) {
        // ring around the drop point
        c1Ann.surveyRing = {
          type: 'point', xValue: dropPt.idx, yValue: dropPt.y,
          radius: 11, borderColor: '#C0392B', borderWidth: 2.5, backgroundColor: 'rgba(192,57,43,0.06)',
        };
        // callout label above the point
        c1Ann.surveyLabel = {
          type: 'label', xValue: dropPt.idx, yValue: dropPt.y,
          content: ['Survey reconciliation', '(' + _fmtDropDate(dropPt.date) + ') — cumulative', 'adjusted to surveyed qty'],
          font: { size: 8, weight: 'bold' }, color: '#C0392B',
          backgroundColor: 'rgba(255,255,255,0.9)', borderColor: '#C0392B', borderWidth: 1, borderRadius: 3,
          padding: 4, yAdjust: -46, callout: { display: true, borderColor: '#C0392B', borderWidth: 1.5, margin: 3 },
        };
      }
      new Chart(document.getElementById('c1'), {
        type: 'line',
        data: { labels: dataPayload.labels, datasets: [
          { label: 'Nearshore Cum', data: dataPayload.nearCum, borderColor: navy, backgroundColor: 'rgba(25,10,175,0.08)', borderWidth: 2, tension: 0.3, pointRadius: 1, fill: true },
          { label: 'Offshore Cum',  data: dataPayload.offCum,  borderColor: teal, backgroundColor: 'rgba(26,188,156,0.08)', borderWidth: 2, tension: 0.3, pointRadius: 1, fill: true },
        ]},
        options: { responsive: false, maintainAspectRatio: false,
          plugins: { legend: { labels: { font: { size: 9 } } }, annotation: { annotations: c1Ann } },
          scales: { x: { ticks: { font: { size: 7 }, maxRotation: 45 } }, y: { ticks: { font: { size: 8 } }, beginAtZero: true } }
        }
      });

      // Chart 2a — Daily Production (stacked bars, no manpower)
      new Chart(document.getElementById('c2a'), {
        type: 'bar',
        data: { labels: dataPayload.labels, datasets: [
          { label: 'Nearshore (m³)', data: dataPayload.nearTod, backgroundColor: navy, stack: 'p' },
          { label: 'Offshore (m³)',  data: dataPayload.offTod,  backgroundColor: teal, stack: 'p' },
        ]},
        options: { responsive: false, maintainAspectRatio: false,
          plugins: { legend: { labels: { font: { size: 9 } } } },
          scales: {
            x: { stacked: true, ticks: { font: { size: 7 }, maxRotation: 45 } },
            y: { stacked: true, beginAtZero: true, ticks: { font: { size: 8 } } },
          }
        }
      });

      // Chart 2b — Daily Manpower (line chart)
      new Chart(document.getElementById('c2b'), {
        type: 'line',
        data: { labels: dataPayload.labels, datasets: [
          { label: 'Total Manpower', data: dataPayload.mp, borderColor: orange, backgroundColor: 'rgba(230,131,58,0.1)', borderWidth: 2, pointRadius: 1, tension: 0.3, fill: true },
        ]},
        options: { responsive: false, maintainAspectRatio: false,
          plugins: { legend: { labels: { font: { size: 9 } } } },
          scales: {
            x: { ticks: { font: { size: 7 }, maxRotation: 45 } },
            y: { beginAtZero: true, min: 0, ticks: { font: { size: 8 }, stepSize: 50 } },
          }
        }
      });

      // Chart 3 — Daily safe manhours
      new Chart(document.getElementById('c3'), {
        type: 'bar',
        data: { labels: dataPayload.labels, datasets: [{ label: 'Safe Hrs', data: dataPayload.safe, backgroundColor: green }]},
        options: { responsive: false, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 7 }, maxRotation: 45 } }, y: { ticks: { font: { size: 8 } }, beginAtZero: true } } }
      });

      // Chart 4 — Weather DT
      new Chart(document.getElementById('c4'), {
        type: 'bar',
        data: { labels: dataPayload.labels, datasets: [{ label: 'Weather DT', data: dataPayload.wDT, backgroundColor: orange }]},
        options: { responsive: false, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 7 }, maxRotation: 45 } }, y: { ticks: { font: { size: 8 } }, beginAtZero: true } } }
      });

      // Chart 5 — Permits donut (2x larger)
      if (dataPayload.permitData.length) {
        new Chart(document.getElementById('c5'), {
          type: 'doughnut',
          data: { labels: dataPayload.permitLabels, datasets: [{ data: dataPayload.permitData, backgroundColor: dataPayload.permitColors, borderWidth: 2, borderColor: '#fff' }]},
          options: { responsive: false, maintainAspectRatio: false, cutout: '55%', plugins: { legend: { display: false } } }
        });
      }
    }
    window.addEventListener('load', () => { setTimeout(makeCharts, 200); });
  <\/script>
  </body></html>`);
  w.document.close();
}

window.exportFullReport = exportFullReport;

</script>

<script type="text/babel">
// NFS Tracker — DPR Viewer tab

function DPRViewer({ store, corridor='south', setCorridor }) {
  const C = window.C;
  const Btn = window.Btn;
  const fmtDDMMMYYYY = window.fmtDDMMMYYYY;
  const fmtNum = window.fmtNum;
  const exportDPR = window.exportDPR;
  const log = store.dprLog;
  const inp = store.inputs;

  // Corridor selector — wired to mdCorridor in App (same source as Master DB). Shown in all states.
  const corridorBar = (
    <div style={{ marginBottom: 14 }}>
      <CorridorSwitch value={corridor} onChange={c => setCorridor && setCorridor(c)} options={[
        { id:'south', label:'South Corridor' }, { id:'east', label:'East Corridor' }
      ]} />
    </div>
  );

  const sortedLog = React.useMemo(
    () => [...log].sort((a, b) => (a.dprNo || 0) - (b.dprNo || 0)),
    [log]
  );

  const [selectedDPR, setSelectedDPR] = React.useState(() => {
    if (!sortedLog.length) return null;
    return sortedLog[sortedLog.length - 1].dprNo;
  });

  const d = React.useMemo(
    () => log.find(r => r.dprNo === selectedDPR),
    [log, selectedDPR]
  );

  if (!log.length) {
    return (
      <div style={{ padding: 16 }}>
        {corridorBar}
        <div style={{ padding: 40, textAlign: 'center', color: C.softGrey }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📄</div>
          <div style={{ fontSize: 13, fontWeight: 600 }}>No DPRs in the {corridor === 'east' ? 'East' : 'South'} master database yet.</div>
          <div style={{ fontSize: 11, marginTop: 6 }}>
            Import an Excel file or add DPRs in Master Database to view them here.
          </div>
        </div>
      </div>
    );
  }

  if (!d) {
    return <div style={{ padding: 24 }}>Selected DPR not found.</div>;
  }

  const totalMP = (d.indMP || 0) + (d.dayMP || 0) + (d.ngtMP || 0);
  const isFriday = (d.day || '').toLowerCase().startsWith('fri');
  const wDT = isFriday ? 0 : (d.weatherDT || 0);

  // ── Section card ───────────────────────────────────
  const sectionCard = (titleNum, titleTxt, body) => (
    <div style={{ background: C.white, borderRadius: 4, border: `1px solid ${C.lightGrey}`, overflow: 'hidden', marginBottom: 14 }}>
      <div style={{
        background: C.navy, color: C.lime, padding: '7px 14px', fontSize: 10, fontWeight: 700,
        letterSpacing: 1.2, textTransform: 'uppercase', borderLeft: `4px solid ${C.lime}`,
      }}>
        {titleNum} · {titleTxt}
      </div>
      {body}
    </div>
  );

  const kCard = (lbl, val, color) => (
    <div style={{
      border: `1.5px solid ${C.lime}`, borderRadius: 3, padding: '8px 6px',
      textAlign: 'center', background: C.pearl, flex: 1, minWidth: 0,
    }}>
      <div style={{ fontSize: 8, color: C.navy, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5 }}>{lbl}</div>
      <div style={{ fontSize: 18, fontWeight: 800, color: color || C.navy, lineHeight: 1.1, marginTop: 3, wordBreak: 'break-word' }}>{val}</div>
    </div>
  );

  return (
    <div style={{ padding: 16 }}>
      {corridorBar}
      {/* Selector bar */}
      <div style={{
        background: C.white, borderRadius: 4, border: `1px solid ${C.lightGrey}`,
        padding: '12px 16px', marginBottom: 14, display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap',
      }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.navy, textTransform: 'uppercase', letterSpacing: 1 }}>
          Select DPR:
        </div>
        <select
          value={selectedDPR ?? ''}
          onChange={e => setSelectedDPR(Number(e.target.value))}
          style={{
            flex: 1, minWidth: 280, maxWidth: 480, padding: '7px 12px', fontSize: 12,
            border: `1.5px solid ${C.navy}`, borderRadius: 3, color: C.inputBlue, fontWeight: 600,
            fontFamily: 'inherit', background: '#FFFFF8', cursor: 'pointer',
          }}
        >
          {sortedLog.map(r => (
            <option key={r.dprNo} value={r.dprNo}>
              DPR-{r.dprNo} — {fmtDDMMMYYYY(r.date)} ({r.day})
            </option>
          ))}
        </select>
        <span style={{ fontSize: 10, color: C.softGrey }}>{log.length} DPRs available</span>
        <Btn variant="navy" size="sm" onClick={() => exportDPR(store, d)}>Print DPR</Btn>
      </div>

      {/* Header band */}
      <div style={{
        background: C.navy, color: C.lime, padding: '14px 20px', marginBottom: 14,
        borderRadius: '4px 4px 0 0', borderTop: `4px solid ${C.lime}`, borderBottom: `4px solid ${C.lime}`,
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, flexWrap: 'wrap' }}>
          <div>
            <div style={{ fontSize: 16, fontWeight: 900, letterSpacing: 1.5, color: C.lime }}>DAILY PROGRESS REPORT</div>
            <div style={{ fontSize: 10, color: C.pearl, marginTop: 4 }}>{inp.projectName} — {inp.description}</div>
            <div style={{ fontSize: 9, color: C.softGrey, marginTop: 2 }}>
              Contractor: <strong style={{ color: C.pearl }}>{inp.contractor}</strong>
              &nbsp;|&nbsp;
              Sub: <strong style={{ color: C.pearl }}>{inp.subContractor}</strong>
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 20, fontWeight: 900, color: C.lime, lineHeight: 1.1 }}>DPR No. {d.dprNo}</div>
            <div style={{ fontSize: 10, color: C.pearl, marginTop: 4 }}>{fmtDDMMMYYYY(d.date)} ({d.day})</div>
            <div style={{ fontSize: 9, color: C.softGrey, marginTop: 2 }}>Area: {inp.areaGrid}</div>
          </div>
        </div>
      </div>

      {isFriday && (
        <div style={{
          background: '#FCF3CF', borderLeft: '3px solid #F39C12', padding: '8px 14px',
          fontSize: 11, color: '#7E5A00', marginBottom: 14, borderRadius: 3,
        }}>
          ⊕ <strong>Friday rest day</strong> — Weather downtime is not recorded.
        </div>
      )}

      {/* A — Weather */}
      {sectionCard('A', 'Weather Conditions',
        <div style={{ padding: '12px 14px', display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {kCard('Condition', d.type || '—')}
          {kCard('Rain', d.rain || 'No', d.rain === 'Yes' ? '#0066B3' : C.navy)}
          {kCard('Temp Max', (d.tMax != null && d.tMax !== '') ? `${d.tMax}°C` : '—')}
          {kCard('Temp Min', (d.tMin != null && d.tMin !== '') ? `${d.tMin}°C` : '—')}
        </div>
      )}

      {/* B — Production */}
      {sectionCard('B', 'Production Progress',
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11 }}>
          <thead>
            <tr>
              {['Activity', 'Today', 'Cumulative', 'UoM'].map(h => (
                <th key={h} style={{
                  background: C.navy, color: C.lime, padding: '7px 10px', fontSize: 10,
                  fontWeight: 700, textAlign: 'center', borderBottom: `2px solid ${C.lime}`,
                }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[
              ['Offshore Excavation',       d.offshoreToday,   d.offshoreCum,   'm³'],
              ['Nearshore Excavation',      d.nearshoreToday,  d.nearshoreCum,  'm³'],
              ['Offshore Trenching',        d.offTrenchToday,  d.offTrenchCum,  'm'],
              ['Nearshore Trenching',       d.nearTrenchToday, d.nearTrenchCum, 'm'],
              ['Rock Breaking — Offshore',  d.rockOffToday,    d.rockOffCum,    'm'],
              ['Rock Breaking — Nearshore', d.rockOnToday,     d.rockOnCum,     'm'],
            ].map((row, i) => (
              <tr key={i} style={{ background: i % 2 === 0 ? C.white : C.pearl }}>
                <td style={{ padding: '6px 12px', fontSize: 11, fontWeight: 500, borderBottom: `1px solid ${C.lightGrey}` }}>{row[0]}</td>
                <td style={{ padding: '6px 12px', fontSize: 11, textAlign: 'center', fontWeight: 700, color: C.navy, borderBottom: `1px solid ${C.lightGrey}` }}>{fmtNum(row[1] || 0)}</td>
                <td style={{ padding: '6px 12px', fontSize: 11, textAlign: 'center', fontWeight: 700, color: C.navy, borderBottom: `1px solid ${C.lightGrey}` }}>{fmtNum(row[2] || 0)}</td>
                <td style={{ padding: '6px 12px', fontSize: 10, textAlign: 'center', color: C.softGrey, borderBottom: `1px solid ${C.lightGrey}` }}>{row[3]}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}

      {/* C — Manpower */}
      {sectionCard('C', 'Manpower',
        <div style={{ padding: '12px 14px', display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {kCard('Indirect MP', d.indMP || 0)}
          {kCard('Day Shift', d.dayMP || 0)}
          {kCard('Night Shift', d.ngtMP || 0)}
          {kCard('Total', totalMP, C.qeBlue)}
          {kCard('Equipment', d.equip || 0)}
        </div>
      )}

      {/* D — Downtime */}
      {sectionCard('D', 'Downtime',
        <div style={{ padding: '12px 14px', display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {kCard('Weather DT (hrs)', wDT, wDT > 0 ? C.amber : C.navy)}
          {kCard('GPS / DGPS DT (hrs)', d.gpsDT || 0, (d.gpsDT || 0) > 0 ? C.amber : C.navy)}
          <div style={{
            border: `1.5px solid ${C.lime}`, borderRadius: 3, padding: '8px 10px',
            background: C.pearl, flex: 2, textAlign: 'left', minWidth: 180,
          }}>
            <div style={{ fontSize: 8, color: C.navy, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5 }}>Downtime Reason</div>
            <div style={{ fontSize: 11, color: C.charcoal, marginTop: 4 }}>
              {d.downtimeReason || ((wDT > 0 || (d.gpsDT || 0) > 0) ? '—' : 'No downtime')}

          </div>
        </div>
      )}

      {/* E — HSE */}
      {sectionCard('E', 'HSE Statistics',
        <div style={{ padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 8 }}>

            {kCard('Safe Mhrs Today', fmtNum(d.safeHrs || 0), C.qeTeal)}
            {kCard('Cum Safe Mhrs', fmtNum(d.cumSafeHrs || 0), C.qeTeal)}

      )}

        <div style={{ padding: '14px 14px', display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>

  );
}

window.DPRViewer = DPRViewer;

</script>

<script type="text/babel">
// NFS Tracker — Expanded Project Inputs tab
// Sections: Branding, Team, KPI Labels, Tab Names, Scope, Surveyed, Approval, Reset

function ExpandedInputs({ store, onUpdate, corridor='south', setCorridor }) {
  const C = window.C;
  store.corridor = corridor;
  const Collapsible = window.Collapsible;
  const fmtDDMMMYYYY = window.fmtDDMMMYYYY;
  const [inp, setInp]     = React.useState({ ...store.inputs });
  const [scope, setScope] = React.useState([...store.scope]);

  const update = (key, val) => {
    const u = { ...inp, [key]: val };
    setInp(u); store.inputs = u; onUpdate();
  };
  const updateNested = (parentKey, subKey, val) => {
    const parent = { ...(inp[parentKey] || {}), [subKey]: val };
    update(parentKey, parent);
  };
  const updateScopeRow = (ri, key, val) => {
    const u = scope.map((r, i) => i === ri ? { ...r, [key]: val } : r);
    setScope(u); store.scope = u; onUpdate();
  };

  // ── Field & shared styles ───────────────────────────
  const inputStyle = {
    border: `1px solid ${C.softGrey}`, borderRadius: 3, padding: '5px 8px',
    fontSize: 11, color: C.inputBlue, background: '#FFFFF8', width: '100%',
    fontFamily: 'inherit',
  };
  const textareaStyle = { ...inputStyle, minHeight: 60, resize: 'vertical' };

  const field = (label, key, type = 'text') => (
    <div style={{ display: 'grid', gridTemplateColumns: '180px 1fr', gap: 8, alignItems: 'center', marginBottom: 8 }}>
      <label style={{ fontSize: 11, fontWeight: 600, color: C.charcoal }}>{label}</label>
      <input
        type={type}
        value={inp[key] ?? ''}
        onChange={e => update(key, e.target.value)}
        style={inputStyle}
      />
    </div>
  );

  // ── Organization chart (project-wide; canonical copy lives in SOUTH inputs) ──
  const [orgTick, setOrgTick] = React.useState(0);
  const orgSource = (store.corridors && store.corridors.south && store.corridors.south.inputs) || inp;
  const orgVals = orgSource.orgChart || {};
  const updateOrg = (key, val) => {
    orgSource.orgChart = { ...(orgSource.orgChart || {}), [key]: val };
    if (orgSource === store.inputs) setInp({ ...store.inputs });
    setOrgTick(t => t + 1);
    onUpdate();
  };
  const orgField = (label, key) => (
    <div style={{ display: 'grid', gridTemplateColumns: '180px 1fr', gap: 8, alignItems: 'center', marginBottom: 8 }}>
      <label style={{ fontSize: 11, fontWeight: 600, color: C.charcoal }}>{label}</label>
      <input type="text" value={orgVals[key] ?? ''} onChange={e => updateOrg(key, e.target.value)} style={inputStyle} />

  // ── PM/CM/SE leadership names (project-wide; canonical copy lives in SOUTH inputs, ──
  // ── like orgChart) so editing on either corridor updates the name in both. ──
  const updateLead = (key, val) => {
    orgSource[key] = val;
    if (orgSource === store.inputs) setInp({ ...store.inputs });
    setOrgTick(t => t + 1);
    onUpdate();

  const leadField = (label, key) => (
    <div style={{ display: 'grid', gridTemplateColumns: '180px 1fr', gap: 8, alignItems: 'center', marginBottom: 8 }}>
      <label style={{ fontSize: 11, fontWeight: 600, color: C.charcoal }}>{label}</label>
      <input type="text" value={orgSource[key] ?? ''} onChange={e => updateLead(key, e.target.value)} style={inputStyle} />
    </div>
  );

  // ── Logo upload ─────────────────────────────────────

    const file = e.target.files[0];

    reader.onload = (ev) => update('logoData', ev.target.result);
    reader.readAsDataURL(file);

  // ── Reset everything ────────────────────────────────

    if (!window.confirm('Reset ALL Project Inputs to defaults? (Master Database, Permits, and Look-Ahead are not affected.)')) return;

    setScope([...store.scope]);
    onUpdate();

  // ── Team helpers ────────────────────────────────────

  const addMember    = () => setTeam([...team, { role: 'New Role', name: '' }]);
  const removeMember = (i) => setTeam(team.filter((_, idx) => idx !== i));
  const editMember   = (i, key, val) => setTeam(team.map((m, idx) => idx === i ? { ...m, [key]: val } : m));

  // ── KPI label keys (must match Dashboard) ───────────
  const KPI_KEYS = [
    'totalTrenching','rockBreaking','avgManpower','cumSafeHrs',

  ];

  // ── Tab names ───────────────────────────────────────
  const TAB_KEYS = ['dashboard','database','permits','lookahead','dprviewer','equipment','planning','inputs'];
  const TAB_DEFAULTS = {
    dashboard: 'Dashboard', database: 'Master Database', permits: 'Permits Register',
    lookahead: 'Look-Ahead', dprviewer: 'DPR Viewer', equipment: 'Equipment Log',

  return (

        <div>
          <CorridorSwitch value={corridor} onChange={c => setCorridor && setCorridor(c)} options={[
            { id:'south', label:'South Corridor' }, { id:'east', label:'East Corridor' }
          ]} />
          <div style={{ fontSize:11, color:C.softGrey, marginTop:6, fontFamily:"'IBM Plex Mono', monospace" }}>
            Editing settings for the {corridor === 'east' ? 'East' : 'South'} corridor — scope, surveyed quantities and approval names are saved separately per corridor.
          </div>
        </div>
      </div>

      {/* SECTION A — Branding & Header */}
      <Collapsible title="Branding & Header" badge="Section A">
        {field('Site Title (browser tab)', 'siteTitle')}
        {field('Project Name (full)',      'projectName')}
        {field('Project Subtitle',         'description')}
        {field('Client',                   'company')}
        {field('Contractor',               'contractor')}
        {field('Sub-Contractor',           'subContractor')}
        {/* These 3 feed the Dashboard "Project Team" box + Project Overview + report header.
             Project-wide: the canonical copy lives in SOUTH inputs (same as orgChart), so the
             same name shows on both corridors — editing on East updates South and vice-versa. */}
        {leadField('Project Manager',      'projectManager')}
        {leadField('Construction Manager', 'constructionMgr')}
        {leadField('Site Engineer',        'siteEngineer')}
        {field('Document Reference',       'docRef')}
        {field('Area Grid',                'areaGrid')}
        {field('Project Start',            'projectStart', 'date')}
        {field('Project End',              'projectEnd',   'date')}

        <div style={{ display: 'grid', gridTemplateColumns: '180px 1fr', gap: 8, alignItems: 'center', marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.lightGrey}` }}>
          <label style={{ fontSize: 11, fontWeight: 600, color: C.charcoal }}>Logo (optional)</label>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            {inp.logoData ? (
              <img src={inp.logoData} alt="logo" style={{ maxHeight: 44, maxWidth: 140, background: C.pearl, padding: 4, borderRadius: 3, border: `1px solid ${C.lightGrey}` }} />
            ) : (
              <span style={{ fontSize: 11, color: C.softGrey, fontStyle: 'italic' }}>No logo uploaded</span>
            )}
            <input type="file" accept="image/*" onChange={handleLogo} style={{ fontSize: 10, fontFamily: 'inherit' }} />
            {inp.logoData && (
              <button onClick={() => update('logoData', '')} style={{
                background: 'none', border: `1px solid ${C.crimson}`, color: C.crimson,
                padding: '3px 10px', borderRadius: 3, fontSize: 10, cursor: 'pointer', fontFamily: 'inherit',
              }}>Remove</button>
            )}
          </div>
        </div>
      </Collapsible>

      {/* SECTION A2 — Organization Chart (project-wide) */}
      <Collapsible title="Organization Chart" badge="Project-wide" defaultOpen={false}>
        <div style={{ fontSize: 10, color: C.softGrey, marginBottom: 10, fontFamily: "'IBM Plex Mono', monospace" }}>
          These names appear in the Organization Chart on the Overview page. They are project-wide (shared across both corridors), not per-corridor.
        </div>
        {orgField('Sn. Project Manager',        'pm')}
        {orgField('Trenching Lead',             'trenchingLead')}
        {orgField('South Trench Lead',          'southLead')}
        {orgField('South · Field Engineer (Night)', 'southNight')}
        {orgField('South · Site Supervisor (Day)',  'southDay')}
        {orgField('Survey Specialist',          'survey')}
        {orgField('East Trench Lead',           'eastLead')}
        {orgField('East · Site Supervisor (Day)',   'eastDay')}
        {orgField('East · Field Engineer (Night)',  'eastNight')}
        {orgField('HSE Lead',                   'hseLead')}
        {orgField('HSE Specialist 1 (Night)',   'hse1')}
        {orgField('HSE Specialist 2 (Day)',     'hse2')}

        {orgField('HSE Specialist 4 (Night)',   'hse4')}
      </Collapsible>

      {/* SECTION B — Project Team */}
      <Collapsible title="Project Team" badge={`Section B · ${team.length}`}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {team.map((m, i) => (
            <div key={i} style={{
              display: 'grid', gridTemplateColumns: '1fr 1fr auto', gap: 8, alignItems: 'center',
              background: C.pearl, borderRadius: 3, padding: '6px 10px', border: `1px solid ${C.lightGrey}`,
            }}>
              <input
                value={m.role || ''}

              />
              <input
                value={m.name || ''}
                onChange={e => editMember(i, 'name', e.target.value)}
                placeholder="Full name"
                style={{ ...inputStyle, color: C.inputBlue, fontWeight: 700, background: 'white' }}
              />
              <button
                onClick={() => removeMember(i)}
                style={{ background: 'none', border: 'none', color: C.crimson, cursor: 'pointer', fontSize: 16, padding: '0 4px', lineHeight: 1 }}
                title="Remove member"
              >✕</button>
            </div>
          ))}
          <button onClick={addMember} style={{
            alignSelf: 'flex-start', background: C.lime, color: C.navy, border: `1.5px solid ${C.lime}`,

            fontFamily: 'inherit', marginTop: 4,
          }}>+ Add Team Member</button>
        </div>
      </Collapsible>

      {/* SECTION C — Dashboard KPI labels */}
      <Collapsible title="Dashboard KPI Labels" badge="Section C" defaultOpen={false}>
        <div style={{ fontSize: 10, color: C.softGrey, marginBottom: 10, fontStyle: 'italic' }}>
          Rename any of the 12 KPI cards shown on the Dashboard. Caption is the small sub-text below the value.
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 8 }}>
          {KPI_KEYS.map(k => (
            <div key={k} style={{
              display: 'grid', gridTemplateColumns: '1fr 1fr 1.4fr', gap: 8, alignItems: 'center',
              padding: '4px 8px', background: C.pearl, borderRadius: 3, border: `1px solid ${C.lightGrey}`,
            }}>
              <span style={{ fontSize: 10, color: C.softGrey, fontFamily: 'monospace' }}>{k}</span>

            onChange={e => update('surveySource', e.target.value)}
            style={textareaStyle}
            placeholder="e.g. MDR survey 28-Apr-2026; announced in DPR-138"
          />
        </div>
      </Collapsible>

      {/* SECTION G — DPR Approval Names */}
      <Collapsible title="DPR Approval Names" badge="Section G" defaultOpen={false}>
        {field('Prepared By (AHC Planning)', 'preparedByApproval')}
        {field('Checked By (AHC CM)',         'checkedBy')}
        {field('Reviewed By (AHC PM)',        'reviewedBy')}
        {field('Approved By (MDR)',           'approvedByMDR')}
        {field('Approved By (QE)',            'approvedByQE')}
      </Collapsible>

      {/* RESET */}
      <div style={{
        marginTop: 24, padding: 16, background: C.navy, color: C.pearl,
        borderRadius: 4, border: `1px solid rgba(146,218,72,0.3)`,
      }}>
        <div style={{ color: C.lime, fontWeight: 700, fontSize: 11, marginBottom: 10, letterSpacing: 1 }}>⚠ RESET</div>

          Master Database, Permits, and Look-Ahead are <strong style={{ color: C.lime }}>not affected</strong>.

        <button onClick={reset} style={{
          background: C.crimson, color: 'white', border: 'none', borderRadius: 3,
          padding: '8px 16px', fontSize: 11, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit', letterSpacing: 0.5,
        }}>Reset Project Inputs to Defaults</button>
      </div>

      <div style={{ marginTop: 16, padding: 14, background: C.pearl, borderRadius: 4, border: `1px dashed ${C.lightGrey}`, fontSize: 10, color: C.softGrey, lineHeight: 1.6 }}>
        💾 All edits auto-save to your browser's local storage. Use the top nav <strong style={{ color: C.navy }}>Export JSON</strong> to back up everything,
        or <strong style={{ color: C.navy }}>Import Excel</strong> to replace data from an MST file.
      </div>
    </div>
  );
}

window.ExpandedInputs = ExpandedInputs;

</script>

// ═══════════════════════════════════════════════════════════════
// EXCEL IMPORT ENGINE — Header-based mapping
// Reads the actual header row of each sheet and resolves columns by NAME.
// This makes the importer resilient to:
//   • Missing columns (older files without Downtime Reason / GPS DT)
//   • New columns added at the end
//   • Harmless column reordering
// Sheets read: Master Database, Permits Register, Look-Ahead, Inputs
// ═══════════════════════════════════════════════════════════════

function fmtDateFromExcel(val) {
  if (val === null || val === undefined || val === '') return '';
  // Helper: YYYY-MM-DD from a Date using LOCAL time (avoids UTC-shift in UTC+3 / Qatar)
  const localYMD = d => {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  };
  if (val instanceof Date && !isNaN(val.getTime())) return localYMD(val);
  if (typeof val === 'string') {
    const t = val.trim();
    if (/^\d{4}-\d{2}-\d{2}/.test(t)) return t.slice(0, 10);
    const d = new Date(t);
    if (!isNaN(d.getTime())) return localYMD(d);
    return t;
  }
  if (typeof val === 'number') {
    // Excel serial date
    const ms = (val - 25569) * 86400 * 1000;
    const d = new Date(ms);
    if (!isNaN(d.getTime())) return localYMD(d);
  }
  return String(val);
}

// Build header → column-index map from a header row.
// Normalizes (lowercase, no spaces / punctuation) so "Near. Cum m³" matches "near cum m".
function buildHeaderMap(headerRow) {
  const map = {};
  if (!Array.isArray(headerRow)) return map;
  headerRow.forEach((cell, idx) => {
    if (cell === '' || cell === null || cell === undefined) return;
    const key = String(cell).toLowerCase()
      .replace(/[³²]/g, '')
      .replace(/[^a-z0-9]/g, '');
    if (key && !(key in map)) map[key] = idx;
  });
  return map;
}

// Resolve a column index from a list of candidate header aliases. Returns -1 if not found.
function findCol(hmap, ...aliases) {
  for (const a of aliases) {
    const key = String(a).toLowerCase().replace(/[³²]/g, '').replace(/[^a-z0-9]/g, '');
    if (key in hmap) return hmap[key];
  }
  return -1;
}

// Safe cell readers
const _cellRaw = (row, idx) => (idx >= 0 && row ? row[idx] : '');
const _cellNum = (row, idx) => {
  const v = _cellRaw(row, idx);
  if (v === '' || v === null || v === undefined) return 0;
  const n = Number(v);
  return isNaN(n) ? 0 : n;
};
const _cellStr = (row, idx) => {
  const v = _cellRaw(row, idx);
  return (v === null || v === undefined) ? '' : String(v);
};

function importFromExcel(file, store, onDone, onError) {
  if (!window.XLSX) { onError('SheetJS not loaded yet — please wait a moment and try again.'); return; }

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb   = window.XLSX.read(data, { type: 'array', cellDates: true });

      let importedDPR = 0, importedPermits = 0, importedLookahead = 0, importedScope = 0;

      // ── Master Database (header row 6 → 0-idx 5; data row 8 → 0-idx 7) ──
      const dbSheet = wb.Sheets['Master Database'];
      if (dbSheet) {
        const aoa = window.XLSX.utils.sheet_to_json(dbSheet, { header: 1, defval: '' });
        const hmap = buildHeaderMap(aoa[5] || []);

        // Resolve each field by header NAME (with sensible aliases for old/new files)
        const C = {
          dpr:        findCol(hmap, 'dpr', 'dpr#', 's#'),
          date:       findCol(hmap, 'date'),
          day:        findCol(hmap, 'day'),
          rain:       findCol(hmap, 'rain'),
          type:       findCol(hmap, 'type', 'weather', 'weathertype'),
          tMax:       findCol(hmap, 'tmax', 't-max'),
          tMin:       findCol(hmap, 'tmin', 't-min'),
          nearToday:  findCol(hmap, 'neartoday', 'near.todaym', 'nearshoretoday', 'nearshoretodaym'),
          nearCum:    findCol(hmap, 'nearcum', 'near.cumm', 'nearshorecum', 'nearshorecumm'),
          nearTotal:  findCol(hmap, 'neartotal', 'near.totalm', 'nearshoretotalm'),
          nearPct:    findCol(hmap, 'nearpct', 'near.', 'near%', 'nearshorepct'),
          offToday:   findCol(hmap, 'offtoday', 'off.todaym', 'offshoretoday', 'offshoretodaym'),
          offCum:     findCol(hmap, 'offcum', 'off.cumm', 'offshorecum', 'offshorecumm'),
          offTotal:   findCol(hmap, 'offtotal', 'off.totalm', 'offshoretotalm'),
          offPct:     findCol(hmap, 'offpct', 'off.', 'off%', 'offshorepct'),
          indMP:      findCol(hmap, 'indmp'),
          indHrs:     findCol(hmap, 'indhrs'),
          dayMP:      findCol(hmap, 'daymp'),
          dayHrs:     findCol(hmap, 'dayhrs'),
          ngtMP:      findCol(hmap, 'ngtmp', 'nightmp'),
          ngtHrs:     findCol(hmap, 'ngthrs', 'nighthrs'),
          totalMP:    findCol(hmap, 'totalmp'),
          equip:      findCol(hmap, 'equip', 'equipment'),
          weatherDT:  findCol(hmap, 'weatheraffectedhrs', 'weatheraffected', 'weatherdthrs', 'weatherdt', 'weatherdowntime', 'wdt'),
          downtimeReason: findCol(hmap, 'downtimereason', 'dtreason', 'reason'),
          gpsDT:      findCol(hmap, 'gpsaffectedhrs', 'gpsaffected', 'gpsdthrs', 'gpsdt', 'gpsdgpsdthrs', 'dgpsdt'),
          safeHrs:    findCol(hmap, 'safehrs', 'safemanhrs', 'safemanhours'),
          cumSafeHrs: findCol(hmap, 'cumsafehrs', 'cumhrs', 'cumsafemanhrs', 'cumsafemanhours'),
          permits:    findCol(hmap, 'permits'),
          hit:        findCol(hmap, 'hit', 'hitcards'),
          comm:       findCol(hmap, 'comm', 'communications', 'comms'),
          tbt:        findCol(hmap, 'tbt'),
          incidents:  findCol(hmap, 'incid', 'incidents'),
          audits:     findCol(hmap, 'audits', 'audit'),
          offRockTd:  findCol(hmap, 'offshorerocktodaym', 'offshorerocktoday', 'offrocktodaym', 'offrocktoday'),
          offRockCum: findCol(hmap, 'offshorerockcumm', 'offshorerockcum', 'offrockcumm', 'offrockcum'),
          nearRockTd: findCol(hmap, 'nearshorerocktodaym', 'nearshorerocktoday', 'nearrocktodaym', 'nearrocktoday'),
          nearRockCum:findCol(hmap, 'nearshorerockcumm', 'nearshorerockcum', 'nearrockcumm', 'nearrockcum'),
          offTrTd:    findCol(hmap, 'offshoretrenchtodaym', 'offshoretrenchtoday', 'offtrenchtodaym', 'offtrenchtoday'),
          offTrCum:   findCol(hmap, 'offshoretrenchcumm', 'offshoretrenchcum', 'offtrenchcumm', 'offtrenchcum'),
          nearTrTd:   findCol(hmap, 'nearshoretrenchtodaym', 'nearshoretrenchtoday', 'neartrenchtodaym', 'neartrenchtoday'),
          nearTrCum:  findCol(hmap, 'nearshoretrenchcumm', 'nearshoretrenchcum', 'neartrenchcumm', 'neartrenchcum'),
          notes:      findCol(hmap, 'challengesnotes', 'notes', 'challenges'),
        };

        const newDPR = [];
        for (let i = 7; i < aoa.length; i++) {
          const r = aoa[i];
          if (!r) continue;
          const dprNo = _cellRaw(r, C.dpr);
          if (dprNo === '' || dprNo === null || dprNo === undefined) continue;
          const dateStr = fmtDateFromExcel(_cellRaw(r, C.date));
          if (!dateStr) continue;

          let day = _cellStr(r, C.day);
          if (!day) day = new Date(dateStr).toLocaleDateString('en-US', { weekday: 'short' });
          const isFriday = day.toLowerCase().startsWith('fri');

          const indMP = _cellNum(r, C.indMP);
          const dayMP = _cellNum(r, C.dayMP);
          const ngtMP = _cellNum(r, C.ngtMP);
          const totalMP_excel = _cellNum(r, C.totalMP);

          const row = {
            dprNo:          Number(dprNo) || (i - 6),
            date:           dateStr,
            day:            day,
            rain:           _cellStr(r, C.rain) || 'No',
            type:           isFriday ? 'Friday' : (_cellStr(r, C.type) || 'Clear'),
            tMax:           C.tMax >= 0 && _cellRaw(r,C.tMax)!=='' ? _cellNum(r, C.tMax) : '',
            tMin:           C.tMin >= 0 && _cellRaw(r,C.tMin)!=='' ? _cellNum(r, C.tMin) : '',
            // Nearshore m³
            nearshoreToday: _cellNum(r, C.nearToday),
            nearshoreCum:   _cellNum(r, C.nearCum),
            nearshoreTotal: _cellNum(r, C.nearTotal) || 11607,
            nearshorePct:   _cellNum(r, C.nearPct),
            // Offshore m³
            offshoreToday:  _cellNum(r, C.offToday),
            offshoreCum:    _cellNum(r, C.offCum),
            offshoreTotal:  _cellNum(r, C.offTotal) || 45101,
            offshorePct:    _cellNum(r, C.offPct),
            // Manpower
            indMP, indHrs: _cellNum(r, C.indHrs),
            dayMP, dayHrs: _cellNum(r, C.dayHrs),
            ngtMP, ngtHrs: _cellNum(r, C.ngtHrs),
            totalMP:       totalMP_excel || (indMP + dayMP + ngtMP),
            equip:         _cellNum(r, C.equip),
            // Downtime — preserves Friday convention (no DT on Fridays)
            weatherDT:      isFriday ? 0 : _cellNum(r, C.weatherDT),
            downtimeReason: _cellStr(r, C.downtimeReason),
            gpsDT:          _cellNum(r, C.gpsDT),
            // Safety
            safeHrs:       _cellNum(r, C.safeHrs),
            cumSafeHrs:    _cellNum(r, C.cumSafeHrs),
            // HSE
            permits:       _cellNum(r, C.permits),
            hit:           _cellNum(r, C.hit),
            comm:          _cellNum(r, C.comm),
            tbt:           _cellNum(r, C.tbt),
            incidents:     _cellNum(r, C.incidents),
            audits:        _cellNum(r, C.audits),
            // Rock breaking (linear m)
            rockOffToday:  _cellNum(r, C.offRockTd),
            rockOffCum:    _cellNum(r, C.offRockCum),
            rockOnToday:   _cellNum(r, C.nearRockTd),   // "near" stored as "On" for back-compat
            rockOnCum:     _cellNum(r, C.nearRockCum),
            // Trenching (linear m)
            offTrenchToday: _cellNum(r, C.offTrTd),
            offTrenchCum:   _cellNum(r, C.offTrCum),
            nearTrenchToday:_cellNum(r, C.nearTrTd),
            nearTrenchCum:  _cellNum(r, C.nearTrCum),
            // Notes
            notes:         _cellStr(r, C.notes),
            // Mirror nearshore into the legacy onshore keys, because the Master DB
            // "Near" columns and the Total Trench card read onshore*. Keeps offshore
            // corridors (South) unchanged (their nearshore is 0) while letting
            // nearshore-only corridors (East) show their trenching + total.
            onshoreToday: _cellNum(r, C.nearToday),
            onshoreCum:   _cellNum(r, C.nearCum),
          };
          newDPR.push(row);
          importedDPR++;
        }
        if (newDPR.length > 0) store.dprLog = newDPR;
      }

      // ── Permits Register (header row 10 → 0-idx 9; data row 11 → 0-idx 10) ──
      const pmSheet = wb.Sheets['Permits Register'];
      if (pmSheet) {
        const aoa = window.XLSX.utils.sheet_to_json(pmSheet, { header: 1, defval: '' });
        const hmap = buildHeaderMap(aoa[9] || []);
        const P = {
          jdb:      findCol(hmap, 'jdbno', 'jdb'),
          applied:  findCol(hmap, 'ecpwapplied', 'applied'),
          task:     findCol(hmap, 'taskno', 'task'),
          desc:     findCol(hmap, 'activitydescription', 'description', 'desc'),
          type:     findCol(hmap, 'permittype', 'type'),
          issued:   findCol(hmap, 'issuedate', 'issued'),
          expiry:   findCol(hmap, 'expirydate', 'expiry'),
          permitNo: findCol(hmap, 'permitno', 'permitnumber'),
          status:   findCol(hmap, 'status'),
          holder:   findCol(hmap, 'permitholder', 'holder'),
          remarks:  findCol(hmap, 'remarks', 'remark', 'notes'),
        };

        const newPermits = [];
        for (let i = 10; i < aoa.length; i++) {
          const r = aoa[i];
          if (!r) continue;
          // Skip rows that have no JDB, Task or Desc
          if (!_cellStr(r, P.jdb) && !_cellStr(r, P.task) && !_cellStr(r, P.desc)) continue;

          newPermits.push({
            jdb:      _cellStr(r, P.jdb),
            applied:  fmtDateFromExcel(_cellRaw(r, P.applied)),
            task:     _cellStr(r, P.task),
            desc:     _cellStr(r, P.desc),
            type:     _cellStr(r, P.type),
            issued:   fmtDateFromExcel(_cellRaw(r, P.issued)),
            expiry:   fmtDateFromExcel(_cellRaw(r, P.expiry)),
            permitNo: _cellStr(r, P.permitNo),
            status:   _cellStr(r, P.status),
            holder:   _cellStr(r, P.holder),
            remarks:  _cellStr(r, P.remarks),
          });
          importedPermits++;
        }
        if (newPermits.length > 0) {
          // Identify a permit by its most-unique field. Use the ACTUAL stored
          // property names (task / desc, not taskNo / description) — the old key
          // referenced fields that never existed, so two permits with a blank
          // Permit No. collapsed onto their shared JDB and one was lost (22 vs 23).
          // Fall back to a row-unique token so blank-key rows are never merged.
          const pkey = p => {
            const k = String(p.permitNo || p.task || p.jdb || p.desc || '').trim().toLowerCase();
            return k || ('row_' + Math.random().toString(36).slice(2));
          };
          const pmap = new Map((store.permits || []).map(p => [pkey(p), p]));
          newPermits.forEach(p => pmap.set(pkey(p), p));
          store.permits = Array.from(pmap.values());
        }
      }

      // ── Look-Ahead (header row 11 → 0-idx 10; data row 12 → 0-idx 11) ──
      const laSheet = wb.Sheets['Look-Ahead'];
      if (laSheet) {
        const aoa = window.XLSX.utils.sheet_to_json(laSheet, { header: 1, defval: '' });
        const hmap = buildHeaderMap(aoa[10] || []);
        const L = {
          area:        findCol(hmap, 'hoarea', 'area'),
          eventType:   findCol(hmap, 'eventtype', 'event', 'type'),
          date:        findCol(hmap, 'date'),
          description: findCol(hmap, 'description', 'desc'),
          priority:    findCol(hmap, 'priority'),
          assigned:    findCol(hmap, 'assigned', 'owner'),
          notes:       findCol(hmap, 'notes', 'remarks'),
        };

        const newLA = [];
        for (let i = 11; i < aoa.length; i++) {
          const r = aoa[i];
          if (!r) continue;
          // Skip totally empty rows
          if (!_cellStr(r, L.area) && !_cellStr(r, L.eventType) &&
              !_cellStr(r, L.description) && !_cellRaw(r, L.date)) continue;

          newLA.push({
            area:        _cellStr(r, L.area),
            eventType:   _cellStr(r, L.eventType),
            date:        fmtDateFromExcel(_cellRaw(r, L.date)),
            description: _cellStr(r, L.description),
            priority:    _cellStr(r, L.priority) || 'Medium',
            assigned:    _cellStr(r, L.assigned),
            notes:       _cellStr(r, L.notes),
          });
          importedLookahead++;
        }
        if (newLA.length > 0) {
          const lkey = x => (String(x.date || '') + '|' + String(x.description || '')).trim().toLowerCase();
          const lmap = new Map((store.lookahead || []).map(x => [lkey(x), x]));
          newLA.forEach(x => lmap.set(lkey(x), x));
          store.lookahead = Array.from(lmap.values());
        }
      }

      // ── Inputs — Project info, Team, Scope, Approval names, Surveyed qtys ──
      const inpSheet = wb.Sheets['Inputs'];
      if (inpSheet) {
        const aoa = window.XLSX.utils.sheet_to_json(inpSheet, { header: 1, defval: '' });
        // Cell access by row/col 0-index: getD(row1based) → col D
        const cellAt = (row1, col0) => {
          const r = aoa[row1 - 1];
          return r ? (r[col0] ?? '') : '';
        };
        const strAt = (row1, col0) => String(cellAt(row1, col0) ?? '');
        const numAt = (row1, col0) => {
          const v = cellAt(row1, col0);
          if (v === '' || v === null || v === undefined) return NaN;
          const n = Number(v); return isNaN(n) ? NaN : n;
        };

        const newInputs = { ...store.inputs };

        // Project information (D8–D15 = col D = col index 3)
        if (strAt(8, 3))  newInputs.projectName   = strAt(8, 3);
        if (strAt(9, 3))  newInputs.description   = strAt(9, 3);
        if (strAt(10, 3)) newInputs.company       = strAt(10, 3);
        if (strAt(11, 3)) newInputs.contractor    = strAt(11, 3);
        if (strAt(12, 3)) newInputs.subContractor = strAt(12, 3);
        if (cellAt(13, 3) !== '') newInputs.projectStart = fmtDateFromExcel(cellAt(13, 3)) || strAt(13, 3);
        if (cellAt(14, 3) !== '') newInputs.projectEnd   = fmtDateFromExcel(cellAt(14, 3)) || strAt(14, 3);
        if (strAt(15, 3)) newInputs.areaGrid      = strAt(15, 3);

        // Project Team — D18–D23 with role labels from col B
        const teamRows = [];
        for (let row1 = 18; row1 <= 23; row1++) {
          const role = strAt(row1, 1).replace(/\s*\(You\)\s*$/i, '').trim();
          const name = strAt(row1, 3).trim();
          if (role || name) teamRows.push({ role: role || 'Member', name });
        }
        if (teamRows.length) newInputs.teamMembers = teamRows;
        // Also update legacy individual fields when present
        if (strAt(18, 3)) newInputs.projectDirector  = strAt(18, 3);
        if (strAt(19, 3)) newInputs.projectManager   = strAt(19, 3);
        if (strAt(20, 3)) newInputs.constructionMgr  = strAt(20, 3);
        if (strAt(21, 3)) newInputs.siteEngineer     = strAt(21, 3);
        if (strAt(22, 3)) newInputs.planningEngineer = strAt(22, 3);
        if (strAt(23, 3)) newInputs.preparedBy       = strAt(23, 3);

        // Scope quantities — rows 27–35. Columns can shift due to MERGED cells
        // (Total Qty merged C:D, Daily Rate merged F:G), so read by scanning the
        // row's numeric cells rather than fixed column indexes.
        const newScope = [];
        for (let row1 = 27; row1 <= 35; row1++) {
          const rowArr = aoa[row1 - 1] || [];
          const act = String(rowArr[1] ?? '').trim();   // col B = activity
          if (!act) continue;
          // Collect the numeric cells AFTER the activity name (cols C onward),
          // ignoring blanks created by merged cells. First number = Total Qty,
          // last number = Daily Rate. UoM is the first text token among them.
          const nums = [];
          let uom = '';
          for (let c = 2; c < rowArr.length; c++) {
            const cell = rowArr[c];
            if (cell === '' || cell === null || cell === undefined) continue;
            if (typeof cell === 'number' && isFinite(cell)) {
              nums.push(cell);
            } else {
              const s = String(cell).trim();
              // a numeric string (no letters) counts as a number
              if (/^[\d,]+(\.\d+)?$/.test(s)) {
                nums.push(Number(s.replace(/,/g, '')));
              } else if (!uom && /^(m³|m3|m|km|no|ea|nos)$/i.test(s)) {
                uom = s;
              }
            }
          }
          if (!nums.length) continue;
          const qty  = nums[0];
          const rate = nums.length > 1 ? nums[nums.length - 1] : 100;
          newScope.push({
            activity: act,
            totalQty: qty,
            uom: uom || 'm³',
            dailyRate: rate,
          });
          importedScope++;
        }
        if (newScope.length) store.scope = newScope;

        // Approval names — D38–D42 (col D = col 3)
        if (strAt(38, 3)) newInputs.preparedByApproval = strAt(38, 3);
        if (strAt(39, 3)) newInputs.checkedBy          = strAt(39, 3);
        if (strAt(40, 3)) newInputs.reviewedBy         = strAt(40, 3);
        if (strAt(41, 3)) newInputs.approvedByMDR      = strAt(41, 3);
        if (strAt(42, 3)) newInputs.approvedByQE       = strAt(42, 3);

        // Surveyed quantities — rows 7-10. Value cells are MERGED (B7:I7, B8:C8…),
        // so scan the row for the first numeric value after the label rather than
        // trusting a fixed column. Blank = "no survey yet" → 0.
        const firstNumInRow = (row1) => {
          const rowArr = aoa[row1 - 1] || [];
          for (let c = 1; c < rowArr.length; c++) {
            const cell = rowArr[c];
            if (cell === '' || cell === null || cell === undefined) continue;
            if (typeof cell === 'number' && isFinite(cell)) return cell;
            const s = String(cell).trim();
            if (/^[\d,]+(\.\d+)?$/.test(s)) return Number(s.replace(/,/g, ''));
            return NaN; // first non-empty cell is text (e.g. a label) → no number
          }
          return NaN;
        };
        // ── Survey values are OWNED by Project Settings, NOT by the import. ──
        // The Excel "Surveyed" cells are contractor-reported figures that are not
        // necessarily survey-verified, so importing them used to re-introduce a
        // false variance after every import. We deliberately DO NOT read
        // surveyedNear / surveyedOff / surveyDate / surveySource here. To record a
        // verified survey, edit it in Project Settings for the relevant corridor.

        store.inputs = newInputs;

        // PM/CM/SE are project-wide — keep the canonical copy (SOUTH inputs) in sync so the
        // imported leadership names show on BOTH corridors, regardless of which file was loaded.
        const _south = store.corridors && store.corridors.south && store.corridors.south.inputs;
        if (_south) {
          if (strAt(19, 3)) _south.projectManager  = strAt(19, 3);
          if (strAt(20, 3)) _south.constructionMgr = strAt(20, 3);
          if (strAt(21, 3)) _south.siteEngineer    = strAt(21, 3);
        }
      }

      // ── Equipment Log (per corridor) — header-based, tolerant of missing/extra columns ──
      // Rows = dates, columns = equipment, cell = that day's count, plus a computed TOTAL.
      const eqSheet = wb.Sheets['Equipment Log'];
      if (eqSheet) {
        const aoa = window.XLSX.utils.sheet_to_json(eqSheet, { header: 1, defval: '' });
        // Locate the header row: the first row that carries a "Date" header cell.
        let hr = -1, dateCol = -1;
        for (let i = 0; i < aoa.length && hr < 0; i++) {
          const row = aoa[i] || [];
          for (let c = 0; c < row.length; c++) {
            const cell = String(row[c]).trim().toLowerCase();
            // tolerate "Date", "DATE", "Log Date", etc. — but not equipment names
            if (cell === 'date' || /\bdate\b/.test(cell)) { hr = i; dateCol = c; break; }
          }
        }
        if (hr >= 0 && dateCol >= 0) {
          const header = aoa[hr] || [];
          // Every other named header (not Date / Day / Total / index columns) is an equipment column.
          const skip = /^(date|day|total|s#?|dpr#?|no\.?|sr\.?|sl\.?|#|sn|srno|slno)$/i;
          const eqCols = [];
          header.forEach((cell, ci) => {
            if (ci === dateCol) return;
            const name = String(cell).trim();
            if (!name || skip.test(name.replace(/\s+/g, ''))) return;
            eqCols.push({ ci, name });
          });
          const rows = [];
          for (let i = hr + 1; i < aoa.length; i++) {
            const r = aoa[i];
            if (!r) continue;
            const dateStr = fmtDateFromExcel(r[dateCol]);
            if (!dateStr) continue;   // skips blank/summary rows (e.g. a trailing "Total" row)
            const counts = {};
            let total = 0;
            eqCols.forEach(({ ci, name }) => {
              const raw = r[ci];
              const n = (raw === '' || raw === null || raw === undefined) ? 0 : (Number(raw) || 0);
              counts[name] = n;
              total += n;
            });
            rows.push({ date: dateStr, counts, total });
          }
          if (rows.length) store.equipLog = { equipment: eqCols.map(e => e.name), rows };
        }
      }

      // Persist & notify
      store.save();
      onDone(importedDPR, importedPermits, importedLookahead, importedScope);

    } catch(err) {
      console.error('Excel import error:', err);
      onError('Import failed: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}


// ─── INLINE EDITABLE LABEL ────────────────────────────────
// Double-click any label to edit it. Saves to localStorage under key 'nfs_labels_v1'.
const labelStore = (() => {
  const KEY = 'nfs_labels_v1';
  let cache = null;
  return {
    get(id, fallback) {
      if (!cache) { try { cache = JSON.parse(localStorage.getItem(KEY)||'{}'); } catch(e) { cache={}; } }
      return cache[id] !== undefined ? cache[id] : fallback;
    },
    set(id, val) {
      if (!cache) cache = {};
      cache[id] = val;
      try { localStorage.setItem(KEY, JSON.stringify(cache)); } catch(e) {}
    }
  };
})();

function InlineLabel({ id, fallback, style, className }) {
  const [editing, setEditing] = React.useState(false);
  const [val, setVal]         = React.useState(() => labelStore.get(id, fallback));
  const inputRef = React.useRef();

  React.useEffect(() => { if (editing && inputRef.current) inputRef.current.focus(); }, [editing]);

  const commit = (v) => { const trimmed = v.trim() || fallback; setVal(trimmed); labelStore.set(id, trimmed); setEditing(false); };

  if (editing) {
    return (
      <input
        ref={inputRef}
        value={val}
        onChange={e => setVal(e.target.value)}
        onBlur={e => commit(e.target.value)}
        onKeyDown={e => { if(e.key==='Enter') commit(val); if(e.key==='Escape'){ setVal(labelStore.get(id,fallback)); setEditing(false); } }}
        style={{ ...style, border:'1px solid #92DA48', background:'#FFFFF0', borderRadius:2, padding:'1px 4px', fontFamily:'inherit', outline:'none', minWidth:60 }}
      />
    );
  }
  return (
    <span
      style={{ ...style, cursor:'text', borderBottom:'1px dashed transparent', transition:'border-color 0.15s' }}
      title="Double-click to edit label"
      onDoubleClick={() => setEditing(true)}
      onMouseEnter={e => e.currentTarget.style.borderBottomColor='#92DA48'}
      onMouseLeave={e => e.currentTarget.style.borderBottomColor='transparent'}
    >
      {val}
    </span>
  );
}
window.InlineLabel = InlineLabel;

function Dashboard({ store, tweaks, onEditSettings, corridor='overall', setCorridor }) {
  store.corridor = corridor;
  const _kpis = store.kpis;
  const log  = store.dprLog.filter(r => r.date); // all logged days
  // Recalculate avgManpower inline to avoid stale getter cache
  const _activeDays = log.filter(r => (r.indMP||0)+(r.dayMP||0)+(r.ngtMP||0) > 0);
  const _mpSum = _activeDays.reduce((s,r) => s+(r.indMP||0)+(r.dayMP||0)+(r.ngtMP||0), 0);
  const kpis = { ..._kpis, avgManpower: _activeDays.length ? Math.round(_mpSum/_activeDays.length) : 0 };
  const inp  = store.inputs;

  // ── Trend: compare last 7 days vs prev 7 days ──
  const trendOf = (key) => {
    const sorted = [...log].sort((a,b) => a.date > b.date ? 1 : -1);
    const last7  = sorted.slice(-7);
    const prev7  = sorted.slice(-14, -7);
    if (!last7.length || !prev7.length) return null;
    const avg = (arr) => arr.reduce((s,r) => s + (r[key]||0), 0) / arr.length;
    const a = avg(last7), b = avg(prev7);
    if (!b) return null;
    return ((a - b) / b) * 100;
  };
  const trendNearToday  = trendOf('nearshoreToday');
  const trendOffToday   = trendOf('offshoreToday');
  const trendMP         = trendOf('totalMP');
  const trendSafeHrs    = trendOf('safeHrs');
  const trendWeatherDT  = trendOf('weatherDT');

  const labels         = log.map(r => r.date.slice(5));

                background: C.white,
                borderLeft: `2px solid ${kpis.totalIncidents > 0 ? C.crimson : C.green}`,
                border: `1px solid ${C.lightGrey}`,
                borderLeftWidth: 2,
                borderLeftColor: kpis.totalIncidents > 0 ? C.crimson : C.green,
                borderRadius: 4,
                boxShadow: '0 1px 3px rgba(25,10,175,0.08)',
                padding: '12px 14px', minHeight: 92,
                display: 'flex', flexDirection: 'column', gap: 4,
              }}>
                <div style={{
                  fontSize: 9, fontWeight: 600, color: kpis.totalIncidents > 0 ? C.crimson : C.green,
                  textTransform: 'uppercase', letterSpacing: '0.12em',
                }}>Total Incidents</div>
                <div style={{
                  fontFamily: "'IBM Plex Mono', monospace", fontVariantNumeric: 'tabular-nums',
                  fontSize: 28, fontWeight: 700,
                  color: kpis.totalIncidents > 0 ? C.crimson : C.green,
                  lineHeight: 1.1, marginTop:'auto',
                }}>{kpis.totalIncidents}</div>
                <div style={{ fontSize: 10, color: C.softGrey, lineHeight: 1.3 }}>
                  {kpis.totalIncidents === 0
                    ? <span style={{ color: C.green, fontWeight:600 }}>✓ Zero incidents to date</span>
                    : <span style={{ color: C.crimson, fontWeight:600 }}>⚠ Requires immediate review</span>}
                </div>
              </div>
              <KPICard accent={C.amber} label="Site Downtime"
                value={<>{fmtNum(kpis.siteDowntimeDays)}<span style={{fontSize:14, color:C.softGrey, marginLeft:4}}>days</span></>}
                sub="stoppage days marked ⛔" />
            </div>
          </React.Fragment>
        );
      })()}

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
        <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden' }}>
          <SectionHeader title="Cumulative Excavation (m³)" subtitle="Nearshore + Offshore — reported quantities to date" />
          <div style={{ padding:'12px 12px 8px', height:220 }}>
            <ChartCanvas id="line" config={lineConfig} height={200} />
          </div>
        </div>
        <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden' }}>
          <SectionHeader title="Daily Production (m³)" subtitle="Daily output per zone — Nearshore + Offshore (stacked)" />
          <div style={{ padding:'12px 12px 8px', height:220 }}>
            <ChartCanvas id="prod" config={prodConfig} height={200} />

// ─── MASTER DATABASE ───────────────────────────────────────
function MasterDatabase({ store, onUpdate, tweaks, corridor='south', setCorridor, onImportExcel }) {
  const isAdmin = !!window.__nfsIsAdmin;   // Layer A: gate delete UI
  store.corridor = corridor;
  const xlsxRef = useRef();
  const [rows, setRows]     = useState(store.dprLog);
  const [adding, setAdding] = useState(false);
  const [filter, setFilter] = useState('');
  const [dprModal, setDprModal] = useState(null);

  const save = (updated) => { setRows(updated); store.dprLog = updated; onUpdate(); };

  const handleEdit = (ri, key, val) => {
    const updated = rows.map((r,i) => i===ri ? {...r,[key]:val} : r);
    save(updated);
  };

  const addRow = () => {
    const lastDpr = rows.length ? Math.max(...rows.map(r=>r.dprNo||0)) : 0;
    const today   = new Date().toISOString().slice(0,10);
    const newRow  = {
      dprNo:lastDpr+1, date:today, day:new Date().toLocaleDateString('en-GB',{weekday:'short'}),
      rain:'No', type:'Clear', tMax:30, tMin:20,
      offshoreToday:0, offshoreCum: rows.length ? (rows[rows.length-1].offshoreCum||0) : 0,
      onshoreToday:0, onshoreCum: rows.length ? (rows[rows.length-1].onshoreCum||0) : 0,
      rockOffToday:0, rockOffCum: rows.length ? (rows[rows.length-1].rockOffCum||0) : 0,
      rockOnToday:0, rockOnCum: rows.length ? (rows[rows.length-1].rockOnCum||0) : 0,
      indMP:0, indHrs:0, dayMP:0, dayHrs:0, ngtMP:0, ngtHrs:0, equip:0,
      safeHrs:0, cumSafeHrs: rows.length ? (rows[rows.length-1].cumSafeHrs||0) : 0,
      permits:0, hit:0, comm:0, tbt:0, incidents:0, audits:0, notes:'',
    };
    const updated = [...rows, newRow];
    save(updated);
    setAdding(false);
  };

  const deleteRow = (ri) => {
    if(!confirm('Delete this DPR entry?')) return;
    save(rows.filter((_,i)=>i!==ri));
  };

  const filtered = filter
    ? rows.filter(r => r.date.includes(filter) || String(r.dprNo).includes(filter) || (r.notes||'').toLowerCase().includes(filter.toLowerCase()))
    : rows;

  // ─── Multi-row selection (keyed by stable dprNo, survives filter/sort) ───
  const { selected, toggleRow: toggleOne, toggleAll, clear: clearSelection } =
    useSelection(() => filtered.map(r => r.dprNo));

  const deleteSelected = () => {
    if (!confirm(`Delete ${selected.size} selected DPR ${selected.size === 1 ? 'entry' : 'entries'}?`)) return;
    save(rows.filter(r => !selected.has(r.dprNo)));
    clearSelection();
  };
  const exportSelected = () => {
    rows.filter(r => selected.has(r.dprNo)).forEach(r => exportDPR(store, r, tweaks));
  };

  const WEATHER_TYPES = ['Sunny','Clear','Hazy','Cloudy','Rainy','Foggy','Windy'];

  const cols = [
    { label:'DPR', key:'dprNo', type:'number', width:36, bold:true, color:r=>(r.incidents>0?C.crimson:C.qeBlue) },
    { label:'Date', key:'date', type:'date', width:100, fmt:null },
    { label:'Day', key:'day', width:40, editable:false, color:()=>C.softGrey },
    { label:'Rain', key:'rain', type:'select', options:['No','Yes'], width:50 },
    { label:'Type', key:'type', type:'select', options:WEATHER_TYPES, width:82 },
    { label:'T°Max', key:'tMax', type:'number', width:44 },
    { label:'T°Min', key:'tMin', type:'number', width:44 },
    { label:'Off Today', key:'offshoreToday', type:'number', fmt:'#,##0.0', width:60 },
    { label:'Off Cum',   key:'offshoreCum',   type:'number', fmt:'#,##0', width:58, bold:true },
    { label:'Near Today', key:'onshoreToday',  type:'number', fmt:'#,##0.0', width:58 },
    { label:'Near Cum',  key:'onshoreCum',    type:'number', fmt:'#,##0', width:56, bold:true },
    { label:'Rock Off',  key:'rockOffToday',  type:'number', fmt:'#,##0.0', width:54 },
    { label:'Rock Near', key:'rockOnToday',   type:'number', fmt:'#,##0.0', width:54 },
    { label:'Ind MP',    key:'indMP',  type:'number', width:44 },
    { label:'Day MP',    key:'dayMP',  type:'number', width:44 },
    { label:'Ngt MP',    key:'ngtMP',  type:'number', width:44 },
    { label:'Total MP',  key:'_total', editable:false, width:50, bold:true, color:()=>C.qeBlue,
      render:(r)=>(r.indMP||0)+(r.dayMP||0)+(r.ngtMP||0) },
    { label:'Equip',     key:'equip',  type:'number', width:42 },
    { label:'Safe Hrs',  key:'safeHrs',  type:'number', fmt:'#,##0', width:55, bold:true, color:()=>C.qeTeal },
    { label:'Cum Hrs',   key:'cumSafeHrs', type:'number', fmt:'#,##0', width:58 },
    { label:'Permits',   key:'permits', type:'number', width:46 },
    { label:'HIT',       key:'hit',     type:'number', width:36 },
    { label:'TBT',       key:'tbt',     type:'number', width:36 },
    { label:'Incidents', key:'incidents', type:'number', width:54, bold:true,
      color:r=>(r.incidents>0?C.crimson:C.green) },
    { label:'Notes', key:'notes', type:'text', width:240, wrap:false, align:'left' },
    { label:'DPR', key:'_pdf', editable:false, width:40,
      render:(r,ri)=>(
        <Btn size="xs" variant="navy" onClick={()=>setDprModal(r)} style={{ color: C.navy, borderColor: C.navy }}>PDF</Btn>
      )
    },
    { label:'Del', key:'_del', editable:false, width:36,
      render:(r,ri)=>(
        <button onClick={()=>deleteRow(ri)} style={{
          background:'none', border:'none', color:C.crimson, cursor:'pointer', fontSize:13, padding:0
        }}>✕</button>
      )
    },
  ];

  const rowStyle = (r) => ({
    background: r.incidents > 0 ? '#FFF0ED' : undefined,
    outline: r.date === new Date().toISOString().slice(0,10) ? `2px solid ${C.lime}` : 'none',
  });

  return (
    <div style={{ padding:16 }}>
      {/* ─── CORRIDOR SELECTOR + IMPORT ─── */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, flexWrap:'wrap', marginBottom:14 }}>
        <CorridorSwitch value={corridor} onChange={c => setCorridor && setCorridor(c)} options={[
          { id:'south', label:'South Corridor' }, { id:'east', label:'East Corridor' }
        ]} />
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ fontSize:11, color:C.softGrey, fontFamily:"'IBM Plex Mono', monospace" }}>
            {corridor === 'east' ? 'East' : 'South'} dataset · {rows.length} entries
          </span>
          {/* Excel import REPLACES the corridor's data → admin only (window.__nfsIsAdmin === true). */}
          {isAdmin && <button onClick={() => xlsxRef.current && xlsxRef.current.click()} style={{
            background:C.lime, color:C.navy, border:'none', borderRadius:4, padding:'7px 14px',
            fontSize:12, fontWeight:700, cursor:'pointer' }}>
            ⭱ Import {corridor === 'east' ? 'East' : 'South'} Excel
          </button>}
          {isAdmin && <input ref={xlsxRef} type="file" accept=".xlsx,.xls" style={{display:'none'}}
            onChange={e => { if (e.target.files[0] && onImportExcel) onImportExcel(e.target.files[0], corridor); e.target.value=''; }} />}
        </div>
      </div>
      {/* Summary Cards */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:14 }}>
        {[
          { label:'Total Trench (m³)', value:(rows.reduce((m,r)=>Math.max(m,r.offshoreCum||0),0)+rows.reduce((m,r)=>Math.max(m,r.onshoreCum||0),0)).toLocaleString(), color:C.qeBlue, sub:'Offshore + Nearshore excavation (cumulative)' },
          { label:'Total Rock Breaking (m)', value:(rows.reduce((m,r)=>Math.max(m,r.rockOffCum||0),0)+rows.reduce((m,r)=>Math.max(m,r.rockOnCum||0),0)).toLocaleString(), color:C.navy, sub:'Offshore + Nearshore combined' },
          { label:'Avg Daily Manpower', value: (() => { const active=rows.filter(r=>(r.indMP||0)+(r.dayMP||0)+(r.ngtMP||0)>0); return active.length ? Math.round(active.reduce((s,r)=>s+(r.indMP||0)+(r.dayMP||0)+(r.ngtMP||0),0)/active.length) : 0; })(), color:C.qeTeal, sub:`${rows.filter(r=>(r.dayMP||0)+(r.ngtMP||0)>0).length} active days` },
        ].map(card => (
          <div key={card.label} style={{ background:C.white, border:`2px solid ${card.color}`, borderRadius:4, padding:'12px 16px', display:'flex', flexDirection:'column', gap:4 }}>
            <div style={{ fontSize:9, fontWeight:700, color:card.color, textTransform:'uppercase', letterSpacing:1 }}>{card.label}</div>
            <div style={{ fontSize:28, fontWeight:900, color:card.color, lineHeight:1 }}>{card.value}</div>
            <div style={{ fontSize:9, color:C.softGrey }}>{card.sub}</div>
          </div>
        ))}
      </div>
      <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden' }}>
        <SectionHeader
          title={`Master Database — Daily Progress Log (${rows.length} entries)`}
          actions={
            <>
              <input
                placeholder="Search date / DPR# / notes…"
                value={filter}
                onChange={e=>setFilter(e.target.value)}
                style={{ border:`1px solid ${C.lime}`, background:'rgba(255,255,255,0.1)', color:C.white,
                  padding:'3px 8px', borderRadius:3, fontSize:10, outline:'none', width:200,
                  fontFamily:'inherit'
                }}
              />
              <Btn size="xs" variant="lime" onClick={addRow}>Add DPR</Btn>
            </>
          }
        />
        <SelectionBar count={selected.size} onDelete={isAdmin ? deleteSelected : undefined} onPdf={exportSelected} />
        <NFSTable
          cols={isAdmin ? cols : cols.filter(c => c.key !== '_del')}
          rows={filtered}
          onEdit={(ri, key, val) => {
            // Find actual index in unfiltered rows
            const actualRi = rows.indexOf(filtered[ri]);
            handleEdit(actualRi, key, val);
          }}
          rowStyle={rowStyle}
          compact={true}
          selectable
          selectedKeys={selected}
          onToggleRow={toggleOne}
          onToggleAll={toggleAll}
          rowKey={r => r.dprNo}
        />
      </div>

      {/* DPR PDF Modal */}
      {dprModal && (
        <Modal title={`Export DPR #${dprModal.dprNo} — ${dprModal.date}`} onClose={()=>setDprModal(null)} width={400}>
          <p style={{ fontSize:11, color:C.charcoal, marginBottom:16 }}>
            Print or save as PDF the Daily Progress Report for DPR #{dprModal.dprNo} ({dprModal.date}).
          </p>
          <div style={{ display:'flex', gap:8 }}>
            <Btn variant="primary" onClick={()=>{ exportDPR(store, dprModal, tweaks); setDprModal(null); }}>
              Open Print Preview
            </Btn>
