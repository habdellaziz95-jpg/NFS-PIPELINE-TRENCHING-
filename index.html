  // numbers, clear them so the East dashboard shows no false variance.
  _healEast() {
    const e = this.corridors && this.corridors.east && this.corridors.east.inputs;
    if (!e) return false;
    const inheritedNear = Number(e.surveyedNear) === Number(DEFAULT_INPUTS.surveyedNear);
    const inheritedOff  = Number(e.surveyedOff)  === Number(DEFAULT_INPUTS.surveyedOff);
    if (inheritedNear && inheritedOff && (Number(e.surveyedNear) || Number(e.surveyedOff))) {
      e.surveyedNear = 0; e.surveyedOff = 0; e.surveyDate = ""; e.surveySource = "";
      return true;
    }
    return false;
  }

  load() {
    try {
      const raw = localStorage.getItem(NFS_DATA_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        if (saved.corridors) {
          // New dual-corridor schema
          this.corridors = {
            south: {
              inputs: this._normInputs(saved.corridors.south ? saved.corridors.south.inputs : null),
              scope:  (saved.corridors.south && saved.corridors.south.scope)  || [...DEFAULT_SCOPE],
              dprLog: (saved.corridors.south && saved.corridors.south.dprLog) || [...SAMPLE_DPR],
            },
            east: {
              inputs: this._normInputs(saved.corridors.east ? saved.corridors.east.inputs : null),
              scope:  (saved.corridors.east && saved.corridors.east.scope)  || [...DEFAULT_SCOPE],
              dprLog: (saved.corridors.east && saved.corridors.east.dprLog) || [],
            },
          };
          if (saved.corridors.east && !saved.corridors.east.inputs) this.corridors.east.inputs = this._eastInputs();
          this.permits   = saved.permits   || [...SAMPLE_PERMITS];
          this.lookahead = saved.lookahead || [...SAMPLE_LOOKAHEAD];
          this.corridor  = saved.corridor || 'south';
          if (this._healEast()) this.save();
        } else {
          // Legacy single-dataset schema → migrate existing data into SOUTH corridor
          this.corridors = {
            south: {
              inputs: this._normInputs(saved.inputs),
              scope:  saved.scope  || [...DEFAULT_SCOPE],
              dprLog: saved.dprLog || [...SAMPLE_DPR],
            },
            east: {
              inputs: this._eastInputs(),
              scope:  [...DEFAULT_SCOPE],
              dprLog: [],
            },
          };
          this.permits   = saved.permits   || [...SAMPLE_PERMITS];
          this.lookahead = saved.lookahead || [...SAMPLE_LOOKAHEAD];
          this.corridor  = 'south';
          this.save();   // persist migrated schema
        }
      } else {
        this.reset();
      }
    } catch(e) {
      console.warn('load failed', e);
      this.reset();
    }
  }

  // Current corridor dataset (overall falls back to south for inputs/scope)
  get _ds() {
    const c = (this.corridor === 'overall') ? 'south' : this.corridor;
    return this.corridors[c] || this.corridors.south;
  }
  get inputs()  { return this._ds.inputs; }
  set inputs(v) { this._ds.inputs = v; }
  get scope()   { return this._ds.scope; }
  set scope(v)  { this._ds.scope = v; }
  get dprLog()  { return (this.corridor === 'overall') ? this._overallLog() : this._ds.dprLog; }
  set dprLog(v) { (this.corridor === 'overall' ? this.corridors.south : this._ds).dprLog = v; }

  resetInputsOnly() {
    this.inputs = JSON.parse(JSON.stringify(DEFAULT_INPUTS));
    this.save();
  }

  reset() {
    this.corridors = {
      south: { inputs: this._normInputs(null), scope: [...DEFAULT_SCOPE], dprLog: [...SAMPLE_DPR] },
      east:  { inputs: this._eastInputs(),     scope: [...DEFAULT_SCOPE], dprLog: [] },
    };
    this.permits   = [...SAMPLE_PERMITS];
    this.lookahead = [...SAMPLE_LOOKAHEAD];
    this.corridor  = 'south';
    this.save();
  }

  save() {
    try {
      localStorage.setItem(NFS_DATA_KEY, JSON.stringify({
        corridor:  this.corridor,
        corridors: this.corridors,
        permits:   this.permits,
        lookahead: this.lookahead,
      }));
    } catch(e) {
      console.warn('Save failed:', e);
    }
  }

  exportJSON() {
    const data = JSON.stringify({
      corridor: this.corridor, corridors: this.corridors,
      permits: this.permits, lookahead: this.lookahead
    }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `NFS_Tracker_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  importJSON(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const d = JSON.parse(e.target.result);
          if (d.corridors) {
            this.corridors = {
              south: {
                inputs: this._normInputs(d.corridors.south ? d.corridors.south.inputs : null),
                scope:  (d.corridors.south && d.corridors.south.scope)  || [...DEFAULT_SCOPE],
                dprLog: (d.corridors.south && d.corridors.south.dprLog) || [],
              },
              east: {
                inputs: this._normInputs(d.corridors.east ? d.corridors.east.inputs : null),
                scope:  (d.corridors.east && d.corridors.east.scope)  || [...DEFAULT_SCOPE],
                dprLog: (d.corridors.east && d.corridors.east.dprLog) || [],
              },
            };
          } else if (d.inputs || d.dprLog) {
            // Legacy single-dataset JSON → load into current corridor
            this._ds.inputs = this._normInputs(d.inputs);
            if (d.scope)  this._ds.scope  = d.scope;
            if (d.dprLog) this._ds.dprLog = d.dprLog;
          }
          if (d.permits)   this.permits   = d.permits;
          if (d.lookahead) this.lookahead = d.lookahead;
          this.save();
          resolve();
        } catch(err) { reject(err); }
      };
      reader.readAsText(file);
    });
  }

  // Computed KPIs
  get kpis() {
    if (this.corridor === 'overall') return this._overallKpis();
    return this._kpisFor(this.corridors[this.corridor] || this.corridors.south);
  }

  _kpisFor(ds) {
    const log = ds.dprLog;
    const maxOf = (arr, key) => arr.reduce((m, r) => Math.max(m, r[key]||0), 0);
    const sumOf = (arr, key) => arr.reduce((s, r) => s + (r[key]||0), 0);
    // Active days = rows with ANY manpower OR production data
    const nonZero = log.filter(r => (r.indMP||0) + (r.dayMP||0) + (r.ngtMP||0) > 0);
    // For avgManpower, only use rows that have BOTH manpower AND a date logged
    const activeDays = log.filter(r =>
      r.date && ((r.indMP||0) + (r.dayMP||0) + (r.ngtMP||0) > 0)
    );
    const totalMPSum = activeDays.reduce((s,r) => s + (r.indMP||0) + (r.dayMP||0) + (r.ngtMP||0), 0);
    // Also compute from safeHrs as backup (safeHrs > 0 means people were on site)
    const safeHrsDays = log.filter(r => r.date && (r.safeHrs||0) > 0);

    // Excel-aligned KPI calculations
    const nearshoreCum  = maxOf(log,'nearshoreCum');                   // MAX(J)
    const offshoreCumM3 = maxOf(log,'offshoreCum');                    // MAX(N)
    const offTrench     = maxOf(log,'offTrenchCum');                   // MAX(AM)
    const nearTrench    = maxOf(log,'nearTrenchCum');                  // MAX(AO)
    const totalTrenchLinear = offTrench + nearTrench;                  // MAX(AM)+MAX(AO)
    const offRock       = maxOf(log,'rockOffCum');                     // MAX(AI)
    const nearRock      = maxOf(log,'rockOnCum');                      // MAX(AK) (stored under rockOnCum)
    const totalRock     = offRock + nearRock;
    // Avg Daily Manpower = AVG of W (totalMP) where W > 0
    const mpRows = log.filter(r => (r.totalMP||0) > 0);
    const avgManpower = mpRows.length
      ? Math.round(mpRows.reduce((s,r)=>s+(r.totalMP||0),0) / mpRows.length) : 0;
    // Days Logged = count rows where W > 0
    const daysLoggedW = mpRows.length;
    const nearshoreTotal = log.find(r => r.nearshoreTotal)?.nearshoreTotal || 11607;
    const offshoreTotal  = log.find(r => r.offshoreTotal)?.offshoreTotal  || 45101;
    // Use stored % from cols L/P if present, else compute
    const lastNearPct = [...log].reverse().find(r => r.nearshorePct)?.nearshorePct ?? 0;
    const lastOffPct  = [...log].reverse().find(r => r.offshorePct)?.offshorePct  ?? 0;
    const nearshorePctVal = lastNearPct ? lastNearPct*100 : (nearshoreTotal ? (nearshoreCum/nearshoreTotal)*100 : 0);
    const offshorePctVal  = lastOffPct  ? lastOffPct*100  : (offshoreTotal  ? (offshoreCumM3/offshoreTotal)*100 : 0);
    // Combined downtime (Weather + GPS) — hrs
    const gpsDT = sumOf(log, 'gpsDT');
    const weatherDT = sumOf(log, 'weatherDT');
    const totalDT = weatherDT + gpsDT;
    // Site downtime — days with zero production (Fridays ARE working days; only Weather DT is excluded on Fridays)
    // Counted whenever no production happened AND manpower was deployed on site.
    const siteDowntimeDays = log.filter(r => {
      const prod = (r.nearshoreToday || 0) + (r.offshoreToday || 0)
                 + (r.offTrenchToday || 0) + (r.nearTrenchToday || 0)
                 + (r.rockOffToday   || 0) + (r.rockOnToday    || 0);
      const hasMP = ((r.indMP || 0) + (r.dayMP || 0) + (r.ngtMP || 0)) > 0;
      return hasMP && prod === 0;
    }).length;
    // Reported vs Surveyed variance (Reported = peak cumulative; Surveyed = saved value)
    const surveyedNear = Number(ds.inputs?.surveyedNear) || 0;
    const surveyedOff  = Number(ds.inputs?.surveyedOff)  || 0;
    const reportedNearPeak = nearshoreCum;     // peak cum, already maxOf(J)
    const reportedOffPeak  = offshoreCumM3;    // peak cum, already maxOf(N)
    const varianceNear = surveyedNear ? (reportedNearPeak - surveyedNear) : 0;
    const varianceOff  = surveyedOff  ? (reportedOffPeak  - surveyedOff)  : 0;
    return {
      // m³ excavation (cols J, N)
      nearshoreCum, offshoreCumM3,
      nearshorePct: nearshorePctVal,
      offshorePct:  offshorePctVal,
      totalExcM3:   nearshoreCum + offshoreCumM3,
      // Linear (cols AM, AO)
      totalTrenchLinear, offTrench, nearTrench,
      // Rock (AI, AK)
      totalRock, offRock, nearRock,
      // Manpower / safety / weather
      avgManpower,
      daysLogged:   daysLoggedW,
      cumSafeHrs:   maxOf(log,'cumSafeHrs'),                           // MAX(AA)
      weatherDT,                                                       // SUM(Y)
      gpsDT,                                                           // SUM(AA)
      totalDT,                                                         // weatherDT + gpsDT
      siteDowntimeDays,                                                // days with zero production
      totalIncidents: sumOf(log,'incidents'),                          // SUM(AF)
      // Surveyed quantities + variance
      surveyedNear, surveyedOff,
      reportedNearPeak, reportedOffPeak,
      varianceNear, varianceOff,
      // Permits
      totalPermits:   this.permits.length,
      approvedPermits: this.permits.filter(p => p.status === 'Approved').length,
      // Scope totals (used for combined % in overall)
      nearshoreTotal, offshoreTotal,
      // Legacy aliases
      totalTrenching: totalTrenchLinear,
      offshoreMax: offshoreCumM3, onshoreMax: nearshoreCum,
      onshoreCumM3: 0, onshorePct: 0,
    };
  }

  // Overall = East + South combined
  _overallKpis() {
    const e = this._kpisFor(this.corridors.east);
    const s = this._kpisFor(this.corridors.south);
    const add = (a,b) => (a||0) + (b||0);
    const nearshoreCum  = add(e.nearshoreCum,  s.nearshoreCum);
    const offshoreCumM3 = add(e.offshoreCumM3, s.offshoreCumM3);
    const nearTotal = add(e.nearshoreTotal, s.nearshoreTotal);
    const offTotal  = add(e.offshoreTotal,  s.offshoreTotal);
    const surveyedNear = add(e.surveyedNear, s.surveyedNear);
    const surveyedOff  = add(e.surveyedOff,  s.surveyedOff);
    const totalTrenchLinear = add(e.totalTrenchLinear, s.totalTrenchLinear);
    const totalRock = add(e.totalRock, s.totalRock);
    const mps = [e.avgManpower, s.avgManpower].filter(x => x > 0);
    return {
      nearshoreCum, offshoreCumM3,
      nearshorePct: nearTotal ? (nearshoreCum / nearTotal) * 100 : 0,
      offshorePct:  offTotal  ? (offshoreCumM3 / offTotal) * 100 : 0,
      totalExcM3:   nearshoreCum + offshoreCumM3,
      totalTrenchLinear, offTrench: add(e.offTrench, s.offTrench), nearTrench: add(e.nearTrench, s.nearTrench),
      totalRock, offRock: add(e.offRock, s.offRock), nearRock: add(e.nearRock, s.nearRock),
      avgManpower: mps.length ? Math.round(mps.reduce((a,b)=>a+b,0)/mps.length) : 0,
      daysLogged:  add(e.daysLogged, s.daysLogged),
      cumSafeHrs:  add(e.cumSafeHrs, s.cumSafeHrs),
      weatherDT:   add(e.weatherDT, s.weatherDT),
      gpsDT:       add(e.gpsDT, s.gpsDT),
      totalDT:     add(e.totalDT, s.totalDT),
      siteDowntimeDays: add(e.siteDowntimeDays, s.siteDowntimeDays),
      totalIncidents:   add(e.totalIncidents, s.totalIncidents),
      surveyedNear, surveyedOff,
      reportedNearPeak: nearshoreCum, reportedOffPeak: offshoreCumM3,
      varianceNear: surveyedNear ? nearshoreCum - surveyedNear : 0,
      varianceOff:  surveyedOff  ? offshoreCumM3 - surveyedOff  : 0,
      totalPermits:    this.permits.length,
      approvedPermits: this.permits.filter(p => p.status === 'Approved').length,
      nearshoreTotal: nearTotal, offshoreTotal: offTotal,
      totalTrenching: totalTrenchLinear,
      offshoreMax: offshoreCumM3, onshoreMax: nearshoreCum, onshoreCumM3: 0, onshorePct: 0,
    };
  }

  // Merged daily timeline for the Overall dashboard charts (date-union, summed)
  _overallLog() {
    const dated = (arr) => (arr || []).filter(r => r && r.date);
    const e = dated(this.corridors.east.dprLog);
    const s = dated(this.corridors.south.dprLog);
    const dates = Array.from(new Set([...e, ...s].map(r => r.date))).sort();
    const byDate = (arr) => { const m = {}; arr.forEach(r => { m[r.date] = r; }); return m; };
    const em = byDate(e), sm = byDate(s);
    const dailyKeys = ['nearshoreToday','offshoreToday','offTrenchToday','nearTrenchToday','rockOffToday','rockOnToday','indMP','dayMP','ngtMP','totalMP','equip','weatherDT','gpsDT','safeHrs','permits','hit','comm','tbt','incidents','audits'];
    const cumKeys   = ['nearshoreCum','offshoreCum','offTrenchCum','nearTrenchCum','rockOffCum','rockOnCum','cumSafeHrs'];
    const lastE = {}, lastS = {};
    const out = [];
    dates.forEach((d, i) => {
      const re = em[d], rs = sm[d];
      if (re) cumKeys.forEach(k => { if (re[k] != null) lastE[k] = re[k]; });
      if (rs) cumKeys.forEach(k => { if (rs[k] != null) lastS[k] = rs[k]; });
      const row = { dprNo: i+1, date: d, day: (re && re.day) || (rs && rs.day) || '', type: (re && re.type) || (rs && rs.type) || '' };
      dailyKeys.forEach(k => { row[k] = ((re && re[k]) || 0) + ((rs && rs[k]) || 0); });
      cumKeys.forEach(k => { row[k] = (lastE[k] || 0) + (lastS[k] || 0); });
      out.push(row);
    });
    return out;
  }
}

window.nfsStore = new NFSDataStore();
window.SAMPLE_DPR = SAMPLE_DPR;

</script>

  .twk-num-unit{padding-right:8px;color:rgba(41,38,27,.45)}

  .twk-btn{appearance:none;height:26px;padding:0 12px;border:0;border-radius:7px;
    background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default}
  .twk-btn:hover{background:rgba(0,0,0,.88)}
  .twk-btn.secondary{background:rgba(0,0,0,.06);color:inherit}
  .twk-btn.secondary:hover{background:rgba(0,0,0,.1)}

  .twk-swatch{appearance:none;-webkit-appearance:none;width:56px;height:22px;
    border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;
    background:transparent;flex-shrink:0}
  .twk-swatch::-webkit-color-swatch-wrapper{padding:0}
  .twk-swatch::-webkit-color-swatch{border:0;border-radius:5.5px}
  .twk-swatch::-moz-color-swatch{border:0;border-radius:5.5px}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel">

// NFS Tracker — Shared Components

// ─── Color tokens (McDermott + QatarEnergy) ────────────────
const C = {
  navy:     '#0A0A6E',
  lime:     '#7ED321',
  qeBlue:   '#0066B3',
  qeTeal:   '#00A878',
  white:    '#FFFFFF',
  pearl:    '#F5F8FF',
  charcoal: '#1A1A2E',
  softGrey: '#8E9AAF',
  lightGrey:'#ECEFF4',
  gold:     '#E8D9A3',
  amber:    '#E67E22',
  crimson:  '#C0392B',
  teal:     '#16A085',
  green:    '#27AE60',
  inputBlue:'#1F4E79',
};

window.C = C;

// ─── KPI Card (LAUTEC × InEight anatomy) ───────────────────
// Left-border accent in category color, small-caps label, large mono value, soft sub.
function KPICard({ label, value, sub, color = C.qeBlue, labelId, accent, trend }) {
  const accentColor = accent || color;
  const LabelComp = window.InlineLabel;
  return (
    <div style={{
      background: C.white,
      borderLeft: `2px solid ${accentColor}`,
      border: `1px solid ${C.lightGrey}`,
      borderLeftWidth: 2,
      borderLeftColor: accentColor,
      borderRadius: 4,
      boxShadow: '0 1px 3px rgba(10,10,110,0.08), 0 1px 2px rgba(10,10,110,0.04)',
      display: 'flex', flexDirection: 'column',
      padding: '12px 14px', minHeight: 92,
      gap: 4,
    }}>
      <div style={{
        fontSize: 9, fontWeight: 600, color: accentColor,
        textTransform: 'uppercase', letterSpacing: '0.12em',
        fontFamily: "'IBM Plex Sans', sans-serif",
        lineHeight: 1.2,
      }}>
        {LabelComp && labelId
          ? <LabelComp id={labelId} fallback={label} style={{ fontSize:9, fontWeight:600, color:accentColor, textTransform:'uppercase', letterSpacing:'0.12em' }} />
          : label}
      </div>
      <div style={{
        fontFamily: "'IBM Plex Mono', ui-monospace, Menlo, monospace",
        fontVariantNumeric: 'tabular-nums',
        fontSize: 28, fontWeight: 700, color: C.charcoal,
        lineHeight: 1.1, letterSpacing: '-0.01em',
        marginTop: 'auto',
      }}>
        {value}
      </div>
      {sub && <div style={{
        fontSize: 10, color: C.softGrey, lineHeight: 1.3,
        fontFamily: "'IBM Plex Sans', sans-serif",
      }}>{sub}</div>}
      {trend != null && (
        <div style={{
          marginTop: 4,
          display: 'flex', alignItems: 'center', gap: 4,
          fontSize: 10, fontWeight: 700,
          color: trend > 0 ? C.green : trend < 0 ? C.crimson : C.softGrey,
          fontFamily: "'IBM Plex Mono', monospace",
        }}>
          <span style={{ fontSize: 12 }}>{trend > 0 ? '↑' : trend < 0 ? '↓' : '→'}</span>
          <span>{trend > 0 ? '+' : ''}{trend.toFixed(1)}% vs prev 7d</span>
        </div>
      )}
    </div>
  );
}

// ─── Section Header ────────────────────────────────────────
function SectionHeader({ title, icon, actions, accent, subtitle }) {
  const acc = accent || C.lime;
  return (
    <div style={{
      background: C.navy, color: C.white,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '10px 14px',
      borderBottom: `2px solid ${acc}`,
      borderLeft: `3px solid ${acc}`,
      fontFamily: "'IBM Plex Sans', sans-serif",
    }}>
      <div>
        <div style={{ fontWeight: 700, fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase', color: C.lime }}>
          {icon && <span style={{ marginRight: 6, opacity: 0.9 }}>{icon}</span>}{title}
        </div>
        {subtitle && <div style={{ fontSize: 9, color: 'rgba(255,255,255,0.5)', marginTop: 2, fontWeight: 400, letterSpacing: '0.06em' }}>{subtitle}</div>}
      </div>
      {actions && <div style={{ display: 'flex', gap: 8, alignItems:'center' }}>{actions}</div>}
    </div>
  );
}

// ─── Table (editable or read-only) ─────────────────────────
function NFSTable({ cols, rows, onEdit, rowStyle, stickyHeader = true, compact = false }) {
  const thStyle = (col) => ({
    background: C.navy, color: C.lime,
    fontSize: compact ? 8 : 9, fontWeight: 700,
    textAlign: col.align || 'center',
    padding: compact ? '4px 4px' : '6px 6px',
    whiteSpace: 'nowrap',
    borderRight: `1px solid rgba(126,211,33,0.3)`,
    borderBottom: `2px solid ${C.lime}`,
    position: stickyHeader ? 'sticky' : 'static', top: 0, zIndex: 2,
    minWidth: col.width || 'auto',
  });

  const tdStyle = (col, rowIdx) => ({
    fontSize: compact ? 9 : 10,
    color: col.bold ? C.navy : C.charcoal,
    fontWeight: col.bold ? 700 : 400,
    textAlign: col.align || 'center',
    padding: compact ? '3px 4px' : '5px 6px',
    borderRight: `1px solid ${C.lightGrey}`,
    borderBottom: `1px solid ${C.lightGrey}`,
    background: rowIdx % 2 === 0 ? C.white : C.pearl,
    verticalAlign: 'middle',
    whiteSpace: col.wrap ? 'normal' : 'nowrap',
  });

  return (
    <div style={{ overflowX: 'auto', overflowY: 'auto', maxHeight: 480 }}>
      <table style={{ width: '100%', borderCollapse: 'collapse', tableLayout: 'fixed' }}>
        <thead>
          <tr>
            {cols.map((col, ci) => (
              <th key={ci} style={thStyle(col)} colSpan={col.span || 1}>
                {col.label}
                {col.sub && <div style={{ fontSize: 7, color: C.lime, fontWeight: 400, opacity: 0.8 }}>{col.sub}</div>}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map((row, ri) => (
            <tr key={ri} style={rowStyle ? rowStyle(row, ri) : {}}>
              {cols.map((col, ci) => {
                const raw = col.render ? col.render(row, ri) : row[col.key];
                const isEditable = onEdit && col.editable !== false && col.key;
                return (
                  <td key={ci} style={{
                    ...tdStyle(col, ri),
                    ...(rowStyle ? {} : {}),
                  }}
                    colSpan={col.span || 1}
                  >
                    {isEditable ? (
                      <EditableCell
                        value={row[col.key]}
                        type={col.type || 'text'}
                        options={col.options}
                        onChange={(v) => onEdit(ri, col.key, v)}
                        align={col.align}
                        fmt={col.fmt}
                      />
                    ) : (
                      <span style={{ color: col.color ? col.color(row) : undefined }}>
                        {col.fmt ? formatVal(raw, col.fmt) : (raw ?? '')}
                      </span>
                    )}
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function formatVal(v, fmt) {
  if (v === null || v === undefined || v === '') return '';
  if (fmt === '#,##0') return Number(v).toLocaleString('en-US', { maximumFractionDigits: 0 });
  if (fmt === '#,##0.0') return Number(v).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
  if (fmt === '0.0%') return (Number(v) * 100).toFixed(1) + '%';
  return v;
}
window.formatVal = formatVal;

// ─── Editable Cell ─────────────────────────────────────────
function EditableCell({ value, type, options, onChange, align, fmt }) {
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft]     = React.useState(value);
  const inputRef = React.useRef();

  React.useEffect(() => { setDraft(value); }, [value]);
  React.useEffect(() => { if (editing && inputRef.current) inputRef.current.focus(); }, [editing]);

  const commit = () => { setEditing(false); onChange(draft); };

  const displayVal = fmt ? formatVal(value, fmt) : (value ?? '');

  if (type === 'select' && options) {
    return (
      <select
        value={value || ''}
        onChange={e => onChange(e.target.value)}
        style={{
          width: '100%', border: 'none', background: 'transparent',
          fontSize: 9, color: C.inputBlue, cursor: 'pointer',
          textAlign: align || 'center',
        }}
      >
        <option value=""></option>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    );
  }

  if (editing) {
    return (
      <input
        ref={inputRef}
        type={type === 'number' ? 'number' : type === 'date' ? 'date' : 'text'}
        value={draft ?? ''}
        onChange={e => setDraft(type === 'number' ? (e.target.value === '' ? '' : Number(e.target.value)) : e.target.value)}
        onBlur={commit}
        onKeyDown={e => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') setEditing(false); }}
        style={{
          width: '100%', border: `1px solid ${C.lime}`, background: '#FFFFF0',
          fontSize: 9, color: C.inputBlue, padding: '1px 2px',
          textAlign: align || 'center',
        }}
      />
    );
  }

  return (
    <span
      onClick={() => setEditing(true)}
      style={{
        display: 'block', width: '100%', cursor: 'text',
        minHeight: 14, color: value !== null && value !== '' ? C.inputBlue : C.softGrey,
        textAlign: align || 'center', fontSize: 9,
      }}
      title="Click to edit"
    >
      {displayVal !== '' && displayVal !== null ? String(displayVal) : '—'}
    </span>
  );
}

// ─── Badge ─────────────────────────────────────────────────
function Badge({ text, color, bg }) {
  const map = {
    'Approved':                  { bg: '#D5F5E3', color: '#1A7A4A' },
    'Under RLIC Review':         { bg: '#FCF3CF', color: '#9A7D0A' },
    'Under QG-LNG Review':       { bg: '#FCF3CF', color: '#9A7D0A' },
    'Permit with QE-LNG Review': { bg: '#FDEBD0', color: '#A04000' },
    'Pending CRS':               { bg: '#FDEBD0', color: '#A04000' },
    'Concurrence Received':      { bg: '#D6EAF8', color: '#1A5276' },
    'Closed':                    { bg: '#EAECEE', color: '#5D6D7E' },
    'High':   { bg: '#FADBD8', color: C.crimson },
    'Medium': { bg: '#FCF3CF', color: '#9A7D0A' },
    'Low':    { bg: '#D5F5E3', color: '#1A7A4A' },
    'OVERDUE':   { bg: '#FADBD8', color: C.crimson },
    'TODAY':     { bg: '#FDEBD0', color: '#A04000' },
    'TOMORROW':  { bg: '#FCF3CF', color: '#9A7D0A' },
  };
  const style = map[text] || { bg: bg || C.lightGrey, color: color || C.charcoal };
  return (
    <span style={{
      display: 'inline-block', padding: '2px 7px', borderRadius: 3,
      fontSize: 9, fontWeight: 700, background: style.bg, color: style.color,
      whiteSpace: 'nowrap',
    }}>{text}</span>
  );
}

// ─── Mini Chart (SVG sparkline) ─────────────────────────────
function Sparkline({ data, color = C.lime, height = 40, fill = false }) {
  if (!data || data.length < 2) return null;
  const vals = data.filter(v => v != null && !isNaN(v));
  if (vals.length < 2) return null;
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const w = 200, h = height;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return `${x},${y}`;
  });
  const path = `M${pts.join('L')}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', height }} preserveAspectRatio="none">
      {fill && (
        <path d={`${path}L${w},${h}L0,${h}Z`}
          fill={color} fillOpacity={0.15} />
      )}
      <path d={path} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" />
    </svg>
  );
}

// ─── Progress Bar ───────────────────────────────────────────
function ProgressBar({ value, max, color = C.lime, label, showPct = true }) {
  const pct = max ? Math.min(100, (value / max) * 100) : 0;
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 9, color: C.softGrey, marginBottom: 3 }}>
        {label && <span>{label}</span>}
        {showPct && <span style={{ fontWeight: 700, color }}>{pct.toFixed(1)}%</span>}
      </div>
      <div style={{ background: C.lightGrey, borderRadius: 3, height: 8, overflow: 'hidden' }}>
        <div style={{ background: color, width: `${pct}%`, height: '100%', borderRadius: 3,
          transition: 'width 0.5s ease' }} />
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 8, color: C.softGrey, marginTop: 2 }}>
        <span>{Number(value).toLocaleString()}</span>
        <span>/ {Number(max).toLocaleString()}</span>
      </div>
    </div>
  );
}

// ─── Btn ───────────────────────────────────────────────────
function Btn({ children, onClick, variant = 'primary', size = 'sm', icon, style: extraStyle }) {
  const styles = {
    primary: { bg: C.lime,   color: C.navy,  border: C.lime },
    navy:    { bg: 'transparent',   color: C.white, border: 'rgba(255,255,255,0.4)' },
    danger:  { bg: C.crimson,color: C.white, border: C.crimson },
    ghost:   { bg: 'transparent', color: 'rgba(255,255,255,0.85)', border: 'rgba(255,255,255,0.25)' },
    teal:    { bg: C.qeTeal, color: C.white, border: C.qeTeal },
    green:   { bg: '#27AE60', color: C.white, border: '#27AE60' },
    lime:    { bg: C.lime, color: C.navy, border: C.lime },
  };
  const s = styles[variant] || styles.primary;
  const pad = size === 'xs' ? '4px 9px' : size === 'sm' ? '6px 12px' : '8px 16px';
  const fs  = size === 'xs' ? 10 : size === 'sm' ? 11 : 12;
  return (
    <button
      onClick={onClick}
      style={{
        background: s.bg, color: s.color, border: `1px solid ${s.border}`,
        borderRadius: 3, padding: pad, fontSize: fs, fontWeight: 600,
        cursor: 'pointer',
        fontFamily: "'IBM Plex Sans', sans-serif",
        letterSpacing: '0.02em',
        display: 'inline-flex', alignItems: 'center', gap: 6,
        whiteSpace: 'nowrap',
        ...extraStyle,
      }}
    >
      {icon && <span style={{ display:'inline-flex' }}>{icon}</span>}{children}
    </button>
  );
}

// ─── Toast ─────────────────────────────────────────────────
function Toast({ msg, onClose }) {
  React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
      background: C.navy, color: C.lime, padding: '10px 18px',
      borderRadius: 4, fontSize: 12, fontWeight: 600,
      border: `1px solid ${C.lime}`, boxShadow: '0 4px 20px rgba(0,0,0,0.3)',
    }}>
      ✓ {msg}
    </div>
  );
}

// ─── Modal ─────────────────────────────────────────────────
function Modal({ title, children, onClose, width = 600 }) {
  return (
    <div style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 8000,
    }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{
        background: C.white, borderRadius: 6, width, maxWidth: '95vw',
        maxHeight: '90vh', overflow: 'auto',
        border: `2px solid ${C.navy}`, boxShadow: '0 8px 40px rgba(0,0,0,0.4)',
      }}>
        <div style={{
          background: C.navy, color: C.lime, padding: '12px 16px',
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          fontWeight: 700, fontSize: 13,
        }}>
          <span>{title}</span>
          <button onClick={onClose} style={{
            background: 'none', border: 'none', color: C.lime,
            fontSize: 18, cursor: 'pointer', lineHeight: 1,
          }}>✕</button>
        </div>
        <div style={{ padding: 20 }}>{children}</div>
      </div>
    </div>
  );
}

// ─── FormRow ───────────────────────────────────────────────
function FormRow({ label, children }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '160px 1fr', gap: 8, alignItems: 'center', marginBottom: 8 }}>
      <label style={{ fontSize: 11, fontWeight: 600, color: C.charcoal }}>{label}</label>
      {children}
    </div>
  );
}

function FormInput({ value, onChange, type = 'text', placeholder }) {
  return (
    <input
      type={type}
      value={value || ''}
      onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      style={{
        border: `1px solid ${C.softGrey}`, borderRadius: 3, padding: '5px 8px',
        fontSize: 11, color: C.inputBlue, background: '#FFFFF8', width: '100%',
        fontFamily: 'inherit',
      }}
    />
  );
}

// Export all to window
Object.assign(window, {
  C, KPICard, SectionHeader, NFSTable, EditableCell, formatVal,
  Badge, Sparkline, ProgressBar, Btn, Toast, Modal, FormRow, FormInput,
});

</script>

<script type="text/babel">
// NFS Tracker — Shared helpers for view components

const fmtDDMMMYYYY = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return String(iso);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
};

const fmtNum = (n, dp = 0) => {
  if (n === null || n === undefined || n === '') return '0';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: dp, maximumFractionDigits: dp });
};

const fmtPct = (n, dp = 1) => {
  if (n === null || n === undefined || isNaN(n)) return '0%';
  return Number(n).toFixed(dp) + '%';
};

Object.assign(window, { fmtDDMMMYYYY, fmtNum, fmtPct });

// ─── Collapsible card ────────────────────────────────
function Collapsible({ title, icon, badge, defaultOpen = true, children }) {
  const C = window.C;
  const [open, setOpen] = React.useState(defaultOpen);
  return (
    <div style={{ background: C.white, borderRadius: 4, border: `1px solid ${C.lightGrey}`, overflow: 'hidden', marginBottom: 14 }}>
      <div
        onClick={() => setOpen(!open)}
        style={{
          background: C.navy, color: C.lime, padding: '10px 16px',

          cursor: 'pointer', fontWeight: 700, fontSize: 12, letterSpacing: 1,

          )}

        </span>
      </div>
      {open && <div style={{ padding: 16 }}>{children}</div>}
    </div>
  );
}
window.Collapsible = Collapsible;

</script>

<script type="text/babel">
// NFS Tracker — 4-page WEEKLY management report exporter
// Generated for senior management; exactly 4 A4 pages.

function exportFullReport(store) {
  const fmtDDMMMYYYY = window.fmtDDMMMYYYY;
  const fmtNum       = window.fmtNum;
  const inp  = store.inputs;
  const kpis = store.kpis;
  const log  = store.dprLog.filter(r => r.date)
                            .sort((a, b) => new Date(a.date) - new Date(b.date));
  const w = window.open('', '_blank');
  if (!w) { alert('Popup blocked — please allow popups for this site.'); return; }

  const today   = new Date().toISOString().slice(0, 10);
  const dateStr = fmtDDMMMYYYY(today);

  // ── Timeline % elapsed ────────────────────────────────────────
  const s = new Date(inp.projectStart), e = new Date(inp.projectEnd), n = new Date();
  const pctTime = Math.min(100, Math.max(0, ((n - s) / (e - s)) * 100));

  // ── Total Excavation % — uses PROJECT totals from Inputs (not surveyed) ──
  // Project totals from scope sheet rows 27 + 28
  const scopeNear = store.scope.find(x => /excavation nearshore/i.test(x.activity || ''));
  const scopeOff  = store.scope.find(x => /excavation offshore/i.test(x.activity || ''));
  const totalExcTarget = (scopeNear?.totalQty || 11607) + (scopeOff?.totalQty || 45101);
  const totalExcDone   = (kpis.nearshoreCum || 0) + (kpis.offshoreCumM3 || 0);
  const excPct = totalExcTarget ? (totalExcDone / totalExcTarget * 100) : 0;

  // ── Reported vs Surveyed Variance ─────────────────────────────
  const surveyedNear = Number(inp.surveyedNear) || 0;
  const surveyedOff  = Number(inp.surveyedOff)  || 0;
  const reportedNear = kpis.reportedNearPeak || 0;
  const reportedOff  = kpis.reportedOffPeak  || 0;
  const varNear   = surveyedNear ? (surveyedNear - reportedNear) : 0;
  const varOff    = surveyedOff  ? (surveyedOff  - reportedOff)  : 0;
  const varNearPct = reportedNear ? (varNear / reportedNear * 100) : 0;
  const varOffPct  = reportedOff  ? (varOff  / reportedOff  * 100) : 0;
  const fmtVar = (v) => (v > 0 ? '+' : v < 0 ? '−' : '±') + fmtNum(Math.abs(v));
  const fmtVarPct = (p) => (p > 0 ? '+' : p < 0 ? '−' : '') + Math.abs(p).toFixed(1) + '%';
  const varColor = (v) => v < 0 ? '#C0392B' : (v > 0 ? '#27AE60' : '#27AE60');

  // ── Trenching breakdown — latest non-empty cumulative values ──
  const latestOffTrench  = [...log].reverse().find(r => (r.offTrenchCum  || 0) > 0)?.offTrenchCum  || 0;
  const latestNearTrench = [...log].reverse().find(r => (r.nearTrenchCum || 0) > 0)?.nearTrenchCum || 0;

  // ── Scope completion — ONLY real-progress activities ──────────
  const realActivities = ['excavation nearshore','excavation offshore','hdpe conduit'];
  const scopeRows = store.scope
    .filter(item => realActivities.some(k => (item.activity || '').toLowerCase().includes(k)))
    .map(item => {
      let done = 0;
      const a = (item.activity || '').toLowerCase();
      if (a.includes('excavation nearshore'))    done = kpis.nearshoreCum;
      else if (a.includes('excavation offshore')) done = kpis.offshoreCumM3;
      else if (a.includes('hdpe') || a.includes('conduit')) done = kpis.totalTrenchLinear;
      const pct = item.totalQty ? Math.min(100, (done / item.totalQty) * 100) : 0;
      return { ...item, done, pct };
    });

  // ── This week vs last week (last 7 vs preceding 7 DPRs) ───────
  const lastN = log.slice(-7);
  const prevN = log.slice(-14, -7);
  const sumT = (arr, key) => arr.reduce((s, r) => s + (Number(r[key]) || 0), 0);
  // Use today values; treat negatives as survey adjustments (excluded from "week production")
  const todaySafe = (r, key) => Math.max(0, Number(r[key]) || 0);
  const sumProd = (arr, key) => arr.reduce((s, r) => s + todaySafe(r, key), 0);

  const thisWeek = {
    near: sumProd(lastN, 'nearshoreToday'),
    off:  sumProd(lastN, 'offshoreToday'),
    offTr: sumProd(lastN, 'offTrenchToday'),
    nearTr: sumProd(lastN, 'nearTrenchToday'),
    offRk: sumProd(lastN, 'rockOffToday'),
    nearRk: sumProd(lastN, 'rockOnToday'),
    safe: sumT(lastN, 'safeHrs'),
    incidents: sumT(lastN, 'incidents'),
  };
  const lastWeek = {
    near: sumProd(prevN, 'nearshoreToday'),
    off:  sumProd(prevN, 'offshoreToday'),
    offTr: sumProd(prevN, 'offTrenchToday'),
    nearTr: sumProd(prevN, 'nearTrenchToday'),
    offRk: sumProd(prevN, 'rockOffToday'),
    nearRk: sumProd(prevN, 'rockOnToday'),
    safe: sumT(prevN, 'safeHrs'),
    incidents: sumT(prevN, 'incidents'),
  };
  thisWeek.exc = thisWeek.near + thisWeek.off;
  lastWeek.exc = lastWeek.near + lastWeek.off;
  thisWeek.tr  = thisWeek.offTr + thisWeek.nearTr;
  lastWeek.tr  = lastWeek.offTr + lastWeek.nearTr;
  thisWeek.rk  = thisWeek.offRk + thisWeek.nearRk;
  lastWeek.rk  = lastWeek.offRk + lastWeek.nearRk;
  const delta = (a, b) => a - b;
  const deltaStr = (a, b, suffix = '') => {
    const d = delta(a, b);
    const sign = d > 0 ? '▲' : (d < 0 ? '▼' : '◆');
    const color = d > 0 ? '#27AE60' : (d < 0 ? '#C0392B' : '#8E9AAF');
    return { sign, color, val: `${d > 0 ? '+' : (d < 0 ? '−' : '±')}${fmtNum(Math.abs(d))}${suffix}` };
  };

  // ── HSE & downtime totals ─────────────────────────────────────
  const totalHIT    = sumT(log, 'hit');
  const totalTBT    = sumT(log, 'tbt');
  const totalComm   = sumT(log, 'comm');
  const totalAudits = sumT(log, 'audits');
  const totalWeatherDT = sumT(log, 'weatherDT');
  const totalGPSDT     = sumT(log, 'gpsDT');
  const totalDT        = totalWeatherDT + totalGPSDT;
  // Site downtime — all days with zero production (Fridays INCLUDED)
  const siteDowntimeDays = log.filter(r => {
    const prod = (r.nearshoreToday || 0) + (r.offshoreToday || 0)
               + (r.offTrenchToday || 0) + (r.nearTrenchToday || 0)
               + (r.rockOffToday || 0)   + (r.rockOnToday || 0);
    const hasMP = ((r.indMP || 0) + (r.dayMP || 0) + (r.ngtMP || 0)) > 0;
    return hasMP && prod === 0;
  }).length;
  // Equipment latest non-empty
  const latestEquip = [...log].reverse().find(r => (r.equip || 0) > 0)?.equip || 0;

  // ── Top 3 downtime reasons ────────────────────────────────────
  const reasonAgg = {};
  log.forEach(r => {
    const reason = (r.downtimeReason || '').trim();
    if (!reason) return;
    const dt = (r.weatherDT || 0) + (r.gpsDT || 0);
    if (dt === 0) return;
    if (!reasonAgg[reason]) reasonAgg[reason] = { count: 0, hours: 0 };
    reasonAgg[reason].count++;
    reasonAgg[reason].hours += dt;
  });
  const topReasons = Object.entries(reasonAgg)
    .sort(([, a], [, b]) => b.hours - a.hours)
    .slice(0, 3)
    .map(([reason, x]) => ({ reason, count: x.count, hours: x.hours }));

  // ── Notable events (notes from last 7 DPRs) ───────────────────
  const notableEvents = lastN
    .filter(r => (r.notes || '').trim())
    .map(r => ({ date: r.date, dpr: r.dprNo, note: r.notes.trim() }));

  // ── Permits breakdown ─────────────────────────────────────────
  const PERMIT_STS    = ['Approved','Under RLIC Review','Under QG-LNG Review','Pending CRS','Permit with QE-LNG Review','Concurrence Received','Closed'];
  const PERMIT_COLORS = ['#27AE60','#F39C12','#E67E22','#E74C3C','#8E44AD','#16A085','#95A5A6'];
  const permitBreak = PERMIT_STS.map((stName, i) => ({
    status: stName,
    count:  store.permits.filter(p => p.status === stName).length,
    color:  PERMIT_COLORS[i],
  })).filter(x => x.count > 0);
  const permitTotal = store.permits.length || 1;

  // ── Team (filter out empty names) ─────────────────────────────
  const team = (inp.teamMembers || []).filter(m => (m.name || '').trim());
  // Remove the "Prepared By" row from team grid — name appears in signature box only
  const teamGrid = team.filter(m => !/prepared\s*by/i.test(m.role || ''));

  // ── Status paragraph ──────────────────────────────────────────
  const statusText = `As of ${dateStr}, the project is ${pctTime.toFixed(1)}% through its planned timeline, with ${excPct.toFixed(1)}% of total excavation complete (${fmtNum(totalExcDone)} m³ of ${fmtNum(totalExcTarget)} m³ project total). ${fmtNum(kpis.totalTrenchLinear)} m of trench installed (${fmtNum(latestOffTrench)} m offshore + ${fmtNum(latestNearTrench)} m nearshore). ${kpis.totalIncidents} incident${kpis.totalIncidents === 1 ? '' : 's'} recorded with ${fmtNum(kpis.cumSafeHrs)} cumulative safe manhours. ${kpis.approvedPermits} of ${kpis.totalPermits} permits approved.`;

  // ── Logo block ────────────────────────────────────────────────
  const logoBlock = inp.logoData
    ? `<img src="${inp.logoData}" style="max-height:50px;max-width:140px;background:#fff;padding:4px;border-radius:3px;" alt="logo"/>`
    : `<div style="background:#B6D63F;color:#0A0A6E;font-weight:900;padding:6px 14px;border-radius:3px;letter-spacing:2px;font-size:13pt;">${(inp.contractor || 'MCDERMOTT').toUpperCase()}</div>`;

  // ── Footer text ───────────────────────────────────────────────
  const footerLine = (pageNum) => `
    <div class="pg-footer">
      <span>Generated <strong>${dateStr}</strong> &nbsp;·&nbsp; Prepared by: <strong>${inp.preparedBy || '—'}</strong></span>
      <span>${inp.docRef || ''}</span>
      <span>Page <strong>${pageNum}</strong> of 4</span>
    </div>`;

  // ── Render HTML ───────────────────────────────────────────────
  w.document.write(`<!DOCTYPE html><html><head><title>NFS Weekly Report — ${dateStr}</title>
  <style>
    @page { size: A4 portrait; margin: 0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Calibri','Segoe UI',sans-serif; font-size: 9pt; color: #1A1A2E; background: #fff; }
    .page {
      width: 210mm; height: 297mm; padding: 12mm 12mm 16mm;
      page-break-after: always; position: relative; overflow: hidden;
    }
    .page:last-child { page-break-after: auto; }
    .navy-band { background: #0A0A6E; color: #B6D63F; padding: 9px 14px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .navy-band h1 { font-size: 13pt; letter-spacing: 1.5px; font-weight: 800; }
    .navy-band .sub { font-size: 8pt; color: #F5F8FF; margin-top: 2px; }
    .lime-bar { height: 4px; background: #B6D63F; }
    .section-title {
      background: #0A0A6E; color: #B6D63F; font-size: 8.5pt; font-weight: 700;
      padding: 4px 10px; margin-top: 8px; letter-spacing: 1.2px; text-transform: uppercase; border-left: 4px solid #B6D63F;
    }
    .pg-footer {
      position: absolute; bottom: 6mm; left: 12mm; right: 12mm;
      border-top: 1.5px solid #B6D63F; padding-top: 4px;
      display: flex; justify-content: space-between; font-size: 7pt; color: #8E9AAF;
    }
    .pg-footer strong { color: #0A0A6E; }
    table { width: 100%; border-collapse: collapse; font-size: 8pt; margin-top: 2px; }
    th { background: #0A0A6E; color: #B6D63F; padding: 4px 6px; text-align: center; font-size: 7.5pt; border: 1px solid rgba(182,214,63,0.4); }
    td { padding: 3px 6px; border: 1px solid #ECEFF4; vertical-align: middle; }
    tr:nth-child(even) td { background: #F5F8FF; }

    .hero-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 6px 0; }
    .hero { border: 2px solid #B6D63F; border-radius: 3px; padding: 7px 8px; background: #F5F8FF; text-align: center; }
    .hero .lbl { font-size: 7pt; color: #0A0A6E; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; }
    .hero .val { font-size: 17pt; font-weight: 800; color: #0A0A6E; line-height: 1.05; margin-top: 2px; }
    .hero .sub { font-size: 6.5pt; color: #8E9AAF; margin-top: 2px; line-height: 1.2; }
    .hero .breakdown { font-size: 7pt; color: #0066B3; font-weight: 600; margin-top: 1px; }

    .var-card { border: 2px solid #B6D63F; border-radius: 3px; padding: 6px 10px; background: #F5F8FF; }
    .var-card .lbl { font-size: 7pt; color: #B6D63F; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 3px; }
    .var-card .row { font-size: 8pt; line-height: 1.5; }
    .var-card .row strong { color: #0A0A6E; }

    .week-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 4px 0; }
    .week-tile { border: 1.5px solid #B6D63F; border-radius: 3px; padding: 5px 8px; background: #F5F8FF; }
    .week-tile .lbl { font-size: 6.5pt; color: #0A0A6E; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; }
    .week-tile .val { font-size: 13pt; font-weight: 800; color: #0A0A6E; line-height: 1; margin-top: 2px; }
    .week-tile .delta { font-size: 7pt; font-weight: 700; margin-top: 2px; }
    .week-tile .delta .vs { color: #8E9AAF; font-weight: 400; }

    .scope-row { margin: 4px 0; }
    .scope-label { display: flex; justify-content: space-between; font-size: 8pt; margin-bottom: 2px; }
    .scope-bar { background: #ECEFF4; border-radius: 3px; height: 8px; overflow: hidden; }
    .scope-fill { height: 8px; background: linear-gradient(90deg,#B6D63F,#7ED321); border-radius: 3px; }

    .timeline { margin: 6px 0; }
    .tl-bar { position: relative; background: #ECEFF4; border-radius: 4px; height: 12px; overflow: hidden; }
    .tl-fill { position: absolute; left: 0; top: 0; height: 12px; background: #B6D63F; border-radius: 4px; }

    .controls { position: fixed; top: 8px; right: 8px; background: #0A0A6E; color: #B6D63F; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-weight: 700; border: none; font-family: inherit; z-index: 9999; }

    .donut-block { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .legend { font-size: 8pt; width: 100%; }
    .legend-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
    .legend-sw { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

    .team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-top: 4px; }
    .team-card { background: #F5F8FF; border-left: 3px solid #B6D63F; padding: 5px 10px; border-radius: 0 3px 3px 0; }
    .team-card .role { font-size: 6.5pt; color: #8E9AAF; text-transform: uppercase; letter-spacing: 0.5px; }
    .team-card .name { font-size: 9.5pt; font-weight: 700; color: #0A0A6E; margin-top: 1px; }

    .events-box { background: #F5F8FF; border-left: 4px solid #B6D63F; padding: 8px 12px; margin-top: 4px; max-height: 90mm; overflow: hidden; }
    .event-item { font-size: 8pt; line-height: 1.4; margin-bottom: 5px; padding-bottom: 4px; border-bottom: 1px dashed #ECEFF4; }
    .event-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .event-item .ev-meta { font-size: 7pt; color: #0066B3; font-weight: 700; }

    @media print {
      .controls { display: none }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact }
    }
  </style></head><body>
  <button class="controls" onclick="window.print()">🖨 Print / Save PDF</button>

  <!-- ════════════ PAGE 1 — EXECUTIVE SUMMARY ════════════ -->
  <div class="page">
    <div class="lime-bar"></div>
    <div class="navy-band">
      <div style="display:flex;align-items:center;gap:12px;">
        ${logoBlock}
        <div>
          <h1>WEEKLY PERFORMANCE REPORT</h1>
          <div class="sub">${inp.projectName}</div>
          <div class="sub" style="color:#B6D63F;">${inp.description}</div>
        </div>
      </div>
      <div style="text-align:right;font-size:8pt;color:#F5F8FF;">
        <div style="font-size:10pt;font-weight:700;color:#B6D63F;">As of ${dateStr}</div>
        <div style="margin-top:3px;">Client: ${inp.company}</div>
        <div>Contractor: ${inp.contractor}</div>
        <div>Sub: ${inp.subContractor}</div>
      </div>
    </div>
    <div class="lime-bar"></div>

    <div class="section-title">Project Timeline</div>
    <div class="timeline">
      <div class="tl-bar"><div class="tl-fill" style="width:${pctTime}%"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:3px;font-size:7.5pt;color:#0A0A6E;">
        <span><strong>Start:</strong> ${fmtDDMMMYYYY(inp.projectStart)}</span>
        <span style="color:#B6D63F;background:#0A0A6E;padding:1px 7px;border-radius:2px;font-weight:700;">${pctTime.toFixed(1)}% elapsed (Today: ${dateStr})</span>
        <span><strong>End:</strong> ${fmtDDMMMYYYY(inp.projectEnd)}</span>
      </div>
    </div>

    <div class="section-title">Key Performance Indicators</div>
    <div class="hero-grid">
      <div class="hero"><div class="lbl">Total Excavation</div><div class="val">${excPct.toFixed(1)}%</div><div class="sub">${fmtNum(totalExcDone)} / ${fmtNum(totalExcTarget)} m³</div></div>
      <div class="hero"><div class="lbl">Trenching</div><div class="val">${fmtNum(kpis.totalTrenchLinear)}</div><div class="breakdown">${fmtNum(latestOffTrench)} m off + ${fmtNum(latestNearTrench)} m near</div></div>
      <div class="hero"><div class="lbl">Cum. Safe Manhours</div><div class="val" style="color:#00A878;">${fmtNum(kpis.cumSafeHrs)}</div><div class="sub">hrs</div></div>
    </div>
    <div class="hero-grid">
      <div class="hero"><div class="lbl">Days on Site</div><div class="val">${kpis.daysLogged}</div><div class="sub">days on site (24/7 ops)</div></div>
      <div class="hero"><div class="lbl">Total Incidents</div><div class="val" style="color:${kpis.totalIncidents > 0 ? '#C0392B' : '#27AE60'};">${kpis.totalIncidents}</div><div class="sub">${kpis.totalIncidents === 0 ? '✓ zero to date' : 'requires review'}</div></div>
      <div class="hero"><div class="lbl">Approved Permits</div><div class="val" style="color:#27AE60;">${kpis.approvedPermits}/${kpis.totalPermits}</div><div class="sub">${kpis.totalPermits ? Math.round(kpis.approvedPermits / kpis.totalPermits * 100) : 0}% approval rate</div></div>
    </div>

    <div class="section-title">This Week vs Last Week</div>
    <div class="week-grid">
      ${(() => {
        const items = [
          { lbl: 'Excavation (m³)', t: thisWeek.exc,       l: lastWeek.exc },
          { lbl: 'Trenching (m)',   t: thisWeek.tr,        l: lastWeek.tr  },
          { lbl: 'Safe Manhours',   t: thisWeek.safe,      l: lastWeek.safe },
          { lbl: 'Incidents',       t: thisWeek.incidents, l: lastWeek.incidents, invert: true },
        ];
        return items.map(it => {
          const d = it.t - it.l;
          const sign = d > 0 ? '▲' : (d < 0 ? '▼' : '◆');
          // For incidents, ▲ is bad (red) and ▼ is good (green)
          let color;
          if (d === 0) color = '#8E9AAF';
          else if (it.invert) color = d > 0 ? '#C0392B' : '#27AE60';
          else color = d > 0 ? '#27AE60' : '#C0392B';
          return `<div class="week-tile">
            <div class="lbl">${it.lbl}</div>
            <div class="val">${fmtNum(it.t)}</div>
            <div class="delta" style="color:${color};">${sign} ${d > 0 ? '+' : (d < 0 ? '−' : '±')}${fmtNum(Math.abs(d))} <span class="vs">vs last week (${fmtNum(it.l)})</span></div>
          </div>`;
        }).join('');
      })()}
    </div>

    <div class="section-title">Reported vs Surveyed Quantities</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px;">
      <div class="var-card">
        <div class="lbl">Nearshore m³</div>
        <div class="row"><strong>Reported:</strong> ${fmtNum(reportedNear)} m³</div>
        <div class="row"><strong>Surveyed:</strong> ${fmtNum(surveyedNear)} m³</div>
        <div class="row" style="margin-top:3px;color:${varColor(varNear)};font-weight:700;">
          Variance: ${fmtVar(varNear)} m³ (${fmtVarPct(varNearPct)})
        </div>
      </div>
      <div class="var-card">
        <div class="lbl">Offshore m³</div>
        <div class="row"><strong>Reported:</strong> ${fmtNum(reportedOff)} m³</div>
        <div class="row"><strong>Surveyed:</strong> ${fmtNum(surveyedOff)} m³</div>
        <div class="row" style="margin-top:3px;color:${varColor(varOff)};font-weight:700;">
          Variance: ${fmtVar(varOff)} m³ (${fmtVarPct(varOffPct)})
        </div>
      </div>
    </div>
    ${inp.surveyDate ? `<div style="font-size:7pt;color:#8E9AAF;margin-top:3px;text-align:right;">Survey date: ${fmtDDMMMYYYY(inp.surveyDate)}${inp.surveySource ? ` · ${inp.surveySource.split('\\n')[0].slice(0,80)}` : ''}</div>` : ''}

    <div class="section-title">Project Status</div>
    <div style="padding:8px 12px;background:#F5F8FF;border-left:3px solid #B6D63F;font-size:9pt;line-height:1.5;color:#1A1A2E;">
      ${statusText}
    </div>

    ${footerLine(1)}
  </div>

  <!-- ════════════ PAGE 2 — PRODUCTION ════════════ -->
  <div class="page">
    <div class="lime-bar"></div>
    <div class="navy-band">
      <div><h1>PRODUCTION PROGRESS</h1><div class="sub">Excavation, trenching, manpower &amp; scope</div></div>
      <div style="text-align:right;font-size:9pt;color:#B6D63F;font-weight:700;">${dateStr}</div>
    </div>
    <div class="lime-bar"></div>

    <div class="section-title">Weekly Production Summary</div>
    <table>
      <tr><th>Metric</th><th>This Week</th><th>Last Week</th><th>Δ</th></tr>
      ${[
        ['Nearshore m³',    thisWeek.near,  lastWeek.near],
        ['Offshore m³',     thisWeek.off,   lastWeek.off],
        ['Trenching m',     thisWeek.tr,    lastWeek.tr],
        ['Rock Breaking m', thisWeek.rk,    lastWeek.rk],
      ].map(([lbl, t, l]) => {
        const d = t - l;
        const color = d > 0 ? '#27AE60' : (d < 0 ? '#C0392B' : '#8E9AAF');
        const sign  = d > 0 ? '▲' : (d < 0 ? '▼' : '◆');
        return `<tr>
          <td style="text-align:left;font-weight:600;">${lbl}</td>
          <td style="text-align:center;font-weight:700;color:#0A0A6E;">${fmtNum(t)}</td>
          <td style="text-align:center;">${fmtNum(l)}</td>
          <td style="text-align:center;color:${color};font-weight:700;">${sign} ${d > 0 ? '+' : (d < 0 ? '−' : '±')}${fmtNum(Math.abs(d))}</td>
        </tr>`;
      }).join('')}
    </table>

    <div class="section-title">Cumulative Excavation (m³) — dashed lines = surveyed reference</div>
    <canvas id="c1" style="width:100%;height:80mm;"></canvas>

    <div class="section-title">Daily Production + Manpower</div>
    <canvas id="c2" style="width:100%;height:60mm;"></canvas>
    <div style="font-size:7pt;color:#8E9AAF;margin-top:2px;font-style:italic;">▲ markers indicate survey reconciliations (not actual production).</div>

    <div class="section-title">Scope Completion (real-progress activities only)</div>
    <div style="padding:4px 4px;">
      ${scopeRows.map(s => `
        <div class="scope-row">
          <div class="scope-label">
            <span style="font-weight:600;">${s.activity}</span>
            <span style="color:#0A0A6E;font-weight:700;">${fmtNum(s.done)} / ${fmtNum(s.totalQty)} ${s.uom} &nbsp;(<span style="color:#27AE60;">${s.pct.toFixed(1)}%</span>)</span>
          </div>
          <div class="scope-bar"><div class="scope-fill" style="width:${s.pct}%"></div></div>
        </div>
      `).join('')}
    </div>

    ${footerLine(2)}
  </div>

  <!-- ════════════ PAGE 3 — HSE & SITE CONDITIONS ════════════ -->
  <div class="page">
    <div class="lime-bar"></div>
    <div class="navy-band">
      <div><h1>HSE &amp; SITE CONDITIONS</h1><div class="sub">Safe manhours, downtime &amp; weather impact</div></div>
      <div style="text-align:right;font-size:9pt;color:#B6D63F;font-weight:700;">${dateStr}</div>
    </div>
    <div class="lime-bar"></div>

    <div class="section-title">Site & Downtime Snapshot</div>
    <div class="hero-grid">
      <div class="hero"><div class="lbl">Site Downtime</div><div class="val" style="color:#E67E22;">${siteDowntimeDays}</div><div class="sub">days (zero production)</div></div>
      <div class="hero"><div class="lbl">Weather DT</div><div class="val" style="color:#E67E22;">${fmtNum(totalWeatherDT)}</div><div class="sub">hrs total</div></div>
      <div class="hero"><div class="lbl">GPS / DGPS DT</div><div class="val" style="color:#E67E22;">${fmtNum(totalGPSDT)}</div><div class="sub">hrs total</div></div>
    </div>
    <div class="hero-grid">
      <div class="hero"><div class="lbl">Total Downtime</div><div class="val" style="color:#C0392B;">${fmtNum(totalDT)}</div><div class="sub">hrs (weather + GPS)</div></div>
      <div class="hero"><div class="lbl">Equipment on Site</div><div class="val">${latestEquip}</div><div class="sub">latest count</div></div>
      <div class="hero"><div class="lbl">Cum Safe Manhours</div><div class="val" style="color:#00A878;">${fmtNum(kpis.cumSafeHrs)}</div><div class="sub">hrs project-to-date</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;">
      <div>
        <div class="section-title">Daily Safe Manhours</div>
        <canvas id="c3" style="width:100%;height:55mm;"></canvas>
      </div>
      <div>
        <div class="section-title">Weather Downtime (hrs)</div>
        <canvas id="c4" style="width:100%;height:55mm;"></canvas>
      </div>
    </div>

    <div class="section-title">Top 3 Downtime Reasons</div>
    <table>
      <tr><th style="width:55%;text-align:left;">Reason</th><th>Occurrences</th><th>Total Hours</th></tr>
      ${topReasons.length === 0
        ? '<tr><td colspan="3" style="text-align:center;color:#8E9AAF;font-style:italic;">No downtime reasons recorded.</td></tr>'
        : topReasons.map(r => `<tr>
            <td style="text-align:left;font-weight:600;">${r.reason}</td>
            <td style="text-align:center;font-weight:700;">${r.count}</td>
