  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
  <script>
    const dataPayload = ${JSON.stringify({
      labels:    log.map(r => r.date.slice(5)),
      nearCum:   log.map(r => r.nearshoreCum || 0),
      offCum:    log.map(r => r.offshoreCum || 0),
      // Daily production: clip negatives to 0 (display real production only)
      nearTod:   log.map(r => Math.max(0, Number(r.nearshoreToday) || 0)),
      offTod:    log.map(r => Math.max(0, Number(r.offshoreToday)  || 0)),
      // Adjustments: negative values shown as scatter markers
      adjustments: log.map((r, i) => {
        const v = (Number(r.nearshoreToday) || 0) + (Number(r.offshoreToday) || 0);
        return v < 0 ? { x: i, y: 0, raw: v } : null;
      }).filter(Boolean),
      mp:        log.map(r => r.totalMP || ((r.indMP || 0) + (r.dayMP || 0) + (r.ngtMP || 0))),
      safe:      log.map(r => r.safeHrs || 0),
      wDT:       log.map(r => r.weatherDT || 0),
      permitLabels: permitBreak.map(p => p.status),
      permitData:   permitBreak.map(p => p.count),
      permitColors: permitBreak.map(p => p.color),
      surveyedNear, surveyedOff,
    })};
    function makeCharts() {
      const navy = '#0A0A6E', teal = '#1ABC9C', orange = '#E67E22', green = '#00A878', red = '#C0392B';

      // Chart 1 — Cumulative excavation with surveyed reference lines
      const refDataNear = dataPayload.labels.map(() => dataPayload.surveyedNear);
      const refDataOff  = dataPayload.labels.map(() => dataPayload.surveyedOff);
      new Chart(document.getElementById('c1'), {
        type: 'line',
        data: { labels: dataPayload.labels, datasets: [
          { label: 'Nearshore Cum', data: dataPayload.nearCum, borderColor: navy, backgroundColor: 'rgba(10,10,110,0.08)', borderWidth: 2, tension: 0.3, pointRadius: 1, fill: true },
          { label: 'Offshore Cum',  data: dataPayload.offCum,  borderColor: teal, backgroundColor: 'rgba(26,188,156,0.08)', borderWidth: 2, tension: 0.3, pointRadius: 1, fill: true },
          ...(dataPayload.surveyedNear ? [{ label: 'Nearshore Surveyed', data: refDataNear, borderColor: navy, borderDash: [6, 4], borderWidth: 1.5, pointRadius: 0, fill: false }] : []),
          ...(dataPayload.surveyedOff  ? [{ label: 'Offshore Surveyed',  data: refDataOff,  borderColor: teal, borderDash: [6, 4], borderWidth: 1.5, pointRadius: 0, fill: false }] : []),
        ]},
        options: { responsive: false, maintainAspectRatio: false,
          plugins: { legend: { labels: { font: { size: 9 } } } },
          scales: { x: { ticks: { font: { size: 7 }, maxRotation: 45 } }, y: { ticks: { font: { size: 8 } }, beginAtZero: true } }
        }
      });

      // Chart 2 — Daily production + manpower (Y >= 0; manpower 0-200 on right)
      new Chart(document.getElementById('c2'), {
        type: 'bar',
        data: { labels: dataPayload.labels, datasets: [
          { label: 'Nearshore (m³)', data: dataPayload.nearTod, backgroundColor: navy, stack: 'p' },
          { label: 'Offshore (m³)',  data: dataPayload.offTod,  backgroundColor: teal, stack: 'p' },
          { type: 'line', label: 'Manpower (0–200)', data: dataPayload.mp, borderColor: orange, borderWidth: 2, pointRadius: 1, yAxisID: 'mp', tension: 0.3, fill: false },
          {
            type: 'scatter',
            label: 'Survey adjustment',
            data: dataPayload.adjustments,
            backgroundColor: red,
            borderColor: red,
            pointStyle: 'triangle',
            radius: 7,
            rotation: 180,
            showLine: false,
          },
        ]},
        options: { responsive: false, maintainAspectRatio: false,
          plugins: { legend: { labels: { font: { size: 9 } } } },
          scales: {
            x: { stacked: true, ticks: { font: { size: 7 }, maxRotation: 45 } },
            y: { stacked: true, beginAtZero: true, ticks: { font: { size: 8 } } },
            mp: { position: 'right', grid: { drawOnChartArea: false }, min: 0, max: 200, ticks: { font: { size: 8 }, stepSize: 50 } }
          }
        }
      });

      // Chart 3 — Daily safe manhours
      new Chart(document.getElementById('c3'), {
        type: 'bar',
        data: { labels: dataPayload.labels, datasets: [{ label: 'Safe Hrs', data: dataPayload.safe, backgroundColor: green }]},
        options: { responsive: false, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 7 }, maxRotation: 45 } }, y: { ticks: { font: { size: 8 } }, beginAtZero: true } } }
      });

      // Chart 4 — Weather DT
      new Chart(document.getElementById('c4'), {
        type: 'bar',
        data: { labels: dataPayload.labels, datasets: [{ label: 'Weather DT', data: dataPayload.wDT, backgroundColor: orange }]},
        options: { responsive: false, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 7 }, maxRotation: 45 } }, y: { ticks: { font: { size: 8 } }, beginAtZero: true } } }
      });

      // Chart 5 — Permits donut (2x larger)
      if (dataPayload.permitData.length) {
        new Chart(document.getElementById('c5'), {
          type: 'doughnut',
          data: { labels: dataPayload.permitLabels, datasets: [{ data: dataPayload.permitData, backgroundColor: dataPayload.permitColors, borderWidth: 2, borderColor: '#fff' }]},
          options: { responsive: false, maintainAspectRatio: false, cutout: '55%', plugins: { legend: { display: false } } }
        });
      }
    }
    window.addEventListener('load', () => { setTimeout(makeCharts, 200); });
  <\/script>
  </body></html>`);
  w.document.close();
}

window.exportFullReport = exportFullReport;

</script>

<script type="text/babel">
// NFS Tracker — DPR Viewer tab

function DPRViewer({ store }) {
  const C = window.C;
  const Btn = window.Btn;
  const fmtDDMMMYYYY = window.fmtDDMMMYYYY;
  const fmtNum = window.fmtNum;
  const exportDPR = window.exportDPR;
  const log = store.dprLog;
  const inp = store.inputs;

  const sortedLog = React.useMemo(
    () => [...log].sort((a, b) => (a.dprNo || 0) - (b.dprNo || 0)),
    [log]
  );

  const [selectedDPR, setSelectedDPR] = React.useState(() => {
    if (!sortedLog.length) return null;
    return sortedLog[sortedLog.length - 1].dprNo;
  });

  const d = React.useMemo(
    () => log.find(r => r.dprNo === selectedDPR),
    [log, selectedDPR]
  );

  if (!log.length) {
    return (
      <div style={{ padding: 40, textAlign: 'center', color: C.softGrey }}>
        <div style={{ fontSize: 48, marginBottom: 12 }}>📄</div>
        <div style={{ fontSize: 13, fontWeight: 600 }}>No DPRs in the master database yet.</div>
        <div style={{ fontSize: 11, marginTop: 6 }}>
          Import an Excel file or add DPRs in Master Database to view them here.
        </div>
      </div>
    );
  }

  if (!d) {
    return <div style={{ padding: 24 }}>Selected DPR not found.</div>;
  }

  const totalMP = (d.indMP || 0) + (d.dayMP || 0) + (d.ngtMP || 0);
  const isFriday = (d.day || '').toLowerCase().startsWith('fri');
  const wDT = isFriday ? 0 : (d.weatherDT || 0);

  // ── Section card ───────────────────────────────────
  const sectionCard = (titleNum, titleTxt, body) => (
    <div style={{ background: C.white, borderRadius: 4, border: `1px solid ${C.lightGrey}`, overflow: 'hidden', marginBottom: 14 }}>
      <div style={{
        background: C.navy, color: C.lime, padding: '7px 14px', fontSize: 10, fontWeight: 700,
        letterSpacing: 1.2, textTransform: 'uppercase', borderLeft: `4px solid ${C.lime}`,
      }}>
        {titleNum} · {titleTxt}
      </div>
      {body}
    </div>
  );

  const kCard = (lbl, val, color) => (
    <div style={{
      border: `1.5px solid ${C.lime}`, borderRadius: 3, padding: '8px 6px',
      textAlign: 'center', background: C.pearl, flex: 1, minWidth: 0,
    }}>
      <div style={{ fontSize: 8, color: C.navy, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5 }}>{lbl}</div>
      <div style={{ fontSize: 18, fontWeight: 800, color: color || C.navy, lineHeight: 1.1, marginTop: 3, wordBreak: 'break-word' }}>{val}</div>
    </div>
  );

  return (
    <div style={{ padding: 16 }}>
      {/* Selector bar */}
      <div style={{
        background: C.white, borderRadius: 4, border: `1px solid ${C.lightGrey}`,
        padding: '12px 16px', marginBottom: 14, display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap',
      }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.navy, textTransform: 'uppercase', letterSpacing: 1 }}>
          Select DPR:
        </div>
        <select
          value={selectedDPR ?? ''}
          onChange={e => setSelectedDPR(Number(e.target.value))}
          style={{
            flex: 1, minWidth: 280, maxWidth: 480, padding: '7px 12px', fontSize: 12,
            border: `1.5px solid ${C.navy}`, borderRadius: 3, color: C.inputBlue, fontWeight: 600,
            fontFamily: 'inherit', background: '#FFFFF8', cursor: 'pointer',
          }}
        >
          {sortedLog.map(r => (
            <option key={r.dprNo} value={r.dprNo}>
              DPR-{r.dprNo} — {fmtDDMMMYYYY(r.date)} ({r.day})
            </option>
          ))}
        </select>
        <span style={{ fontSize: 10, color: C.softGrey }}>{log.length} DPRs available</span>
        <Btn variant="navy" size="sm" onClick={() => exportDPR(store, d)}>Print DPR</Btn>
      </div>

      {/* Header band */}
      <div style={{
        background: C.navy, color: C.lime, padding: '14px 20px', marginBottom: 14,
        borderRadius: '4px 4px 0 0', borderTop: `4px solid ${C.lime}`, borderBottom: `4px solid ${C.lime}`,
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, flexWrap: 'wrap' }}>
          <div>
            <div style={{ fontSize: 16, fontWeight: 900, letterSpacing: 1.5, color: C.lime }}>DAILY PROGRESS REPORT</div>
            <div style={{ fontSize: 10, color: C.pearl, marginTop: 4 }}>{inp.projectName} — {inp.description}</div>
            <div style={{ fontSize: 9, color: C.softGrey, marginTop: 2 }}>
              Contractor: <strong style={{ color: C.pearl }}>{inp.contractor}</strong>
              &nbsp;|&nbsp;
              Sub: <strong style={{ color: C.pearl }}>{inp.subContractor}</strong>
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 20, fontWeight: 900, color: C.lime, lineHeight: 1.1 }}>DPR No. {d.dprNo}</div>
            <div style={{ fontSize: 10, color: C.pearl, marginTop: 4 }}>{fmtDDMMMYYYY(d.date)} ({d.day})</div>
            <div style={{ fontSize: 9, color: C.softGrey, marginTop: 2 }}>Area: {inp.areaGrid}</div>
          </div>
        </div>
      </div>

      {isFriday && (
        <div style={{
          background: '#FCF3CF', borderLeft: '3px solid #F39C12', padding: '8px 14px',
          fontSize: 11, color: '#7E5A00', marginBottom: 14, borderRadius: 3,
        }}>
          ⊕ <strong>Friday rest day</strong> — Weather downtime is not recorded.
        </div>

      {/* A — Weather */}
      {sectionCard('A', 'Weather Conditions',
        <div style={{ padding: '12px 14px', display: 'flex', gap: 8, flexWrap: 'wrap' }}>

          {kCard('Rain', d.rain || 'No', d.rain === 'Yes' ? '#0066B3' : C.navy)}

      {/* B — Production */}
      {sectionCard('B', 'Production Progress',
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11 }}>
          <thead>
            <tr>
              {['Activity', 'Today', 'Cumulative', 'UoM'].map(h => (
                <th key={h} style={{
                  background: C.navy, color: C.lime, padding: '7px 10px', fontSize: 10,
                  fontWeight: 700, textAlign: 'center', borderBottom: `2px solid ${C.lime}`,
                }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[
              ['Offshore Excavation',       d.offshoreToday,   d.offshoreCum,   'm³'],
              ['Nearshore Excavation',      d.nearshoreToday,  d.nearshoreCum,  'm³'],
              ['Offshore Trenching',        d.offTrenchToday,  d.offTrenchCum,  'm'],
              ['Nearshore Trenching',       d.nearTrenchToday, d.nearTrenchCum, 'm'],
              ['Rock Breaking — Offshore',  d.rockOffToday,    d.rockOffCum,    'm'],
              ['Rock Breaking — Nearshore', d.rockOnToday,     d.rockOnCum,     'm'],
            ].map((row, i) => (
              <tr key={i} style={{ background: i % 2 === 0 ? C.white : C.pearl }}>
                <td style={{ padding: '6px 12px', fontSize: 11, fontWeight: 500, borderBottom: `1px solid ${C.lightGrey}` }}>{row[0]}</td>
                <td style={{ padding: '6px 12px', fontSize: 11, textAlign: 'center', fontWeight: 700, color: C.navy, borderBottom: `1px solid ${C.lightGrey}` }}>{fmtNum(row[1] || 0)}</td>
                <td style={{ padding: '6px 12px', fontSize: 11, textAlign: 'center', fontWeight: 700, color: C.navy, borderBottom: `1px solid ${C.lightGrey}` }}>{fmtNum(row[2] || 0)}</td>
                <td style={{ padding: '6px 12px', fontSize: 10, textAlign: 'center', color: C.softGrey, borderBottom: `1px solid ${C.lightGrey}` }}>{row[3]}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}

      {/* C — Manpower */}
      {sectionCard('C', 'Manpower',
        <div style={{ padding: '12px 14px', display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {kCard('Indirect MP', d.indMP || 0)}
          {kCard('Day Shift', d.dayMP || 0)}
          {kCard('Night Shift', d.ngtMP || 0)}
          {kCard('Total', totalMP, C.qeBlue)}
          {kCard('Equipment', d.equip || 0)}
        </div>
      )}

      {/* D — Downtime */}
      {sectionCard('D', 'Downtime',
        <div style={{ padding: '12px 14px', display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {kCard('Weather DT (hrs)', wDT, wDT > 0 ? C.amber : C.navy)}
          {kCard('GPS / DGPS DT (hrs)', d.gpsDT || 0, (d.gpsDT || 0) > 0 ? C.amber : C.navy)}
          <div style={{
            border: `1.5px solid ${C.lime}`, borderRadius: 3, padding: '8px 10px',
            background: C.pearl, flex: 2, textAlign: 'left', minWidth: 180,
          }}>
            <div style={{ fontSize: 8, color: C.navy, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5 }}>Downtime Reason</div>
            <div style={{ fontSize: 11, color: C.charcoal, marginTop: 4 }}>
              {d.downtimeReason || ((wDT > 0 || (d.gpsDT || 0) > 0) ? '—' : 'No downtime')}
            </div>
          </div>
        </div>
      )}

      {/* E — HSE */}
      {sectionCard('E', 'HSE Statistics',
        <div style={{ padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {kCard('Safe Mhrs Today', fmtNum(d.safeHrs || 0), C.qeTeal)}
            {kCard('Cum Safe Mhrs', fmtNum(d.cumSafeHrs || 0), C.qeTeal)}
            {kCard('Permits', d.permits || 0)}
            {kCard('HIT Cards', d.hit || 0)}
          </div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {kCard('TBT', d.tbt || 0)}
            {kCard('Communications', d.comm || 0)}
            {kCard('Audits', d.audits || 0)}
            {kCard('Incidents', d.incidents || 0, (d.incidents || 0) > 0 ? C.crimson : C.green)}
          </div>
        </div>
      )}

      {/* F — Notes */}
      {sectionCard('F', 'Challenges / Notes',
        <div style={{
          padding: '14px 16px', borderLeft: `3px solid ${C.lime}`,
          background: C.pearl, fontSize: 11, lineHeight: 1.55, color: C.charcoal, minHeight: 36,
        }}>
          {(d.notes || '').trim() || <em style={{ color: C.softGrey }}>No notes recorded for this DPR.</em>}
        </div>
      )}

      {/* G — Signatures */}
      {sectionCard('G', 'Approval Signatures',
        <div style={{ padding: '14px 14px', display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>

            ['Prepared By (AHC Planning)', inp.preparedByApproval],

              </div>
            </div>

<script type="text/babel">
// NFS Tracker — Expanded Project Inputs tab
// Sections: Branding, Team, KPI Labels, Tab Names, Scope, Surveyed, Approval, Reset

function ExpandedInputs({ store, onUpdate }) {
  const C = window.C;
  const Collapsible = window.Collapsible;
  const fmtDDMMMYYYY = window.fmtDDMMMYYYY;
  const [inp, setInp]     = React.useState({ ...store.inputs });
  const [scope, setScope] = React.useState([...store.scope]);

  const update = (key, val) => {
    const u = { ...inp, [key]: val };
    setInp(u); store.inputs = u; onUpdate();
  };
  const updateNested = (parentKey, subKey, val) => {
    const parent = { ...(inp[parentKey] || {}), [subKey]: val };
    update(parentKey, parent);
  };
  const updateScopeRow = (ri, key, val) => {
    const u = scope.map((r, i) => i === ri ? { ...r, [key]: val } : r);
    setScope(u); store.scope = u; onUpdate();
  };

  // ── Field & shared styles ───────────────────────────
  const inputStyle = {
    border: `1px solid ${C.softGrey}`, borderRadius: 3, padding: '5px 8px',
    fontSize: 11, color: C.inputBlue, background: '#FFFFF8', width: '100%',
    fontFamily: 'inherit',
  };
  const textareaStyle = { ...inputStyle, minHeight: 60, resize: 'vertical' };

  const field = (label, key, type = 'text') => (
    <div style={{ display: 'grid', gridTemplateColumns: '180px 1fr', gap: 8, alignItems: 'center', marginBottom: 8 }}>
      <label style={{ fontSize: 11, fontWeight: 600, color: C.charcoal }}>{label}</label>
      <input
        type={type}
        value={inp[key] ?? ''}
        onChange={e => update(key, e.target.value)}
        style={inputStyle}
      />
    </div>
  );

  // ── Logo upload ─────────────────────────────────────
  const handleLogo = (e) => {
    const file = e.target.files[0];
    if (!file) return;

                </tr>
              ))}

      </Collapsible>

      {/* SECTION G — DPR Approval Names */}

        {field('Approved By (MDR)',           'approvedByMDR')}
        {field('Approved By (QE)',            'approvedByQE')}
      </Collapsible>

      {/* RESET */}
      <div style={{
        marginTop: 24, padding: 16, background: C.navy, color: C.pearl,

        </p>
        <button onClick={reset} style={{

        or <strong style={{ color: C.navy }}>Import Excel</strong> to replace data from an MST file.
      </div>
    </div>
  );
}

window.ExpandedInputs = ExpandedInputs;

</script>

      <div class="kpi"><div class="lbl">Permits Approved</div><div class="val" style="color:#00A878;">${kpis.approvedPermits}/${kpis.totalPermits}</div></div>
    </div>

    <div class="grid-2">
      <div>
        <div class="section-title">LAST 10 DPR ENTRIES</div>
        <table><tr><th>DPR</th><th>Date</th><th>Offshore (m)</th><th>Onshore (m)</th><th>Total MP</th><th>Safe Hrs</th><th>Incidents</th></tr>
        ${rows.map(r=>`<tr><td>${r.dprNo}</td><td>${r.date}</td><td>${r.offshoreToday||0}</td><td>${r.onshoreToday||0}</td><td>${(r.indMP||0)+(r.dayMP||0)+(r.ngtMP||0)}</td><td>${r.safeHrs||0}</td><td style="color:${(r.incidents||0)>0?'#C0392B':'inherit'};font-weight:${(r.incidents||0)>0?700:400}">${r.incidents||0}</td></tr>`).join('')}
        </table>
      </div>
      <div>
        <div class="section-title">SCOPE COMPLETION</div>
        ${store.scope.map(s=>`
        <div style="margin:8px 0;">
          <div style="display:flex;justify-content:space-between;font-size:8.5pt;margin-bottom:3px;">
            <span>${s.activity}</span>
            <span style="font-weight:700;color:#0A0A6E;">${s.totalQty.toLocaleString()} ${s.uom}</span>
          </div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${Math.min(100,Math.round(Math.random()*30+5))}%"></div></div>
        </div>`).join('')}

        <div class="section-title" style="margin-top:14px;">PERMITS REGISTER SUMMARY</div>
        <table><tr><th>Status</th><th>Count</th><th>%</th></tr>
        ${['Approved','Under RLIC Review','Under QG-LNG Review','Pending CRS','Permit with QE-LNG Review','Closed'].map(s=>{
          const cnt = store.permits.filter(p=>p.status===s).length;
          if(!cnt) return '';
          return `<tr><td style="text-align:left">${s}</td><td>${cnt}</td><td>${store.permits.length?Math.round(cnt/store.permits.length*100):0}%</td></tr>`;
        }).join('')}
        </table>
      </div>
    </div>

    <div class="footer">
      <span>NFS South Corridor — Master Tracker</span>
      <span>Generated: ${new Date().toLocaleString()}</span>
      <span>PM: ${inp.projectManager} | CM: ${inp.constructionMgr} | Prepared by: ${inp.preparedBy}</span>
    </div>
  </div>
  <script>window.onload=()=>{window.print();}<\/script>
  </body></html>`);
  w.document.close();
}


// ═══════════════════════════════════════════════════════════════
// EXCEL IMPORT ENGINE — Header-based mapping
// Reads the actual header row of each sheet and resolves columns by NAME.
// This makes the importer resilient to:
//   • Missing columns (older files without Downtime Reason / GPS DT)
//   • New columns added at the end
//   • Harmless column reordering
// Sheets read: Master Database, Permits Register, Look-Ahead, Inputs
// ═══════════════════════════════════════════════════════════════

function fmtDateFromExcel(val) {
  if (val === null || val === undefined || val === '') return '';
  if (val instanceof Date && !isNaN(val.getTime())) return val.toISOString().slice(0, 10);
  if (typeof val === 'string') {
    const t = val.trim();
    if (/^\d{4}-\d{2}-\d{2}/.test(t)) return t.slice(0, 10);
    const d = new Date(t);
    if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
    return t;
  }
  if (typeof val === 'number') {
    // Excel serial date
    const ms = (val - 25569) * 86400 * 1000;
    const d = new Date(ms);
    if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
  }
  return String(val);
}

// Build header → column-index map from a header row.
// Normalizes (lowercase, no spaces / punctuation) so "Near. Cum m³" matches "near cum m".
function buildHeaderMap(headerRow) {
  const map = {};
  if (!Array.isArray(headerRow)) return map;
  headerRow.forEach((cell, idx) => {
    if (cell === '' || cell === null || cell === undefined) return;
    const key = String(cell).toLowerCase()
      .replace(/[³²]/g, '')
      .replace(/[^a-z0-9]/g, '');
    if (key && !(key in map)) map[key] = idx;
  });
  return map;
}

// Resolve a column index from a list of candidate header aliases. Returns -1 if not found.
function findCol(hmap, ...aliases) {
  for (const a of aliases) {
    const key = String(a).toLowerCase().replace(/[³²]/g, '').replace(/[^a-z0-9]/g, '');
    if (key in hmap) return hmap[key];
  }
  return -1;
}

// Safe cell readers
const _cellRaw = (row, idx) => (idx >= 0 && row ? row[idx] : '');
const _cellNum = (row, idx) => {
  const v = _cellRaw(row, idx);
  if (v === '' || v === null || v === undefined) return 0;
  const n = Number(v);
  return isNaN(n) ? 0 : n;
};
const _cellStr = (row, idx) => {
  const v = _cellRaw(row, idx);
  return (v === null || v === undefined) ? '' : String(v);
};

function importFromExcel(file, store, onDone, onError) {
  if (!window.XLSX) { onError('SheetJS not loaded yet — please wait a moment and try again.'); return; }

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb   = window.XLSX.read(data, { type: 'array', cellDates: true });

      let importedDPR = 0, importedPermits = 0, importedLookahead = 0, importedScope = 0;

      // ── Master Database (header row 6 → 0-idx 5; data row 8 → 0-idx 7) ──
      const dbSheet = wb.Sheets['Master Database'];
      if (dbSheet) {
        const aoa = window.XLSX.utils.sheet_to_json(dbSheet, { header: 1, defval: '' });
        const hmap = buildHeaderMap(aoa[5] || []);

        // Resolve each field by header NAME (with sensible aliases for old/new files)
        const C = {
          dpr:        findCol(hmap, 'dpr', 'dpr#', 's#'),
          date:       findCol(hmap, 'date'),
          day:        findCol(hmap, 'day'),
          rain:       findCol(hmap, 'rain'),
          type:       findCol(hmap, 'type', 'weather', 'weathertype'),
          tMax:       findCol(hmap, 'tmax', 't-max'),
          tMin:       findCol(hmap, 'tmin', 't-min'),
          nearToday:  findCol(hmap, 'neartoday', 'near.todaym', 'nearshoretoday', 'nearshoretodaym'),
          nearCum:    findCol(hmap, 'nearcum', 'near.cumm', 'nearshorecum', 'nearshorecumm'),
          nearTotal:  findCol(hmap, 'neartotal', 'near.totalm', 'nearshoretotalm'),
          nearPct:    findCol(hmap, 'nearpct', 'near.', 'near%', 'nearshorepct'),
          offToday:   findCol(hmap, 'offtoday', 'off.todaym', 'offshoretoday', 'offshoretodaym'),
          offCum:     findCol(hmap, 'offcum', 'off.cumm', 'offshorecum', 'offshorecumm'),
          offTotal:   findCol(hmap, 'offtotal', 'off.totalm', 'offshoretotalm'),
          offPct:     findCol(hmap, 'offpct', 'off.', 'off%', 'offshorepct'),
          indMP:      findCol(hmap, 'indmp'),
          indHrs:     findCol(hmap, 'indhrs'),
          dayMP:      findCol(hmap, 'daymp'),
          dayHrs:     findCol(hmap, 'dayhrs'),
          ngtMP:      findCol(hmap, 'ngtmp', 'nightmp'),
          ngtHrs:     findCol(hmap, 'ngthrs', 'nighthrs'),
          totalMP:    findCol(hmap, 'totalmp'),
          equip:      findCol(hmap, 'equip', 'equipment'),
          weatherDT:  findCol(hmap, 'weatherdthrs', 'weatherdt', 'weatherdowntime', 'wdt'),
          downtimeReason: findCol(hmap, 'downtimereason', 'dtreason', 'reason'),
          gpsDT:      findCol(hmap, 'gpsdthrs', 'gpsdt', 'gpsdgpsdthrs', 'dgpsdt'),
          safeHrs:    findCol(hmap, 'safehrs', 'safemanhrs', 'safemanhours'),
          cumSafeHrs: findCol(hmap, 'cumsafehrs', 'cumhrs', 'cumsafemanhrs', 'cumsafemanhours'),
          permits:    findCol(hmap, 'permits'),
          hit:        findCol(hmap, 'hit', 'hitcards'),
          comm:       findCol(hmap, 'comm', 'communications', 'comms'),
          tbt:        findCol(hmap, 'tbt'),
          incidents:  findCol(hmap, 'incid', 'incidents'),
          audits:     findCol(hmap, 'audits', 'audit'),
          offRockTd:  findCol(hmap, 'offrocktodaym', 'offrocktoday'),
          offRockCum: findCol(hmap, 'offrockcumm', 'offrockcum'),
          nearRockTd: findCol(hmap, 'nearrocktodaym', 'nearrocktoday'),
          nearRockCum:findCol(hmap, 'nearrockcumm', 'nearrockcum'),
          offTrTd:    findCol(hmap, 'offtrenchtodaym', 'offtrenchtoday'),
          offTrCum:   findCol(hmap, 'offtrenchcumm', 'offtrenchcum'),
          nearTrTd:   findCol(hmap, 'neartrenchtodaym', 'neartrenchtoday'),
          nearTrCum:  findCol(hmap, 'neartrenchcumm', 'neartrenchcum'),
          notes:      findCol(hmap, 'challengesnotes', 'notes', 'challenges'),
        };

        const newDPR = [];
        for (let i = 7; i < aoa.length; i++) {
          const r = aoa[i];
          if (!r) continue;
          const dprNo = _cellRaw(r, C.dpr);
          if (dprNo === '' || dprNo === null || dprNo === undefined) continue;
          const dateStr = fmtDateFromExcel(_cellRaw(r, C.date));
          if (!dateStr) continue;

          let day = _cellStr(r, C.day);
          if (!day) day = new Date(dateStr).toLocaleDateString('en-US', { weekday: 'short' });
          const isFriday = day.toLowerCase().startsWith('fri');

          const indMP = _cellNum(r, C.indMP);
          const dayMP = _cellNum(r, C.dayMP);
          const ngtMP = _cellNum(r, C.ngtMP);
          const totalMP_excel = _cellNum(r, C.totalMP);

          const row = {
            dprNo:          Number(dprNo) || (i - 6),
            date:           dateStr,
            day:            day,
            rain:           _cellStr(r, C.rain) || 'No',
            type:           isFriday ? 'Friday' : (_cellStr(r, C.type) || 'Clear'),
            tMax:           C.tMax >= 0 && _cellRaw(r,C.tMax)!=='' ? _cellNum(r, C.tMax) : '',
            tMin:           C.tMin >= 0 && _cellRaw(r,C.tMin)!=='' ? _cellNum(r, C.tMin) : '',
            // Nearshore m³
            nearshoreToday: _cellNum(r, C.nearToday),
            nearshoreCum:   _cellNum(r, C.nearCum),
            nearshoreTotal: _cellNum(r, C.nearTotal) || 11607,
            nearshorePct:   _cellNum(r, C.nearPct),
            // Offshore m³
            offshoreToday:  _cellNum(r, C.offToday),
            offshoreCum:    _cellNum(r, C.offCum),
            offshoreTotal:  _cellNum(r, C.offTotal) || 45101,
            offshorePct:    _cellNum(r, C.offPct),
            // Manpower
            indMP, indHrs: _cellNum(r, C.indHrs),
            dayMP, dayHrs: _cellNum(r, C.dayHrs),
            ngtMP, ngtHrs: _cellNum(r, C.ngtHrs),
            totalMP:       totalMP_excel || (indMP + dayMP + ngtMP),
            equip:         _cellNum(r, C.equip),
            // Downtime — preserves Friday convention (no DT on Fridays)
            weatherDT:      isFriday ? 0 : _cellNum(r, C.weatherDT),
            downtimeReason: _cellStr(r, C.downtimeReason),
            gpsDT:          _cellNum(r, C.gpsDT),
            // Safety
            safeHrs:       _cellNum(r, C.safeHrs),
            cumSafeHrs:    _cellNum(r, C.cumSafeHrs),
            // HSE
            permits:       _cellNum(r, C.permits),
            hit:           _cellNum(r, C.hit),
            comm:          _cellNum(r, C.comm),
            tbt:           _cellNum(r, C.tbt),
            incidents:     _cellNum(r, C.incidents),
            audits:        _cellNum(r, C.audits),
            // Rock breaking (linear m)
            rockOffToday:  _cellNum(r, C.offRockTd),
            rockOffCum:    _cellNum(r, C.offRockCum),
            rockOnToday:   _cellNum(r, C.nearRockTd),   // "near" stored as "On" for back-compat
            rockOnCum:     _cellNum(r, C.nearRockCum),
            // Trenching (linear m)
            offTrenchToday: _cellNum(r, C.offTrTd),
            offTrenchCum:   _cellNum(r, C.offTrCum),
            nearTrenchToday:_cellNum(r, C.nearTrTd),
            nearTrenchCum:  _cellNum(r, C.nearTrCum),
            // Notes
            notes:         _cellStr(r, C.notes),
            // Legacy onshore (zero — not used in new schema)
            onshoreToday: 0, onshoreCum: 0,
          };
          newDPR.push(row);
          importedDPR++;
        }
        if (newDPR.length > 0) store.dprLog = newDPR;
      }

      // ── Permits Register (header row 10 → 0-idx 9; data row 11 → 0-idx 10) ──
      const pmSheet = wb.Sheets['Permits Register'];
      if (pmSheet) {
        const aoa = window.XLSX.utils.sheet_to_json(pmSheet, { header: 1, defval: '' });
        const hmap = buildHeaderMap(aoa[9] || []);
        const P = {
          jdb:      findCol(hmap, 'jdbno', 'jdb'),
          applied:  findCol(hmap, 'ecpwapplied', 'applied'),
          task:     findCol(hmap, 'taskno', 'task'),
          desc:     findCol(hmap, 'activitydescription', 'description', 'desc'),
          type:     findCol(hmap, 'permittype', 'type'),
          issued:   findCol(hmap, 'issuedate', 'issued'),
          expiry:   findCol(hmap, 'expirydate', 'expiry'),
          permitNo: findCol(hmap, 'permitno', 'permitnumber'),
          status:   findCol(hmap, 'status'),
          holder:   findCol(hmap, 'permitholder', 'holder'),
          remarks:  findCol(hmap, 'remarks', 'remark', 'notes'),
        };

        const newPermits = [];
        for (let i = 10; i < aoa.length; i++) {
          const r = aoa[i];
          if (!r) continue;
          // Skip rows that have no JDB, Task or Desc
          if (!_cellStr(r, P.jdb) && !_cellStr(r, P.task) && !_cellStr(r, P.desc)) continue;

          newPermits.push({
            jdb:      _cellStr(r, P.jdb),
            applied:  fmtDateFromExcel(_cellRaw(r, P.applied)),
            task:     _cellStr(r, P.task),
            desc:     _cellStr(r, P.desc),
            type:     _cellStr(r, P.type),
            issued:   fmtDateFromExcel(_cellRaw(r, P.issued)),
            expiry:   fmtDateFromExcel(_cellRaw(r, P.expiry)),
            permitNo: _cellStr(r, P.permitNo),
            status:   _cellStr(r, P.status),
            holder:   _cellStr(r, P.holder),
            remarks:  _cellStr(r, P.remarks),
          });
          importedPermits++;
        }
        if (newPermits.length > 0) {
          const pkey = p => String(p.permitNo || p.taskNo || p.jdb || p.description || '').trim().toLowerCase();
          const pmap = new Map((store.permits || []).map(p => [pkey(p), p]));
          newPermits.forEach(p => pmap.set(pkey(p), p));
          store.permits = Array.from(pmap.values());
        }
      }

      // ── Look-Ahead (header row 11 → 0-idx 10; data row 12 → 0-idx 11) ──
      const laSheet = wb.Sheets['Look-Ahead'];
      if (laSheet) {
        const aoa = window.XLSX.utils.sheet_to_json(laSheet, { header: 1, defval: '' });
        const hmap = buildHeaderMap(aoa[10] || []);
        const L = {
          area:        findCol(hmap, 'hoarea', 'area'),
          eventType:   findCol(hmap, 'eventtype', 'event', 'type'),
          date:        findCol(hmap, 'date'),
          description: findCol(hmap, 'description', 'desc'),
          priority:    findCol(hmap, 'priority'),
          assigned:    findCol(hmap, 'assigned', 'owner'),
          notes:       findCol(hmap, 'notes', 'remarks'),
        };

        const newLA = [];
        for (let i = 11; i < aoa.length; i++) {
          const r = aoa[i];
          if (!r) continue;
          // Skip totally empty rows
          if (!_cellStr(r, L.area) && !_cellStr(r, L.eventType) &&
              !_cellStr(r, L.description) && !_cellRaw(r, L.date)) continue;

          newLA.push({
            area:        _cellStr(r, L.area),
            eventType:   _cellStr(r, L.eventType),
            date:        fmtDateFromExcel(_cellRaw(r, L.date)),
            description: _cellStr(r, L.description),
            priority:    _cellStr(r, L.priority) || 'Medium',
            assigned:    _cellStr(r, L.assigned),
            notes:       _cellStr(r, L.notes),
          });
          importedLookahead++;
        }
        if (newLA.length > 0) {
          const lkey = x => (String(x.date || '') + '|' + String(x.description || '')).trim().toLowerCase();
          const lmap = new Map((store.lookahead || []).map(x => [lkey(x), x]));
          newLA.forEach(x => lmap.set(lkey(x), x));
          store.lookahead = Array.from(lmap.values());
        }
      }

      // ── Inputs — Project info, Team, Scope, Approval names, Surveyed qtys ──
      const inpSheet = wb.Sheets['Inputs'];
      if (inpSheet) {
        const aoa = window.XLSX.utils.sheet_to_json(inpSheet, { header: 1, defval: '' });
        // Cell access by row/col 0-index: getD(row1based) → col D
        const cellAt = (row1, col0) => {
          const r = aoa[row1 - 1];
          return r ? (r[col0] ?? '') : '';
        };
        const strAt = (row1, col0) => String(cellAt(row1, col0) ?? '');
        const numAt = (row1, col0) => {
          const v = cellAt(row1, col0);
          if (v === '' || v === null || v === undefined) return NaN;
          const n = Number(v); return isNaN(n) ? NaN : n;
        };

        const newInputs = { ...store.inputs };

        // Project information (D8–D15 = col D = col index 3)
        if (strAt(8, 3))  newInputs.projectName   = strAt(8, 3);
        if (strAt(9, 3))  newInputs.description   = strAt(9, 3);
        if (strAt(10, 3)) newInputs.company       = strAt(10, 3);
        if (strAt(11, 3)) newInputs.contractor    = strAt(11, 3);
        if (strAt(12, 3)) newInputs.subContractor = strAt(12, 3);
        if (cellAt(13, 3) !== '') newInputs.projectStart = fmtDateFromExcel(cellAt(13, 3)) || strAt(13, 3);
        if (cellAt(14, 3) !== '') newInputs.projectEnd   = fmtDateFromExcel(cellAt(14, 3)) || strAt(14, 3);
        if (strAt(15, 3)) newInputs.areaGrid      = strAt(15, 3);

        // Project Team — D18–D23 with role labels from col B
        const teamRows = [];
        for (let row1 = 18; row1 <= 23; row1++) {
          const role = strAt(row1, 1).replace(/\s*\(You\)\s*$/i, '').trim();
          const name = strAt(row1, 3).trim();
          if (role || name) teamRows.push({ role: role || 'Member', name });
        }
        if (teamRows.length) newInputs.teamMembers = teamRows;
        // Also update legacy individual fields when present
        if (strAt(18, 3)) newInputs.projectDirector  = strAt(18, 3);
        if (strAt(19, 3)) newInputs.projectManager   = strAt(19, 3);
        if (strAt(20, 3)) newInputs.constructionMgr  = strAt(20, 3);
        if (strAt(21, 3)) newInputs.siteEngineer     = strAt(21, 3);
        if (strAt(22, 3)) newInputs.planningEngineer = strAt(22, 3);
        if (strAt(23, 3)) newInputs.preparedBy       = strAt(23, 3);

        // Scope quantities — rows 27–35: B=activity, C=qty, E=UoM, F=daily rate
        const newScope = [];
        for (let row1 = 27; row1 <= 35; row1++) {
          const act = strAt(row1, 1).trim();
          const qty = numAt(row1, 2);
          const uom = strAt(row1, 4).trim();
          const rate = numAt(row1, 5);
          if (act && !isNaN(qty)) {
            newScope.push({
              activity: act,
              totalQty: qty,
              uom: uom || 'm³',
              dailyRate: isNaN(rate) ? 100 : rate,
            });
            importedScope++;
          }
        }
        if (newScope.length) store.scope = newScope;

        // Approval names — D38–D42 (col D = col 3)
        if (strAt(38, 3)) newInputs.preparedByApproval = strAt(38, 3);
        if (strAt(39, 3)) newInputs.checkedBy          = strAt(39, 3);
        if (strAt(40, 3)) newInputs.reviewedBy         = strAt(40, 3);
        if (strAt(41, 3)) newInputs.approvedByMDR      = strAt(41, 3);
        if (strAt(42, 3)) newInputs.approvedByQE       = strAt(42, 3);

        // Surveyed quantities — A7='Near Surveyed', A8='Off Surveyed' (label col A=0, value col B=1)
        // ALWAYS set from the file so a corridor never inherits another corridor's survey.
        // A blank value cell means "no survey yet" → 0.
        if (/surveyed/i.test(strAt(7, 0))) {
          const n = numAt(7, 1); newInputs.surveyedNear = isNaN(n) ? 0 : n;
        }
        if (/surveyed/i.test(strAt(8, 0))) {
          const n = numAt(8, 1); newInputs.surveyedOff = isNaN(n) ? 0 : n;
        }
        if (/survey\s*date/i.test(strAt(9, 0))) {
          const dStr = fmtDateFromExcel(cellAt(9, 1));
          newInputs.surveyDate = (dStr && /^\d{4}-\d{2}-\d{2}$/.test(dStr)) ? dStr : '';
        }
        if (strAt(10, 1) && !/^[a-z\s]+\(You\)$/i.test(strAt(10, 1))) {
          newInputs.surveySource = strAt(10, 1);
        }

        store.inputs = newInputs;
      }

      // Persist & notify
      store.save();
      onDone(importedDPR, importedPermits, importedLookahead, importedScope);

    } catch(err) {
      console.error('Excel import error:', err);
      onError('Import failed: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}


// ─── INLINE EDITABLE LABEL ────────────────────────────────
// Double-click any label to edit it. Saves to localStorage under key 'nfs_labels_v1'.
const labelStore = (() => {
  const KEY = 'nfs_labels_v1';
  let cache = null;
  return {
    get(id, fallback) {
      if (!cache) { try { cache = JSON.parse(localStorage.getItem(KEY)||'{}'); } catch(e) { cache={}; } }
      return cache[id] !== undefined ? cache[id] : fallback;
    },
    set(id, val) {
      if (!cache) cache = {};
      cache[id] = val;
      try { localStorage.setItem(KEY, JSON.stringify(cache)); } catch(e) {}
    }
  };
})();

function InlineLabel({ id, fallback, style, className }) {
  const [editing, setEditing] = React.useState(false);
  const [val, setVal]         = React.useState(() => labelStore.get(id, fallback));
  const inputRef = React.useRef();

  React.useEffect(() => { if (editing && inputRef.current) inputRef.current.focus(); }, [editing]);

  const commit = (v) => { const trimmed = v.trim() || fallback; setVal(trimmed); labelStore.set(id, trimmed); setEditing(false); };

  if (editing) {
    return (
      <input
        ref={inputRef}
        value={val}
        onChange={e => setVal(e.target.value)}
        onBlur={e => commit(e.target.value)}
        onKeyDown={e => { if(e.key==='Enter') commit(val); if(e.key==='Escape'){ setVal(labelStore.get(id,fallback)); setEditing(false); } }}
        style={{ ...style, border:'1px solid #7ED321', background:'#FFFFF0', borderRadius:2, padding:'1px 4px', fontFamily:'inherit', outline:'none', minWidth:60 }}
      />
    );
  }
  return (
    <span
      style={{ ...style, cursor:'text', borderBottom:'1px dashed transparent', transition:'border-color 0.15s' }}
      title="Double-click to edit label"
      onDoubleClick={() => setEditing(true)}
      onMouseEnter={e => e.currentTarget.style.borderBottomColor='#7ED321'}
      onMouseLeave={e => e.currentTarget.style.borderBottomColor='transparent'}
    >
      {val}
    </span>
  );
}

function ChartCanvas({ id, config, height=180 }) {
  const ref    = useRef();
  const chart  = useRef();
  useEffect(() => {
    if(chart.current) chart.current.destroy();
    if(ref.current) chart.current = new Chart(ref.current, config);
    return () => { if(chart.current) chart.current.destroy(); };
  }, [JSON.stringify(config)]);
  return <canvas ref={ref} style={{ width:'100%', height }} />;
}

function Dashboard({ store, tweaks, onEditSettings, corridor='overall', setCorridor }) {
  store.corridor = corridor;
  const _kpis = store.kpis;
  const log  = store.dprLog.filter(r => r.date); // all logged days
  // Recalculate avgManpower inline to avoid stale getter cache
  const _activeDays = log.filter(r => (r.indMP||0)+(r.dayMP||0)+(r.ngtMP||0) > 0);
  const _mpSum = _activeDays.reduce((s,r) => s+(r.indMP||0)+(r.dayMP||0)+(r.ngtMP||0), 0);
  const kpis = { ..._kpis, avgManpower: _activeDays.length ? Math.round(_mpSum/_activeDays.length) : 0 };
  const inp  = store.inputs;

  // ── Trend: compare last 7 days vs prev 7 days ──
  const trendOf = (key) => {
    const sorted = [...log].sort((a,b) => a.date > b.date ? 1 : -1);
    const last7  = sorted.slice(-7);
    const prev7  = sorted.slice(-14, -7);
    if (!last7.length || !prev7.length) return null;
    const avg = (arr) => arr.reduce((s,r) => s + (r[key]||0), 0) / arr.length;
    const a = avg(last7), b = avg(prev7);
    if (!b) return null;
    return ((a - b) / b) * 100;
  };
  const trendNearToday  = trendOf('nearshoreToday');
  const trendOffToday   = trendOf('offshoreToday');
  const trendMP         = trendOf('totalMP');
  const trendSafeHrs    = trendOf('safeHrs');
  const trendWeatherDT  = trendOf('weatherDT');

  const labels         = log.map(r => r.date.slice(5));
  const nearshoreCum   = log.map(r => r.nearshoreCum||0);
  const offshoreCumM3  = log.map(r => r.offshoreCum||0);    // now m³
  const onshoreCumM3   = log.map(r => r.onshoreCum||0);
  const totalExcCum    = log.map((r,i) => (nearshoreCum[i]||0)+(offshoreCumM3[i]||0)+(onshoreCumM3[i]||0));
  const dailyNear      = log.map(r => r.nearshoreToday||0);
  const dailyOff       = log.map(r => r.offshoreToday||0);
  const totalMP        = log.map(r => r.totalMP || ((r.indMP||0)+(r.dayMP||0)+(r.ngtMP||0)));
  const safeHrs        = log.map(r => r.safeHrs||0);
  const weatherDTArr   = log.map(r => r.weatherDT||0);
  const nearshoreTotal = log.find(r => r.nearshoreTotal)?.nearshoreTotal || 11607;
  const offshoreTotal  = log.find(r => r.offshoreTotal)?.offshoreTotal  || 45101;
  const nearPctSeries  = nearshoreCum.map(v => nearshoreTotal ? (v/nearshoreTotal)*100 : 0);

  // Chart 1: Cumulative Excavation m³ (line, 3 series + total)

          <div style={{
            position: 'relative',
            background: 'rgba(255,255,255,0.1)',

              fontSize: 9, color: C.softGrey, fontWeight: 500,
              letterSpacing: '0.12em', textTransform: 'uppercase',

              onClick={onEditSettings}

              style={{
                background:'transparent',
                border:`1px solid rgba(126,211,33,0.4)`,

                padding:'2px 9px', borderRadius:3, cursor:'pointer',
                fontFamily: "'IBM Plex Sans', sans-serif",

              ['PM', inp.projectManager],
              ['CM', inp.constructionMgr],

              <div key={role} style={{
                padding: '6px 10px',

      {/* ─── KPI GRID 3×4 (production / m³ / compliance) ─── */}
      {(() => {
        const lbl = (k, fb) => (inp.kpiLabels?.[k] || fb);

        const surveyedNear = Number(inp.surveyedNear) || 7772;
        const surveyedOff  = Number(inp.surveyedOff)  || 13934;

        return (
          <React.Fragment>

            <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12 }}>
              <KPICard accent={C.qeBlue} label={lbl('totalTrenching','Total Trenching')}
                value={<>{fmtNum(kpis.totalTrenchLinear)}<span style={{fontSize:14, color:C.softGrey, marginLeft:4}}>m</span></>}
                sub={sub('totalTrenching','linear KP — offshore + nearshore')}
                trend={trendOf ? ((trendNearToday||0)+(trendOffToday||0))/2 : null} />
              <KPICard accent={C.qeBlue} label={lbl('rockBreaking','Rock Breaking')}
                value={<>{fmtNum(kpis.totalRock)}<span style={{fontSize:14, color:C.softGrey, marginLeft:4}}>m</span></>}
                sub={sub('rockBreaking','linear KP (not volumetric)')} />
              <KPICard accent={C.qeBlue} label={lbl('avgManpower','Avg Daily MP')}
                value={fmtNum(kpis.avgManpower)}

              <KPICard accent={C.qeBlue} label={lbl('cumSafeHrs','Cum Safe Manhrs')}
                value={<>{fmtNum(kpis.cumSafeHrs)}<span style={{fontSize:14, color:C.softGrey, marginLeft:4}}>hrs</span></>}
                sub={sub('cumSafeHrs','project to date')}
                trend={trendSafeHrs} />
            </div>

            {/* Row 2 — EXCAVATION m³ (qe-teal accent) — includes 2 special survey cards */}
            <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12 }}>
              <SurveyCard label="Nearshore Exc. m³"   color={C.qeBlue} reported={kpis.reportedNearPeak} surveyed={surveyedNear} totalScope={totalScopeNear} surveyDate={inp.surveyDate} />
              <SurveyCard label="Offshore Exc. m³"    color={C.qeTeal} reported={kpis.reportedOffPeak}  surveyed={surveyedOff}  totalScope={totalScopeOff}  surveyDate={inp.surveyDate} />
              <KPICard accent={C.qeTeal} label={lbl('totalTrenchingM3','Total Trenching m³')}

                sub={sub('totalTrenchingM3','nearshore + offshore combined')} />
              <KPICard accent={C.qeTeal} label="Total Downtime"
                value={<>{fmtNum(kpis.totalDT)}<span style={{fontSize:14, color:C.softGrey, marginLeft:4}}>hrs</span></>}
                sub={<>Weather: {fmtNum(kpis.weatherDT)} hrs<br/>GPS/DGPS: {fmtNum(kpis.gpsDT)} hrs</>} />
            </div>

            {/* Row 3 — COMPLIANCE (amber accent) */}
            <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12 }}>
              <KPICard accent={C.amber} label={lbl('totalPermits','Total Permits')}
                value={fmtNum(kpis.totalPermits)}
                sub={sub('totalPermits','in eCPW system')} />
              <KPICard accent={C.amber} label={lbl('weatherDowntime','Weather Downtime')}
                value={<>{fmtNum(kpis.weatherDT)}<span style={{fontSize:14, color:C.softGrey, marginLeft:4}}>hrs</span></>}
                sub={sub('weatherDowntime','work stopped due to weather')} />
              <div style={{
                background: C.white,
                borderLeft: `2px solid ${kpis.totalIncidents > 0 ? C.crimson : C.green}`,
                border: `1px solid ${C.lightGrey}`,
                borderLeftWidth: 2,
                borderLeftColor: kpis.totalIncidents > 0 ? C.crimson : C.green,
                borderRadius: 4,
                boxShadow: '0 1px 3px rgba(10,10,110,0.08)',
                padding: '12px 14px', minHeight: 92,
                display: 'flex', flexDirection: 'column', gap: 4,
              }}>
                <div style={{
                  fontSize: 9, fontWeight: 600, color: kpis.totalIncidents > 0 ? C.crimson : C.green,
                  textTransform: 'uppercase', letterSpacing: '0.12em',
                }}>Total Incidents</div>
                <div style={{
                  fontFamily: "'IBM Plex Mono', monospace", fontVariantNumeric: 'tabular-nums',
                  fontSize: 28, fontWeight: 700,
                  color: kpis.totalIncidents > 0 ? C.crimson : C.green,
                  lineHeight: 1.1, marginTop:'auto',
                }}>{kpis.totalIncidents}</div>
                <div style={{ fontSize: 10, color: C.softGrey, lineHeight: 1.3 }}>
                  {kpis.totalIncidents === 0
                    ? <span style={{ color: C.green, fontWeight:600 }}>✓ Zero incidents to date</span>
                    : <span style={{ color: C.crimson, fontWeight:600 }}>⚠ Requires immediate review</span>}
                </div>
              </div>
              <KPICard accent={C.amber} label="Site Downtime"
                value={<>{fmtNum(kpis.siteDowntimeDays)}<span style={{fontSize:14, color:C.softGrey, marginLeft:4}}>days</span></>}
                sub="days with zero production" />
            </div>
          </React.Fragment>
        );
      })()}

      {/* Charts row 1 — Excavation */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
        <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden' }}>
          <SectionHeader title="Cumulative Excavation (m³)" subtitle="Nearshore + Offshore — reported quantities to date" />
          <div style={{ padding:'12px 12px 8px', height:220 }}>
            <ChartCanvas id="line" config={lineConfig} height={200} />
          </div>
        </div>
        <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden' }}>
          <SectionHeader title="Daily Production (m³)" subtitle="Daily output per zone — Nearshore + Offshore (stacked)" />
          <div style={{ padding:'12px 12px 8px', height:220 }}>
            <ChartCanvas id="prod" config={prodConfig} height={200} />
          </div>
        </div>
      </div>

      {/* Charts row 1b — Daily Manpower (separated from production) */}
      <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden' }}>
        <SectionHeader title="Daily Manpower" subtitle="Total workforce on site per day — Indirect + Day + Night" />
        <div style={{ padding:'12px 12px 8px', height:220 }}>
          <ChartCanvas id="mp" config={mpConfig} height={200} />
        </div>
      </div>

      {/* Charts row 2 — HSE & Weather */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
        <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden' }}>

        <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden' }}>
          <SectionHeader title="Weather Downtime (hrs)" subtitle="Hours lost to weather — Fridays excluded per project convention" />
          <div style={{ padding:'12px 12px 8px', height:220 }}>
            <ChartCanvas id="weather" config={weatherConfig} height={200} />
          </div>
        </div>
      </div>

      {/* Charts row 2b — Reported vs Surveyed (new) */}
      <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden' }}>
        <SectionHeader title="Reported vs Surveyed Quantities (m³)" subtitle="Comparison of daily reported vs independently surveyed volumes" />
        <div style={{ padding:'12px 12px 8px', height:200 }}>
          <ChartCanvas id="repsur" config={reportedVsSurveyedConfig} height={180} />

      {/* Charts row 3 — Permits & % Complete */}

            <ChartCanvas id="pct" config={pctConfig} height={200} />

      {/* Project Team Section */}
      <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden' }}>

// ─── MASTER DATABASE ───────────────────────────────────────
function MasterDatabase({ store, onUpdate, tweaks, corridor='south', setCorridor, onImportExcel }) {
  store.corridor = corridor;
  const xlsxRef = useRef();
  const [rows, setRows]     = useState(store.dprLog);
  const [adding, setAdding] = useState(false);
  const [filter, setFilter] = useState('');
  const [dprModal, setDprModal] = useState(null);

  const save = (updated) => { setRows(updated); store.dprLog = updated; onUpdate(); };

  const handleEdit = (ri, key, val) => {
    const updated = rows.map((r,i) => i===ri ? {...r,[key]:val} : r);
    save(updated);
  };

  const addRow = () => {
    const lastDpr = rows.length ? Math.max(...rows.map(r=>r.dprNo||0)) : 0;
    const today   = new Date().toISOString().slice(0,10);
    const newRow  = {
      dprNo:lastDpr+1, date:today, day:new Date().toLocaleDateString('en-GB',{weekday:'short'}),
      rain:'No', type:'Clear', tMax:30, tMin:20,
      offshoreToday:0, offshoreCum: rows.length ? (rows[rows.length-1].offshoreCum||0) : 0,
      onshoreToday:0, onshoreCum: rows.length ? (rows[rows.length-1].onshoreCum||0) : 0,
      rockOffToday:0, rockOffCum: rows.length ? (rows[rows.length-1].rockOffCum||0) : 0,
      rockOnToday:0, rockOnCum: rows.length ? (rows[rows.length-1].rockOnCum||0) : 0,
      indMP:0, indHrs:0, dayMP:0, dayHrs:0, ngtMP:0, ngtHrs:0, equip:0,
      safeHrs:0, cumSafeHrs: rows.length ? (rows[rows.length-1].cumSafeHrs||0) : 0,
      permits:0, hit:0, comm:0, tbt:0, incidents:0, audits:0, notes:'',
    };
    const updated = [...rows, newRow];
    save(updated);
    setAdding(false);
  };

  const deleteRow = (ri) => {
    if(!confirm('Delete this DPR entry?')) return;
    save(rows.filter((_,i)=>i!==ri));
  };

  const filtered = filter
    ? rows.filter(r => r.date.includes(filter) || String(r.dprNo).includes(filter) || (r.notes||'').toLowerCase().includes(filter.toLowerCase()))
    : rows;

  const WEATHER_TYPES = ['Clear','Hazy','Cloudy','Rainy','Foggy','Windy'];

  const cols = [
    { label:'DPR', key:'dprNo', type:'number', width:36, bold:true, color:r=>(r.incidents>0?C.crimson:C.qeBlue) },
    { label:'Date', key:'date', type:'date', width:88, fmt:null },
    { label:'Day', key:'day', width:32, editable:false, color:()=>C.softGrey },
    { label:'Rain', key:'rain', type:'select', options:['No','Yes'], width:36 },
    { label:'Type', key:'type', type:'select', options:WEATHER_TYPES, width:60 },
    { label:'T°Max', key:'tMax', type:'number', width:44 },
    { label:'T°Min', key:'tMin', type:'number', width:44 },
    { label:'Off Today', key:'offshoreToday', type:'number', fmt:'#,##0.0', width:60 },
    { label:'Off Cum',   key:'offshoreCum',   type:'number', fmt:'#,##0', width:58, bold:true },
    { label:'On Today',  key:'onshoreToday',  type:'number', fmt:'#,##0.0', width:58 },
    { label:'On Cum',    key:'onshoreCum',    type:'number', fmt:'#,##0', width:56, bold:true },
    { label:'Rock Off',  key:'rockOffToday',  type:'number', fmt:'#,##0.0', width:54 },
    { label:'Rock On',   key:'rockOnToday',   type:'number', fmt:'#,##0.0', width:54 },
    { label:'Ind MP',    key:'indMP',  type:'number', width:44 },
    { label:'Day MP',    key:'dayMP',  type:'number', width:44 },
    { label:'Ngt MP',    key:'ngtMP',  type:'number', width:44 },
    { label:'Total MP',  key:'_total', editable:false, width:50, bold:true, color:()=>C.qeBlue,
      render:(r)=>(r.indMP||0)+(r.dayMP||0)+(r.ngtMP||0) },
    { label:'Equip',     key:'equip',  type:'number', width:42 },
    { label:'Safe Hrs',  key:'safeHrs',  type:'number', fmt:'#,##0', width:55, bold:true, color:()=>C.qeTeal },
    { label:'Cum Hrs',   key:'cumSafeHrs', type:'number', fmt:'#,##0', width:58 },
    { label:'Permits',   key:'permits', type:'number', width:46 },
    { label:'HIT',       key:'hit',     type:'number', width:36 },
    { label:'TBT',       key:'tbt',     type:'number', width:36 },
    { label:'Incidents', key:'incidents', type:'number', width:54, bold:true,
      color:r=>(r.incidents>0?C.crimson:C.green) },
    { label:'Notes', key:'notes', type:'text', width:160, wrap:true, align:'left' },
    { label:'DPR', key:'_pdf', editable:false, width:40,
      render:(r,ri)=>(
        <Btn size="xs" variant="ghost" onClick={()=>setDprModal(r)}>PDF</Btn>
      )
    },
    { label:'Del', key:'_del', editable:false, width:36,
      render:(r,ri)=>(
        <button onClick={()=>deleteRow(ri)} style={{
          background:'none', border:'none', color:C.crimson, cursor:'pointer', fontSize:13, padding:0
        }}>✕</button>
      )
    },
  ];

  const rowStyle = (r) => ({
    background: r.incidents > 0 ? '#FFF0ED' : undefined,
    outline: r.date === new Date().toISOString().slice(0,10) ? `2px solid ${C.lime}` : 'none',
  });

  return (
    <div style={{ padding:16 }}>
      {/* ─── CORRIDOR SELECTOR + IMPORT ─── */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, flexWrap:'wrap', marginBottom:14 }}>
        <CorridorSwitch value={corridor} onChange={c => setCorridor && setCorridor(c)} options={[
          { id:'south', label:'South Corridor' }, { id:'east', label:'East Corridor' }
        ]} />
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ fontSize:11, color:C.softGrey, fontFamily:"'IBM Plex Mono', monospace" }}>
            {corridor === 'east' ? 'East' : 'South'} dataset · {rows.length} entries
          </span>
          <button onClick={() => xlsxRef.current && xlsxRef.current.click()} style={{
            background:C.lime, color:C.navy, border:'none', borderRadius:4, padding:'7px 14px',
            fontSize:12, fontWeight:700, cursor:'pointer' }}>
            ⭱ Import {corridor === 'east' ? 'East' : 'South'} Excel
          </button>
          <input ref={xlsxRef} type="file" accept=".xlsx,.xls" style={{display:'none'}}
            onChange={e => { if (e.target.files[0] && onImportExcel) onImportExcel(e.target.files[0], corridor); e.target.value=''; }} />
        </div>
      </div>
      {/* Summary Cards */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:14 }}>
        {[
          { label:'Total Trench (m)', value:(rows.reduce((m,r)=>Math.max(m,r.offshoreCum||0),0)+rows.reduce((m,r)=>Math.max(m,r.onshoreCum||0),0)).toLocaleString(), color:C.qeBlue, sub:'Offshore + Onshore cumulative' },
          { label:'Total Rock Breaking (m)', value:(rows.reduce((m,r)=>Math.max(m,r.rockOffCum||0),0)+rows.reduce((m,r)=>Math.max(m,r.rockOnCum||0),0)).toLocaleString(), color:C.navy, sub:'Offshore + Onshore combined' },
          { label:'Avg Daily Manpower', value: (() => { const active=rows.filter(r=>(r.indMP||0)+(r.dayMP||0)+(r.ngtMP||0)>0); return active.length ? Math.round(active.reduce((s,r)=>s+(r.indMP||0)+(r.dayMP||0)+(r.ngtMP||0),0)/active.length) : 0; })(), color:C.qeTeal, sub:`${rows.filter(r=>(r.dayMP||0)+(r.ngtMP||0)>0).length} active days` },
        ].map(card => (
          <div key={card.label} style={{ background:C.white, border:`2px solid ${card.color}`, borderRadius:4, padding:'12px 16px', display:'flex', flexDirection:'column', gap:4 }}>
            <div style={{ fontSize:9, fontWeight:700, color:card.color, textTransform:'uppercase', letterSpacing:1 }}>{card.label}</div>
            <div style={{ fontSize:28, fontWeight:900, color:card.color, lineHeight:1 }}>{card.value}</div>
            <div style={{ fontSize:9, color:C.softGrey }}>{card.sub}</div>
          </div>
        ))}
      </div>
      <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden' }}>
        <SectionHeader
          title={`Master Database — Daily Progress Log (${rows.length} entries)`}
          actions={
            <>
              <input
                placeholder="Search date / DPR# / notes…"
                value={filter}
                onChange={e=>setFilter(e.target.value)}
                style={{ border:`1px solid ${C.lime}`, background:'rgba(255,255,255,0.1)', color:C.white,
                  padding:'3px 8px', borderRadius:3, fontSize:10, outline:'none', width:200,
                  fontFamily:'inherit'
                }}
              />
              <Btn size="xs" variant="lime" onClick={addRow}>Add DPR</Btn>
            </>
          }
        />
        <NFSTable
          cols={cols}
          rows={filtered}
          onEdit={(ri, key, val) => {
            // Find actual index in unfiltered rows
            const actualRi = rows.indexOf(filtered[ri]);
            handleEdit(actualRi, key, val);
          }}
          rowStyle={rowStyle}
          compact={true}
        />
      </div>

      {/* DPR PDF Modal */}
      {dprModal && (
        <Modal title={`Export DPR #${dprModal.dprNo} — ${dprModal.date}`} onClose={()=>setDprModal(null)} width={400}>
          <p style={{ fontSize:11, color:C.charcoal, marginBottom:16 }}>
            Print or save as PDF the Daily Progress Report for DPR #{dprModal.dprNo} ({dprModal.date}).
          </p>
          <div style={{ display:'flex', gap:8 }}>
            <Btn variant="navy" onClick={()=>{ exportDPR(store, dprModal, tweaks); setDprModal(null); }}>
              Open Print Preview
            </Btn>
            <Btn variant="ghost" onClick={()=>setDprModal(null)}>Cancel</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── PERMITS REGISTER ──────────────────────────────────────
const PERMIT_STATUSES = ['Approved','Under RLIC Review','Under QG-LNG Review','Pending CRS','Permit with QE-LNG Review','Concurrence Received','Closed'];

function PermitsRegister({ store, onUpdate }) {
  const [rows, setRows] = useState(store.permits);

  const save = (updated) => { setRows(updated); store.permits = updated; onUpdate(); };

  const handleEdit = (ri, key, val) => save(rows.map((r,i) => i===ri?{...r,[key]:val}:r));
  const addRow = () => save([...rows, { jdb:'', applied:'', task:'', desc:'', type:'', issued:'', expiry:'', permitNo:'', status:'Under RLIC Review', holder:'Najas', remarks:'' }]);
  const deleteRow = (ri) => { if(!confirm('Delete this permit?')) return; save(rows.filter((_,i)=>i!==ri)); };

  const daysLeft = (expiry) => {
    if(!expiry) return null;
    const d = Math.ceil((new Date(expiry)-new Date())/(1000*60*60*24));
    if(isNaN(d)) return null;
    return d;
  };

  const kpiData = [

    { label:'Description', key:'desc', width:240, wrap:true, align:'left' },

        if(d<=30) return <span style={{color:C.amber,fontWeight:700}}>{d}d</span>;
        return <span style={{color:C.qeTeal}}>{d}d</span>;

    { label:'Permit No.', key:'permitNo', width:70 },
    { label:'Status', key:'status', type:'select', options:PERMIT_STATUSES, width:120,

    { label:'Del', key:'_del', editable:false, width:36,

  const rowStyle = (r) => {
    if(r.status==='Approved') return { background:'#F0FBF4' };

  );
}

// ─── LOOK-AHEAD ────────────────────────────────────────────
function LookAhead({ store, onUpdate }) {
  const [rows, setRows] = useState(store.lookahead);

  const save = (updated) => { setRows(updated); store.lookahead = updated; onUpdate(); };
  const handleEdit = (ri, key, val) => save(rows.map((r,i)=>i===ri?{...r,[key]:val}:r));
  const addRow = () => save([...rows, { area:'', eventType:'', date:'', description:'', priority:'Medium', assigned:'', notes:'' }]);
  const deleteRow = (ri) => { if(!confirm('Delete this item?')) return; save(rows.filter((_,i)=>i!==ri)); };

  const daysOut = (date) => {
    if(!date) return null;
    return Math.ceil((new Date(date)-new Date())/(1000*60*60*24));
  };

  const sorted = [...rows].sort((a,b)=>{
    const da = daysOut(a.date), db = daysOut(b.date);
    if(da===null) return 1; if(db===null) return -1;
    return da-db;
  });

  const kpiData = [
    { label:'Tomorrow',    value:rows.filter(r=>daysOut(r.date)===1).length,              color:C.crimson },
    { label:'Next 3 Days', value:rows.filter(r=>{const d=daysOut(r.date);return d!==null&&d>=0&&d<=3}).length, color:C.amber },
    { label:'Next 7 Days', value:rows.filter(r=>{const d=daysOut(r.date);return d!==null&&d>=0&&d<=7}).length, color:C.qeTeal },
    { label:'Overdue',     value:rows.filter(r=>{const d=daysOut(r.date);return d!==null&&d<0}).length,  color:C.crimson },
    { label:'Total',       value:rows.filter(r=>r.date).length,                                          color:C.qeBlue },
  ];

  const EVENT_TYPES = ['Permit Renewal','Production Milestone','HSE Audit','Progress Meeting','Survey','Inspection','Mobilization','Demobilization','Other'];
  const PRIORITIES  = ['High','Medium','Low'];

  const cols = [
    { label:'#', key:'_no', editable:false, width:28, render:(_,ri)=>ri+1, color:()=>C.softGrey },
    { label:'Area', key:'area', width:80 },
    { label:'Event Type', key:'eventType', type:'select', options:EVENT_TYPES, width:110 },
    { label:'Date', key:'date', type:'date', width:90 },
    { label:'Days Out', key:'_days', editable:false, width:80,
      render:(r)=>{
        const d=daysOut(r.date);
        if(d===null) return '—';
        if(d<0)  return <Badge text="OVERDUE" />;
        if(d===0) return <Badge text="TODAY" />;
        if(d===1) return <Badge text="TOMORROW" />;
        if(d<=7)  return <span style={{color:C.amber,fontWeight:700}}>{d} days</span>;
        return <span style={{color:C.qeTeal}}>{d} days</span>;
      }
    },
    { label:'Description', key:'description', width:260, wrap:true, align:'left' },
    { label:'Priority', key:'priority', type:'select', options:PRIORITIES, width:70,
      render:(r,ri)=><Badge text={r.priority||'Medium'} />
    },
    { label:'Assigned', key:'assigned', width:80 },
    { label:'Notes', key:'notes', width:160, wrap:true, align:'left' },
    { label:'Del', key:'_del', editable:false, width:36,
      render:(_,ri)=>(
        <button onClick={()=>deleteRow(sorted.indexOf(sorted[ri]))} style={{background:'none',border:'none',color:C.crimson,cursor:'pointer',fontSize:13}}>✕</button>
      )
    },
  ];

  const rowStyle = (r) => {
    const d = daysOut(r.date);
    if(d===null) return {};
    if(d<0)  return { background:'#FDF0EE' };
    if(d===0) return { background:'#FFF8F0' };
    if(d<=3)  return { background:'#FEFCE8' };
    if(d<=7)  return { background:'#F0FDF4' };
    return {};
  };

  return (
    <div style={{ padding:16, display:'flex', flexDirection:'column', gap:14 }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:10 }}>
        {kpiData.map(k=><KPICard key={k.label} label={k.label} value={k.value} color={k.color} size="sm" />)}
      </div>

      <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden' }}>
        <SectionHeader
          title={`Look-Ahead — Upcoming Activities (${rows.length} items)`}
          actions={<Btn size="xs" variant="lime" onClick={addRow}>Add Item</Btn>}
        />
        <NFSTable cols={cols} rows={sorted} onEdit={(ri,key,val)=>{
          const actualIdx = rows.indexOf(sorted[ri]);
          if(actualIdx>=0) handleEdit(actualIdx,key,val);
        }} rowStyle={rowStyle} compact={true} />
      </div>
    </div>
  );
}

          <div><span style={{ color:C.softGrey }}>Client</span><br/><strong>QatarEnergy LNG (QELNG)</strong></div>
          <div><span style={{ color:C.softGrey }}>Contractor</span><br/><strong>McDermott International</strong></div>
          <div><span style={{ color:C.softGrey }}>Sub-Contractor</span><br/><strong>Al Hassanain Gen. Contracting</strong></div>
          <div><span style={{ color:C.softGrey }}>Document Ref.</span><br/><strong>NFS-MCD-MO-MST-00201 Rev. 01</strong></div>
        </div>
        <button onClick={()=>setShowOrg(o=>!o)} style={{
          marginTop:18, background:C.lime, color:C.navy, border:'none', borderRadius:4,
          padding:'9px 16px', fontWeight:700, fontSize:12, cursor:'pointer', letterSpacing:'0.02em' }}>
          {showOrg ? '▴ Hide Organization Chart' : '▾ View Organization Chart'}
        </button>
      </div>

      {showOrg && (
        <div style={{ background:C.white, borderRadius:4, border:`1px solid ${C.lightGrey}`, overflow:'hidden', marginBottom:18 }}>
          <SectionHeader title="Project Organization Chart" subtitle="Reporting structure — East Corridor" />
          <div style={{ padding:'18px' }}><OrgChart /></div>
        </div>
      )}

      {/* KEY FACTS */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(150px, 1fr))', gap:12, marginBottom:18 }}>
        <OvFact label="Trench Length" value="2.180" unit="km" accent={C.navy} />
        <OvFact label="Chainage" value="KP 0.000 – 2.180" accent={C.qeBlue} />
        <OvFact label="Total Theoretical Excavation" value="71,505" unit="m³" accent={C.qeTeal} />
        <OvFact label="Trunklines" value={'2 × 36"'} accent={C.amber} />
        <OvFact label="Water Depth Range" value="0 – 8" unit="m" accent={C.lime} />
      </div>

      {/* PIPELINES */}
      <OvAccordion title="Pipelines & Scope" subtitle="What is being installed in the trench" accent={C.qeBlue} defaultOpen={true}>
        <ul style={{ margin:0, paddingLeft:18, fontSize:12.5, color:C.charcoal, lineHeight:1.85 }}>
          <li>Twin 36&quot; trunklines <strong>TL23</strong> &amp; <strong>TL24</strong> (main product lines).</li>
          <li>Piggybacked 12&quot; <strong>SC26</strong> conduit alongside the trunklines.</li>
          <li>Piggybacked 6&quot; <strong>MP26 MEG</strong> (mono-ethylene glycol) line.</li>
          <li>Scope: trench excavation, pipe-lay support, conduit installation and backfilling (sand bedding, soil backfill, rock cover).</li>
          <li>Two construction areas: <strong>Area 1</strong> (KP 0.000–1.120, 0–2.5 m WD — land excavator + EEX) and <strong>Area 2</strong> (KP 1.120–2.180, 2.5–8 m WD — excavator barge).</li>
        </ul>
      </OvAccordion>

      {/* TRENCH ZONES */}
      <OvAccordion title="Trench Design & Zones" subtitle="Click to view zone-by-zone breakdown" accent={C.qeTeal}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead><tr>
            <th style={OV_TH}>Zone</th><th style={OV_TH}>Chainage</th><th style={OV_TH}>Trench Depth</th>
            <th style={{...OV_TH, textAlign:'right'}}>Theoretical Exc. (m³)</th>
          </tr></thead>
          <tbody>
            {zones.map((z,i)=>(
              <tr key={i} style={{ background: i%2 ? C.pearl : C.white }}>
                <td style={{...OV_TD, fontWeight:700, color:C.navy}}>{z[0]}</td>
                <td style={{...OV_TD, fontFamily:"'IBM Plex Mono', monospace"}}>{z[1]}</td>
                <td style={OV_TD}>{z[2]}</td>
                <td style={{...OV_TD, fontFamily:"'IBM Plex Mono', monospace", textAlign:'right'}}>{z[3]}</td>
              </tr>
            ))}
            <tr style={{ background:C.navy }}>
              <td style={{...OV_TD, color:C.lime, fontWeight:700, borderBottom:'none'}} colSpan={3}>TOTAL</td>
              <td style={{...OV_TD, color:C.lime, fontWeight:700, fontFamily:"'IBM Plex Mono', monospace", textAlign:'right', borderBottom:'none'}}>71,504.85</td>
            </tr>
          </tbody>
        </table>
        <div style={{ fontSize:10.5, color:C.softGrey, marginTop:8 }}>Side slopes 2:1 (Area 1) / 1:1 (Area 2). Tolerances: alignment ±0.50 m, bottom elevation +0/–0.50 m.</div>
      </OvAccordion>

      {/* EQUIPMENT */}
      <OvAccordion title="Equipment Fleet" subtitle="Primary plant & marine spread" accent={C.amber}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead><tr>
            <th style={OV_TH}>Equipment</th><th style={OV_TH}>Role</th>
            <th style={{...OV_TH, textAlign:'right'}}>Max Water Depth</th>
          </tr></thead>
          <tbody>
            {equip.map((e,i)=>(
              <tr key={i} style={{ background: i%2 ? C.pearl : C.white }}>
                <td style={{...OV_TD, fontWeight:600}}>{e[0]}</td>
                <td style={OV_TD}>{e[1]}</td>
                <td style={{...OV_TD, fontFamily:"'IBM Plex Mono', monospace", textAlign:'right'}}>{e[2]}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{ fontSize:10.5, color:C.softGrey, marginTop:8 }}>Marine spread incl. backhoe dredgers (BHD1 from KP 2.080 to shore, BHD2 from KP 1.120 offshore — meeting halfway) and support tugs.</div>
      </OvAccordion>

      {/* ADJACENT ASSETS & SAFETY */}
      <OvAccordion title="Adjacent Assets & Marine Safety" subtitle="Existing pipelines, marker buoys, silt control" accent={C.crimson}>
        <ul style={{ margin:0, paddingLeft:18, fontSize:12.5, color:C.charcoal, lineHeight:1.85 }}>
          <li>32&quot; QG pipeline — 10.9 m west of TL23 centerline.</li>
          <li>38&quot; QGII pipeline — 37.2 m (0 m WD) to 46.5 m (8 m WD) east of TL24 centerline.</li>
          <li>Marker buoys: A-3 surface (53.5 kg, red) + A-0 underwater, at 25 m spacing, 2 m from asset centerline (±30 cm).</li>
          <li>Silt curtain (~280 m perimeter per BHD) installed where water depth ≥ 2.5 m LAT.</li>
        </ul>
      </OvAccordion>

      {/* CTA to dashboard */}
      <div style={{ textAlign:'center', marginTop:6 }}>
        <button onClick={()=>setTab('dashboard')} style={{
          background:C.navy, color:C.white, border:`1px solid ${C.lime}`, borderRadius:4,
          padding:'10px 20px', fontWeight:700, fontSize:12.5, cursor:'pointer' }}>
          Go to Performance Dashboard →
        </button>
      </div>
    </div>
  );
}

// ─── ROOT APP ──────────────────────────────────────────────
function App() {
  const [tab,     setTab]     = useState('overview');
  const [version, setVersion] = useState(0);
  const [toast,   setToast]   = useState(null);
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [dashCorridor, setDashCorridor] = useState('overall');  // Dashboard: overall | east | south
  const [mdCorridor,   setMdCorridor]   = useState('south');    // Master DB: south | east

  const store = window.nfsStore;

  const onUpdate = useCallback(() => {
    store.save();
    setVersion(v => v+1);
  }, []);

  const onSave = () => {
    store.save();
    setToast('Saved to browser storage!');
  };

  const onExportJSON = () => { store.exportJSON(); setToast('JSON exported!'); };
  const onImportJSON = (file) => {
    store.importJSON(file).then(() => {
      setVersion(v=>v+1);
      setToast('Data imported successfully!');
    }).catch(() => setToast('Import failed — invalid file'));
  };

  const onImportExcel = (file, forced) => {
    // Resolve the target corridor EXPLICITLY — never inferred from the current view.
    let target = (forced === 'east' || forced === 'south') ? forced : null;
    if (!target) {
      target = window.confirm(
        'Which corridor is this Excel file for?\n\nPress OK  →  EAST corridor\nPress Cancel  →  SOUTH corridor'
      ) ? 'east' : 'south';
    }
    const label = target === 'east' ? 'EAST' : 'SOUTH';
    if (!window.confirm(
      'This will REPLACE the ' + label + ' corridor Master Database with this file.\nPermits and Look-Ahead will be MERGED into the shared registers (nothing deleted).\nThe other corridor will not be touched.\n\nContinue?'
    )) {
      return;
    }
    store.corridor = target;   // force exact target — no guessing, never 'overall'
    setToast('Importing ' + label + ' Excel data…');
    importFromExcel(
      file,
      store,
      (dprCount, permitCount, laCount, scopeCount) => {
        setVersion(v => v + 1);
        const parts = [];
        if (dprCount)    parts.push(`${dprCount} DPR rows`);
        if (permitCount) parts.push(`${permitCount} permits`);
        if (laCount)     parts.push(`${laCount} look-ahead items`);
        if (scopeCount)  parts.push(`${scopeCount} scope rows`);
        setToast(`✅ Imported ${parts.join(' + ')} into ${label} corridor`);
      },
      (errMsg) => {
        setToast('❌ ' + errMsg);
      }
    );
  };

  const content = useMemo(() => {
    // Set the active corridor on the store before rendering corridor-aware views
    if (tab === 'dashboard')      store.corridor = dashCorridor;
    else if (tab === 'database')  store.corridor = mdCorridor;
    else if (tab === 'dprviewer' || tab === 'inputs') store.corridor = (mdCorridor === 'overall' ? 'south' : mdCorridor);
    else store.corridor = 'south';
    switch(tab) {
      case 'overview':  return <ProjectOverview setTab={setTab} key={`ov-${version}`} />;
      case 'dashboard': return <Dashboard store={store} tweaks={tweaks} onEditSettings={()=>setTab('inputs')} corridor={dashCorridor} setCorridor={setDashCorridor} key={`dash-${version}-${dashCorridor}`} />;
      case 'database':  return <MasterDatabase store={store} onUpdate={onUpdate} tweaks={tweaks} corridor={mdCorridor} setCorridor={setMdCorridor} onImportExcel={onImportExcel} key={`db-${version}-${mdCorridor}`} />;
      case 'permits':   return <PermitsRegister store={store} onUpdate={onUpdate} key={`pm-${version}`} />;
      case 'lookahead': return <LookAhead store={store} onUpdate={onUpdate} key={`la-${version}`} />;
      case 'dprviewer': return <DPRViewer store={store} key={`dv-${version}-${mdCorridor}`} />;
      case 'inputs':    return <ExpandedInputs store={store} onUpdate={onUpdate} key={`inp-${version}-${mdCorridor}`} />;
      default: return null;
    }
  }, [tab, version, tweaks, dashCorridor, mdCorridor]);

  return (
    <div style={{ minHeight:'100vh', background:'#F0F2F5' }}>
      <TopNav
        active={tab} setActive={setTab}
        store={store}
        onSave={onSave}
        onExportJSON={onExportJSON}
        onImportJSON={onImportJSON}
        onImportExcel={onImportExcel}
        tweaks={tweaks}
      />

      <div style={{ minHeight:'calc(100vh - 90px)', paddingBottom:40 }}>
        {content}
      </div>

      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
      <TweaksPanel>
        <TweakSection label="Visual" />
        <TweakColor  label="Accent Color" value={tweaks.accentColor} onChange={v=>setTweak('accentColor',v)} />
        <TweakToggle label="Dark Mode (coming soon)" value={tweaks.darkMode} onChange={v=>setTweak('darkMode',v)} />
        <TweakSection label="Tables" />
        <TweakToggle label="Compact Row Height"  value={tweaks.compactTables}   onChange={v=>setTweak('compactTables',v)} />
        <TweakToggle label="Show Chart Labels"   value={tweaks.showChartLabels} onChange={v=>setTweak('showChartLabels',v)} />
        <TweakSection label="Export" />
        <TweakButton label="Export JSON Backup" onClick={onExportJSON} />
        <TweakButton label="Full Snapshot PDF"  onClick={()=>exportFullReport(store)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>

</body>
</html>
